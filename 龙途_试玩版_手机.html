<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>龙途传说 v5</title>
<style>
/* ═══════════════════════════════════════════════════════════
   手绘线稿风格 - Hand-drawn sketch style
   ═══════════════════════════════════════════════════════════ */

:root {
  --bg: #0d0d0d;
  --paper: #1a1a1a;
  --card: #222;
  --border: #3a3a3a;
  --text: #d4c8a8;
  --text-dim: #8a8070;
  --accent: #d4a017;
  --accent2: #c84;
  --hp: #c44;
  --mp: #48a;
  --xp: #4a4;
  --danger: #c44;
  --sketch: #a89070;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Georgia', 'Songti SC', 'STSong', serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#status {
  width: 100%;
  max-width: 480px;
  padding: 8px 16px;
  background: var(--card);
  border-bottom: 2px solid var(--border);
  font-size: 13px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  letter-spacing: 1px;
}

#game {
  width: 100%;
  max-width: 480px;
  padding: 16px;
  flex: 1;
}

#toast {
  position: fixed;
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: #000;
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 200;
  pointer-events: none;
}

/* ═══════════════════════════════════════════════════════════
   TYPOGRAPHY - Sketch feel
   ═══════════════════════════════════════════════════════════ */

.scene-title {
  font-size: 22px;
  font-weight: bold;
  color: var(--accent);
  text-align: center;
  margin-bottom: 12px;
  letter-spacing: 2px;
  /* Subtle sketch underline */
  position: relative;
  padding-bottom: 8px;
}
.scene-title::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 20%;
  right: 20%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

.scene-desc {
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
  margin-bottom: 16px;
  font-style: italic;
}

.scene-text {
  line-height: 1.8;
  font-size: 15px;
  margin: 12px 0;
}
.scene-text p { margin-bottom: 8px; }

/* ═══════════════════════════════════════════════════════════
   BUTTONS - Ink brush style
   ═══════════════════════════════════════════════════════════ */

.btn {
  display: inline-block;
  padding: 10px 20px;
  background: var(--card);
  color: var(--text);
  border: 2px solid var(--border);
  border-radius: 4px;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  margin: 4px;
  transition: all 0.2s;
  /* Sketch border effect */
  box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
}
.btn:hover { 
  border-color: var(--accent); 
  color: var(--accent);
  box-shadow: 2px 2px 0 rgba(212,160,23,0.2);
}
.btn:active { transform: translate(1px, 1px); box-shadow: none; }
.btn-primary { 
  border-color: var(--accent); 
  color: var(--accent);
  background: rgba(212,160,23,0.1);
}
.btn-danger {
  border-color: var(--danger);
  color: var(--danger);
  background: rgba(204,68,68,0.1);
}
.btn-attack {
  width: 100%;
  padding: 14px;
  background: rgba(204,68,68,0.15);
  border-color: var(--danger);
  color: var(--danger);
  font-size: 16px;
  font-weight: bold;
  margin-top: 8px;
}
.btn-small {
  padding: 4px 10px;
  font-size: 12px;
  background: var(--card);
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
}
.btn-small:hover { color: var(--accent); border-color: var(--accent); }

.btns { text-align: center; margin: 12px 0; }

/* ═══════════════════════════════════════════════════════════
   ORIGIN CARDS - Parchment cards
   ═══════════════════════════════════════════════════════════ */

.origin-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  margin: 8px 0;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.origin-card:hover {
  border-color: var(--accent);
  box-shadow: 0 0 12px rgba(212,160,23,0.15);
}
.origin-emoji {
  font-size: 28px;
  text-align: center;
  margin-bottom: 4px;
}
.origin-name {
  font-size: 18px;
  font-weight: bold;
  color: var(--accent);
  text-align: center;
}
.origin-attrs {
  font-size: 12px;
  text-align: center;
  color: var(--text-dim);
  margin: 4px 0;
}
.origin-skill {
  font-size: 12px;
  text-align: center;
  color: var(--sketch);
}
.origin-story {
  line-height: 1.8;
  font-size: 14px;
  font-style: italic;
  color: var(--text);
  margin: 12px 0;
  padding: 12px;
  background: var(--card);
  border-left: 3px solid var(--accent);
  border-radius: 4px;
}

/* ═══════════════════════════════════════════════════════════
   NAME & ATTRIBUTE ALLOCATION
   ═══════════════════════════════════════════════════════════ */

.name-section {
  margin: 12px 0;
  display: flex;
  gap: 8px;
  align-items: center;
}
.name-section input {
  flex: 1;
  padding: 8px 12px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
}
.name-section input:focus { border-color: var(--accent); outline: none; }

.attr-row-v5 {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.attr-info { display: flex; flex-direction: column; }
.attr-name-v5 { font-size: 14px; font-weight: bold; }
.attr-hint-v5 { font-size: 11px; color: var(--text-dim); }
.attr-controls { display: flex; align-items: center; gap: 8px; }
.attr-btn {
  width: 30px; height: 30px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 50%;
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: inherit;
}
.attr-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.attr-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.attr-value { font-size: 16px; min-width: 50px; text-align: center; }
.attr-boosted { color: var(--accent); font-weight: bold; }
.pts-remaining { text-align: center; font-size: 14px; margin: 8px 0; }
.pts-num { color: var(--accent); font-weight: bold; font-size: 18px; }

/* ═══════════════════════════════════════════════════════════
   WORLD MAP
   ═══════════════════════════════════════════════════════════ */

.world-map {
  width: 100%;
  aspect-ratio: 1;
  margin: 12px 0;
  border: 2px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.world-svg {
  width: 100%;
  height: 100%;
}
.map-actions { margin: 12px 0; text-align: center; }
.current-loc {
  font-size: 14px;
  margin-bottom: 8px;
  color: var(--text-dim);
}

/* ═══════════════════════════════════════════════════════════
   MINI-MAP
   ═══════════════════════════════════════════════════════════ */

.mini-area {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  margin: 8px 0;
}
.mini-area-name {
  font-size: 16px;
  font-weight: bold;
  color: var(--accent);
  margin-bottom: 4px;
}
.mini-area-desc {
  font-size: 13px;
  color: var(--text-dim);
  font-style: italic;
  line-height: 1.6;
}
.mini-map-grid {
  margin: 8px 0;
}
.mini-svg {
  width: 100%;
  max-height: 150px;
}
.mini-directions {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin: 8px 0;
}
.dir-btn {
  padding: 10px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
}
.dir-btn:hover:not(.disabled) { border-color: var(--accent); color: var(--accent); }
.dir-btn.disabled { opacity: 0.3; cursor: not-allowed; }
.mini-actions { margin: 8px 0; text-align: center; }
.mini-msg {
  text-align: center;
  color: var(--accent);
  font-style: italic;
  margin-bottom: 8px;
}

/* ═══════════════════════════════════════════════════════════
   BATTLE - 炎龙骑士团2风格战斗界面
   ═══════════════════════════════════════════════════════════ */

.battle-scene {
  width: 100%;
  margin: 0 auto;
  background: #0a0a08;
  border: 2px solid #5a4a3a;
  border-radius: 4px;
  overflow: hidden;
}
.battle-svg {
  width: 100%;
  display: block;
}

/* Dialog box - DOS-style text window */
.battle-dialog {
  background: #0a0a08;
  border: 2px solid #5a4a3a;
  border-top: none;
  padding: 6px 10px;
  font-size: 12px;
  line-height: 1.6;
  color: #c8c0a0;
  min-height: 50px;
  font-family: 'Noto Serif SC', serif;
}
.dialog-border {
  border: 1px solid #3a3228;
  padding: 4px 8px;
  border-radius: 2px;
}

/* Battle menu - DOS-style action buttons */
.battle-menu {
  margin-top: 4px;
}
.menu-row {
  display: flex;
  gap: 4px;
  margin-bottom: 4px;
}
.menu-btn {
  flex: 1;
  background: #1a1810;
  border: 1px solid #5a4a3a;
  color: #c8c0a0;
  padding: 8px 4px;
  font-size: 13px;
  font-family: 'Noto Serif SC', serif;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
  text-align: center;
  position: relative;
}
.menu-btn:hover:not(.disabled) {
  border-color: #d4a017;
  color: #d4a017;
  background: rgba(212,160,23,0.08);
}
.menu-btn.active {
  border-color: #d4a017;
  color: #d4a017;
  background: rgba(212,160,23,0.15);
  box-shadow: inset 0 0 8px rgba(212,160,23,0.1);
}
.menu-btn.disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
.mp-cost {
  font-size: 10px;
  color: #6688cc;
  margin-left: 4px;
}

.hint-text {
  text-align: center;
  color: #888;
  font-size: 12px;
  padding: 6px;
  border: 1px dashed #444;
  border-radius: 2px;
}

/* Keep legacy classes for compatibility */
.battle-header { display: none; }
.enemies-container { display: none; }
.enemy-card { display: none; }
.player-panel { display: none; }
.battle-log { display: none; }
.battle-controls { display: none; }
.attack-modes { display: none; }
.mode-btn { display: none; }
.battle-result { display: none; }
  margin-top: 2px;
}

/* Player panel */
.player-panel {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 6px;
  padding: 10px;
  margin: 8px 0;
}
.player-name {
  font-size: 14px;
  font-weight: bold;
  color: var(--accent);
  margin-bottom: 6px;
}

.player-stat {
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 4px 0;
}
.stat-label {
  font-size: 12px;
  min-width: 40px;
  color: var(--text-dim);
}
.stat-bar {
  flex: 1;
  height: 10px;
  background: #333;
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid #444;
}
.stat-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.3s;
}
.stat-fill.hp { background: linear-gradient(90deg, #c44, #a33); }
.stat-fill.mp { background: linear-gradient(90deg, #48a, #368); }
.stat-fill.xp { background: linear-gradient(90deg, #4a4, #383); }
.stat-value {
  font-size: 11px;
  color: var(--text-dim);
  min-width: 60px;
  text-align: right;
}

/* Battle log */
.battle-log {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px;
  margin: 6px 0;
  font-size: 12px;
  line-height: 1.6;
  max-height: 80px;
  overflow-y: auto;
}

/* Battle controls */
.battle-controls {
  margin: 8px 0;
}
.controls-label {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.attack-modes {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin: 4px 0;
}
.mode-btn {
  padding: 6px 10px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
}
.mode-btn:hover:not(.disabled) { border-color: var(--accent); color: var(--accent); }
.mode-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(212,160,23,0.1); }
.mode-btn.disabled { opacity: 0.3; cursor: not-allowed; }

/* Battle result */
.battle-result {
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  padding: 16px;
  margin: 8px 0;
}
.battle-result.win { color: var(--xp); }
.battle-result.lose { color: var(--danger); }

/* Damage text */
.dmg-crit { color: #e84; font-weight: bold; }
.crit-text { color: #fa0; }

/* ═══════════════════════════════════════════════════════════
   TOWN
   ═══════════════════════════════════════════════════════════ */

/* Town panorama SVG */
.town-panorama {
  margin: 4px 0 8px;
  border: 2px solid #3a3228;
  border-radius: 6px;
  overflow: hidden;
  background: #1a1820;
}
.town-svg {
  width: 100%;
  height: auto;
  display: block;
}
.bld-clickable:hover {
  filter: url(#bldGlow);
  opacity: 0.9;
}
.bld-clickable:active {
  opacity: 0.7;
}

/* Damage popup */
.dmg-popup {
  font-size: 20px;
  font-weight: bold;
  color: #ef4444;
  text-shadow: 0 0 4px #000, 0 0 8px #f00;
  pointer-events: none;
  animation: dmgFloat 0.8s ease-out forwards;
  z-index: 100;
}
.dmg-popup-crit {
  font-size: 26px;
  color: #fbbf24;
  text-shadow: 0 0 6px #000, 0 0 12px #fa0;
}
@keyframes dmgFloat {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-30px); }
}

/* Drop items */
.drop-list {
  color: #d4a017;
  font-weight: bold;
  margin-top: 6px;
}
.drop-item {
  color: #9ca3af;
  padding: 2px 4px;
}
.drop-common { color: #9ca3af; }
.drop-uncommon { color: #22c55e; }
.drop-rare { color: #3b82f6; }
.drop-epic { color: #a855f7; }

.dmg-player { color: #ef4444; font-weight: bold; }

.town-desc {
  text-align: center;
  color: var(--text-dim);
  font-style: italic;
  margin-bottom: 4px;
}
.town-panorama {
  margin: 8px 0;
  border: 2px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  background: #1a1820;
}
.town-svg {
  width: 100%;
  display: block;
}
.bld-clickable:hover {
  filter: url(#bldGlow);
  opacity: 0.9;
}
}
.building:hover { border-color: var(--accent); }
.build-icon { font-size: 28px; margin-bottom: 4px; }
.build-name { font-size: 14px; font-weight: bold; color: var(--text); }
.build-desc { font-size: 11px; color: var(--text-dim); }

/* Damage popup */
.dmg-popup {
  font-size: 20px;
  font-weight: bold;
  color: #ff4444;
  pointer-events: none;
  animation: dmgFloat 0.8s ease-out forwards;
  z-index: 100;
  text-shadow: 0 0 4px #000, 0 0 8px #ff0000;
}
.dmg-popup-crit {
  font-size: 26px;
  color: #ffaa00;
  text-shadow: 0 0 6px #000, 0 0 12px #ffaa00;
}
@keyframes dmgFloat {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-40px); opacity: 0; }
}
.dmg-player { color: #ff6b6b; font-weight: bold; }

/* Drop items */
.drop-list { margin-top: 6px; color: #d4a017; font-weight: bold; }
.drop-item { padding: 2px 0; font-size: 12px; }
.drop-common { color: #9ca3af; }
.drop-uncommon { color: #22c55e; }
.drop-rare { color: #3b82f6; }
.drop-epic { color: #a855f7; }

/* Inn */
.inn-desc { color: var(--text-dim); font-style: italic; margin-bottom: 8px; }
.inn-service { padding: 8px; background: var(--card); border-radius: 4px; margin: 8px 0; }
.inn-service p { margin: 4px 0; }

/* Shop */
.money-display { text-align: center; font-size: 16px; color: var(--accent); margin-bottom: 8px; }
.shop-items { margin: 8px 0; }
.shop-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  margin: 4px 0;
  cursor: pointer;
  transition: all 0.2s;
}
.shop-item:hover { border-color: var(--accent); }
.item-name { font-size: 14px; }
.item-stats { font-size: 12px; color: var(--text-dim); }
.item-price { color: var(--accent); font-size: 14px; }

/* Tavern */
.tavern-desc { color: var(--text-dim); font-style: italic; margin-bottom: 8px; }
.rumor {
  background: var(--card);
  border-left: 3px solid var(--accent);
  padding: 10px;
  margin: 8px 0;
  font-style: italic;
  color: var(--text);
}

/* Smith */
.smith-desc { color: var(--text-dim); font-style: italic; margin-bottom: 8px; }

/* ═══════════════════════════════════════════════════════════
   INVENTORY
   ═══════════════════════════════════════════════════════════ */

.equip-section { margin: 8px 0; }
.equip-title { font-size: 14px; font-weight: bold; color: var(--accent); margin-bottom: 6px; }
.equip-grid { display: grid; gap: 6px; }
.equip-slot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
}
.slot-name { font-size: 13px; color: var(--text-dim); }
.equipped-item { font-size: 14px; color: var(--text); }
.empty-slot { font-size: 13px; color: #555; }
.inv-section { margin: 12px 0; }
.inv-title { font-size: 14px; font-weight: bold; color: var(--accent); margin-bottom: 6px; }
.inv-empty { text-align: center; color: #555; padding: 12px; font-style: italic; }
.keys-display { text-align: center; font-size: 13px; color: var(--text-dim); margin: 8px 0; }

/* ═══════════════════════════════════════════════════════════
   PLAYER INFO
   ═══════════════════════════════════════════════════════════ */

.player-basic {
  text-align: center;
  padding: 12px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 6px;
  margin-bottom: 12px;
}
.basic-name { font-size: 20px; font-weight: bold; color: var(--accent); }
.basic-origin { font-size: 14px; color: var(--text-dim); margin: 4px 0; }
.basic-level { font-size: 13px; color: var(--text-dim); }

.skills-display { margin: 8px 0; }
.skills-title { font-size: 14px; font-weight: bold; color: var(--accent); margin-bottom: 4px; }
.skills-list { display: flex; flex-wrap: wrap; gap: 4px; }
.skill-tag {
  padding: 4px 8px;
  background: rgba(72,136,170,0.15);
  border: 1px solid #48a;
  border-radius: 12px;
  font-size: 12px;
  color: #6ac;
}
.skills-empty { color: #555; font-style: italic; }

.origin-skill-display {
  margin: 8px 0;
  padding: 8px;
  background: var(--card);
  border-left: 3px solid var(--accent2);
  border-radius: 4px;
}
.origin-title { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
.origin-skill { font-size: 14px; font-weight: bold; color: var(--accent2); }
.origin-desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

.attr-allocation { margin: 12px 0; }
.attr-header { margin-bottom: 8px; font-size: 14px; }
.attr-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
  gap: 6px;
}
.attr-block {
  text-align: center;
  padding: 8px 4px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
}

.build-art {

  height: 50px;

}
.build-svg {

.guild-desc {

}

.quest-list-title {

  font-weight: bold;
  color: var(--accent);
  margin: 12px 0 6px;
  padding-bottom: 4px;

.quest-card {
  padding: 10px;

  border: 2px solid var(--border);
  border-radius: 6px;
  margin: 6px 0;

.quest-card:hover {
  border-color: var(--accent);
}
.quest-card.active-quest {
  border-color: var(--accent);
  background: rgba(212,160,23,0.08);
  cursor: default;
}
.quest-card.accepted {
  opacity: 0.7;
  cursor: default;
}
.quest-header {
  font-size: 15px;
  font-weight: bold;
  color: var(--text);
  margin-bottom: 4px;
}
.quest-desc {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.quest-reward {
  font-size: 12px;
  color: var(--xp);
}
.quest-accept-hint {
  font-size: 11px;
  color: var(--accent);
  text-align: right;
  margin-top: 4px;
}
.quest-badge {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 8px;
  font-size: 10px;
  font-weight: bold;
  vertical-align: middle;
}
.quest-badge.active {
  background: rgba(212,160,23,0.2);
  color: var(--accent);
  border: 1px solid var(--accent);
}
.quest-badge.done {
  background: rgba(74,170,74,0.15);

  border: 1px solid var(--xp);
}

  padding: 8px;
  background: rgba(212,160,23,0.08);
  border: 1px solid var(--accent);

  margin: 8px 0;
  font-size: 13px;
  color: var(--accent);

  text-align: center;

.move-btn:hover:not(:disabled) {

// Procedural map generation
var _mapCache = {}; // cache generated maps per location

function generateMap(locId) {
  if (_mapCache[locId]) return _mapCache[locId];
  
  var loc = LOCATIONS[locId];
  var cfg = loc.mapConfig;
  var theme = ROOM_THEMES[locId] || ROOM_THEMES.lake;
  var cols = cfg.cols;
  var rows = cfg.rows;
  
  // Create grid of rooms
  var rooms = []; // 2D array [row][col]
  for (var r = 0; r < rows; r++) {
    rooms[r] = [];
    for (var c = 0; c < cols; c++) {
      rooms[r][c] = {
        r: r, c: c,
        id: r + '_' + c,
        name: '', desc: '',
        type: 'empty', // empty, enemy, treasure, event, boss, start, wall
        visited: false,
        revealed: false // fog of war
      };
    }
  }
  
  // Use seeded random based on locId for consistency
  var seed = 0;
  for (var si = 0; si < locId.length; si++) seed += locId.charCodeAt(si) * (si + 1);
  var rng = function() { seed = (seed * 16807 + 0) % 2147483647; return (seed - 1) / 2147483646; };
  
  // Set start position
  var startR = cfg.startPos.r;
  var startC = cfg.startPos.c;
  rooms[startR][startC].type = 'start';
  rooms[startR][startC].name = '入口';
  rooms[startR][startC].desc = cfg.desc;
  rooms[startR][startC].revealed = true;
  rooms[startR][startC].visited = true;
  
  // Reveal adjacent to start
  var dirs = [{dr:-1,dc:0},{dr:1,dc:0},{dr:0,dc:-1},{dr:0,dc:1}];
  for (var di = 0; di < dirs.length; di++) {
    var nr = startR + dirs[di].dr, nc = startC + dirs[di].dc;
    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
      rooms[nr][nc].revealed = true;
    }
  }
  
  // Set boss position
  var bossR = cfg.bossPos.r;
  var bossC = cfg.bossPos.c;
  rooms[bossR][bossC].type = 'boss';
  rooms[bossR][bossC].name = '首领巢穴';
  rooms[bossR][bossC].desc = '空气中充满危险的气息...';
  
  // Generate a guaranteed path from start to boss using random walk
  var pathR = startR, pathC = startC;
  var pathSteps = 0;
  var maxPathSteps = rows * cols * 2; // safety
  while ((pathR !== bossR || pathC !== bossC) && pathSteps < maxPathSteps) {
    pathSteps++;
    // Move toward boss with some randomness
    var moveOptions = [];
    if (pathR > bossR) moveOptions.push({dr:-1,dc:0});
    if (pathR < bossR) moveOptions.push({dr:1,dc:0});
    if (pathC > bossC) moveOptions.push({dr:0,dc:-1});
    if (pathC < bossC) moveOptions.push({dr:0,dc:1});
    // Add some random perpendicular moves
    if (rng() < 0.3) {
      var allDirs = [{dr:-1,dc:0},{dr:1,dc:0},{dr:0,dc:-1},{dr:0,dc:1}];
      var rd = allDirs[Math.floor(rng() * 4)];
      var nrr = pathR + rd.dr, nrc = pathC + rd.dc;
      if (nrr >= 0 && nrr < rows && nrc >= 0 && nrc < cols) {
        moveOptions.push(rd);
      }
    }
    var chosen = moveOptions[Math.floor(rng() * moveOptions.length)];
    pathR += chosen.dr;
    pathC += chosen.dc;
    pathR = Math.max(0, Math.min(rows - 1, pathR));
    pathC = Math.max(0, Math.min(cols - 1, pathC));
    if (rooms[pathR][pathC].type === 'empty') {
      rooms[pathR][pathC].type = 'path';
    }
  }
  
  // Fill remaining rooms with random content
  var nameIdx = 0;
  for (var r2 = 0; r2 < rows; r2++) {
    for (var c2 = 0; c2 < cols; c2++) {
      var room = rooms[r2][c2];
      if (room.type === 'start' || room.type === 'boss') continue;
      
      if (room.type === 'empty') {
        var roll = rng();
        if (roll < cfg.enemyRate) {
          room.type = 'enemy';
        } else if (roll < cfg.enemyRate + cfg.treasureRate) {
          room.type = 'treasure';
        } else if (roll < cfg.enemyRate + cfg.treasureRate + cfg.eventRate) {
          room.type = 'event';
        } else if (roll < cfg.enemyRate + cfg.treasureRate + cfg.eventRate + 0.08) {
          room.type = 'water'; // impassable water
        } else if (roll < cfg.enemyRate + cfg.treasureRate + cfg.eventRate + 0.14) {
          room.type = 'stone'; // investigate for loot
        } else if (roll < cfg.enemyRate + cfg.treasureRate + cfg.eventRate + 0.24) {
          room.type = 'grass'; // scenic, no interaction
        } else {
          room.type = 'path';
        }
      }
      
      // Assign name and description
      room.name = theme.names[nameIdx % theme.names.length];
      nameIdx++;
      // Assign terrain-specific descriptions
      if (room.type === 'water') {
        room.desc = theme.waterDesc ? theme.waterDesc[Math.floor(rng() * theme.waterDesc.length)] : '水面在微光中荡漾，深不见底。';
      } else if (room.type === 'stone') {
        room.desc = theme.stoneDesc ? theme.stoneDesc[Math.floor(rng() * theme.stoneDesc.length)] : '散落的石堆中似乎藏着什么...';
      } else if (room.type === 'grass') {
        room.desc = theme.grassDesc ? theme.grassDesc[Math.floor(rng() * theme.grassDesc.length)] : '茂密的草丛随风摇曳。';
      } else {
        room.desc = theme.desc[Math.floor(rng() * theme.desc.length)];
      }
    }
  }
  
  var map = { rows: rows, cols: cols, rooms: rooms, startR: startR, startC: startC, bossR: bossR, bossC: bossC, name: cfg.name };
  _mapCache[locId] = map;
  return map;
}

function getMapForLocation() {
  return generateMap(G.location);
}

function getRoom(map, r, c) {
  if (r < 0 || r >= map.rows || c < 0 || c >= map.cols) return null;
  return map.rooms[r][c];
}

function canMove(map, r, c) {
  var room = getRoom(map, r, c);
  if (!room) return false;
  if (room.type === 'water') return false;
  return true;
}

// Show NPC dialog - interactive conversation
function showDialog(npcId, startLine) {
  var npc = NPC_DIALOGS[npcId];
  if (!npc) return;
  var idx = startLine || 0;
  var line = npc.lines[idx];
  if (!line) return;
  
  var html = '';
  html += '<div class="npc-dialog">';
  html += '<div class="npc-portrait">' + npc.portrait + '</div>';
  html += '<div class="npc-name">' + npc.name + '</div>';
  html += '<div class="npc-text">' + line.text.replace(/\n/g, '<br>') + '</div>';
  
  if (line.next >= 0) {
    html += '<button class="btn" onclick="showDialog(\'' + npcId + '\',' + line.next + ')">继续</button>';
  } else {
    // End of conversation
    if (G._pendingBossBattle) {
      G._pendingBossBattle = false;
      html += '<button class="btn btn-danger" onclick="renderBattle(\'👑 首领战！\')">⚔️ 开战！</button>';
    } else {
      html += '<button class="btn btn-primary" onclick="showStory()">返回</button>';
    }
  }
  html += '</div>';
  render(html);
}

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function calcMaxHp() { return 100 + G.str * 5 + (G.equipment.armor ? (G.equipment.armor.hp || 0) : 0); }
function calcMaxMp() { return 50 + G.int * 3; }
function calcAtk() { 
  var base = G.str * 2; 
  if (G.equipment.weapon) base += (G.equipment.weapon.atk || 0);
  return base;
}
function calcDef() { return (G.equipment.armor ? (G.equipment.armor.def || 0) : 0); }
function calcCrit() { return Math.min(50, 5 + G.luk * 0.5); }
function calcCritDmg() { return 0.5 + G.luk * 0.02; }
function calcDodge() { return Math.min(40, G.agi * 0.8); }
function calcNextXp(lvl) { return 80 + lvl * 40; }
function updateStatus() {
  var el = document.getElementById('status');
  if (el) el.innerHTML = 'Lv.' + G.level + ' | ❤️' + G.hp + '/' + G.maxHp + ' | 💧' + G.mp + '/' + G.maxMp + ' | 💰' + G.gold;
}
function render(html) { var el = document.getElementById('game'); if (el) el.innerHTML = html; }
function toast(msg) { var el = document.getElementById('toast'); if (el) { el.textContent = msg; el.style.opacity = 1; setTimeout(function() { el.style.opacity = 0; }, 2000); } }

function showAttrInfo(key) {
  var info = ATTR_INFO[key];
  if (!info) return;
  var el = document.getElementById('attrTooltip');
  if (!el) return;
  
  var showing = el.getAttribute('data-key');
  if (showing === key) { el.style.display = 'none'; el.setAttribute('data-key', ''); return; }
  
  var h = '<div class="attr-tooltip-header" style="color:' + info.color + '">' + info.icon + ' ' + info.name + '</div>';
  h += '<div class="attr-tooltip-desc">' + info.desc + '</div>';
  h += '<div class="attr-tooltip-affects"><strong>影响：</strong>' + info.affects.join('、') + '</div>';
  
  el.innerHTML = h;
  el.style.display = 'block';
  el.setAttribute('data-key', key);
}

var _attrDraft = null;

function sceneNameAndAttrs() {
  // Save name before re-render (if input exists)
  var savedName = '';
  var nameEl = document.getElementById('charName');
  if (nameEl && nameEl.value) savedName = nameEl.value;
  
  if (!_attrDraft) {
    _attrDraft = { str:G.str, agi:G.agi, int:G.int, cha:G.cha, luk:G.luk, pts:5 };
  }
  
  var html = '';
  html += '<div class="scene-title">创建角色</div>';
  
  // Name input - restore saved value
  html += '<div class="name-section">';
  html += '<label>你的名字：</label>';
  html += '<input type="text" id="charName" placeholder="输入名字或随机生成" maxlength="12" value="' + savedName + '">';
  html += '<button class="btn-small" onclick="randomName()">🎲 随机</button>';
  html += '</div>';
  
  html += '<div class="scene-desc">分配 <strong>5点</strong> 自由属性点（点击属性名查看详情）</div>';
  
  var akeys = ['str','agi','int','cha','luk'];
  
  for (var i = 0; i < akeys.length; i++) {
    var k = akeys[i];
    var ai = ATTR_INFO[k];
    var cur = _attrDraft[k];
    var baseVal = G[k];
    var delta = cur - baseVal;
    
    html += '<div class="attr-row-v5" style="border-left:3px solid ' + ai.color + '">';
    html += '<div class="attr-info">';
    html += '<span class="attr-name-v5" onclick="showAttrInfo(\'' + k + '\')" style="cursor:pointer;color:' + ai.color + '">' + ai.icon + ' ' + ai.name + '</span>';
    html += '<span class="attr-hint-v5">' + ai.brief + '</span>';
    html += '</div>';
    html += '<div class="attr-controls">';
    html += '<button class="attr-btn" onclick="adjAttrV5(\'' + k + '\', -1)" ' + (delta <= 0 ? 'disabled' : '') + '>−</button>';
    html += '<span class="attr-value' + (delta > 0 ? ' attr-boosted' : '') + '">' + cur + (delta > 0 ? ' (+' + delta + ')' : '') + '</span>';
    html += '<button class="attr-btn" onclick="adjAttrV5(\'' + k + '\', 1)" ' + (_attrDraft.pts <= 0 ? 'disabled' : '') + '>+</button>';
    html += '</div>';
    html += '</div>';
  }
  
  // Attr info tooltip container
  html += '<div id="attrTooltip" class="attr-tooltip" style="display:none"></div>';
  
  html += '<div class="pts-remaining">剩余点数：<span class="pts-num">' + _attrDraft.pts + '</span></div>';
  
  html += '<div class="btns">';
  html += '<button class="btn btn-primary" onclick="confirmNameAndAttrs()" ' + (_attrDraft.pts > 0 ? 'disabled' : '') + '>✅ 确认</button>';
  html += '<button class="btn" onclick="resetAttrs()">🔄 重置</button>';
  html += '</div>';
  
  render(html);
}

function randomName() {
  var names = ['亚瑟','艾拉','雷恩','索菲亚','德里克','露娜','卡斯帕','伊芙琳','罗根','米拉'];
  var el = document.getElementById('charName');
  if (el) el.value = names[rand(0, names.length - 1)];
}

function adjAttrV5(key, delta) {
  if (delta > 0 && _attrDraft.pts <= 0) return;
  var newVal = _attrDraft[key] + delta;
  var baseVal = G[key];
  if (delta < 0 && newVal < baseVal) return;
  _attrDraft[key] = newVal;
  _attrDraft.pts -= delta;
  sceneNameAndAttrs();
}

function resetAttrs() {
  _attrDraft = { str:G.str, agi:G.agi, int:G.int, cha:G.cha, luk:G.luk, pts:5 };
  sceneNameAndAttrs();
}

function confirmNameAndAttrs() {
  var nameEl = document.getElementById('charName');
  G.name = nameEl && nameEl.value ? nameEl.value.trim() : '无名';
  if (!G.name) G.name = '无名';
  
  // Apply attrs
  G.str = _attrDraft.str;
  G.agi = _attrDraft.agi;
  G.int = _attrDraft.int;
  G.cha = _attrDraft.cha;
  G.luk = _attrDraft.luk;
  
  // Calc HP/MP
  G.maxHp = calcMaxHp();
  G.hp = G.maxHp;
  G.maxMp = calcMaxMp();
  G.mp = G.maxMp;
  
  _attrDraft = null;
  G.gameStarted = true;
  
  // Start the main story!
  startStory();
  showChapterIntro(STORY[0].id);
}

  for (var i = 0; i < locs.length; i++) {
    var l = locs[i];
    var unlocked = LOCATIONS[l.id].unlocked;
    var isCurrent = G.location === l.id;
    
    if (unlocked) {
      // Clickable area (invisible, on top)
      html += '<circle cx="' + l.x + '" cy="' + l.y + '" r="22" fill="transparent" style="cursor:pointer" onclick="travelTo(\'' + l.id + '\')"/>';
      // Outer decorative ring
      html += '<circle cx="' + l.x + '" cy="' + l.y + '" r="16" fill="#1a1a1a" stroke="' + l.color + '" stroke-width="2"/>';
      // Inner sketch circle
      html += '<circle cx="' + l.x + '" cy="' + l.y + '" r="12" fill="none" stroke="' + l.color + '" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>';
      // Icon
      html += '<text x="' + l.x + '" y="' + (l.y + 5) + '" text-anchor="middle" fill="' + l.color + '" font-size="14">' + l.icon + '</text>';
      // Name label
      html += '<text x="' + l.x + '" y="' + (l.y + 30) + '" text-anchor="middle" fill="#aaa" font-size="10">' + l.name + '</text>';
      // Current location glow
      if (isCurrent) {
        html += '<circle cx="' + l.x + '" cy="' + l.y + '" r="22" fill="none" stroke="#d4a017" stroke-width="2" stroke-dasharray="4,2" opacity="0.8">';
        html += '<animate attributeName="r" values="20;24;20" dur="2s" repeatCount="indefinite"/>';
        html += '<animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>';
        html += '</circle>';
      }
    } else {
      // Locked - faded question mark
      html += '<circle cx="' + l.x + '" cy="' + l.y + '" r="10" fill="none" stroke="#444" stroke-width="1.5" stroke-dasharray="3,2"/>';
      html += '<text x="' + l.x + '" y="' + (l.y + 4) + '" text-anchor="middle" fill="#444" font-size="11">?</text>';
    }
  }
  
  // Compass rose (top-right corner)
  html += '<g transform="translate(370,60)">';
  html += '<circle cx="0" cy="0" r="18" fill="none" stroke="#5a5a4a" stroke-width="1"/>';
  html += '<text x="0" y="-22" text-anchor="middle" fill="#6a6a5a" font-size="9">N</text>';
  html += '<path d="M0 -15 L3 -5 L0 -8 L-3 -5 Z" fill="#6a6a5a"/>'; // north arrow
  html += '<text x="0" y="30" text-anchor="middle" fill="#5a5a4a" font-size="8">S</text>';
  html += '<text x="-26" y="4" text-anchor="middle" fill="#5a5a4a" font-size="8">W</text>';
  html += '<text x="26" y="4" text-anchor="middle" fill="#5a5a4a" font-size="8">E</text>';
  html += '</g>';
  
  html += '</svg>';
  html += '</div>';
  
  // Action buttons
  html += '<div class="map-actions">';
  html += '<div class="current-loc">📍 当前位置：<strong>' + LOCATIONS[G.location].name + '</strong></div>';
  
  if (LOCATIONS[G.location].type === 'town') {
    html += '<button class="btn btn-primary" onclick="sceneTown()">🏘️ 进入城镇</button>';
  } else {
    html += '<button class="btn btn-primary" onclick="enterMiniMap()">🗺️ 探索区域</button>';
  }
  
  html += '<button class="btn" onclick="sceneInventory()">🎒 背包</button>';
  html += '<button class="btn" onclick="scenePlayerInfo()">👤 角色</button>';
  // Story button - show current chapter progress
  var ch = getCurrentChapter();
  if (ch) {
    var prog = getChapterProgress();
    if (prog.allDone) {
      html += '<button class="btn" onclick="showStory()" style="border-color:#d4a017">🏆 主线完成！</button>';
    } else {
      html += '<button class="btn" onclick="showStory()" style="border-color:#d4a017">📖 ' + ch.chapter + ' (' + prog.done + '/' + prog.total + ')</button>';
    }
  }
  html += '</div>';
  
  render(html);
}

function travelTo(locId) {
  if (!LOCATIONS[locId] || !LOCATIONS[locId].unlocked) {
    toast('🔒 尚未解锁');
    return;
  }
  if (G.location === locId) {
    toast('你已经在这里了');
    return;
  }
  G.location = locId;
  updateStatus();
  toast('🚶 前往' + LOCATIONS[locId].name);
  sceneWorldMap();
}

// ═══════════════════════════════════════════════════════════
// MINI-MAP SYSTEM (per-location exploration)
// ═══════════════════════════════════════════════════════════

function leaveMiniMap() {
  // Reset boss defeated status for this location when leaving
  var loc = LOCATIONS[G.location];
  if (loc) {
    var prefix = G.location + '_';
    for (var key in G.bossDefeated) {
      if (key.indexOf(prefix) === 0) {
        delete G.bossDefeated[key];
      }
    }
  }
  G.miniMapPos = null;
  sceneWorldMap();
}

function enterMiniMap() {
  var loc = LOCATIONS[G.location];
  if (!loc.mapConfig) {
    toast('这里没有可探索的区域');
    return;
  }
  var map = getMapForLocation();
  G.miniMapPos = { r: map.startR, c: map.startC };
  // Mark start as visited
  map.rooms[map.startR][map.startC].visited = true;
  // Story trigger: visited a location
  checkStoryTriggers('visit_location', G.location);
  renderMiniMap();
}

function renderMiniMap(msg) {
  var map = getMapForLocation();
  var room = map.rooms[G.miniMapPos.r][G.miniMapPos.c];
  
  // Reveal adjacent rooms
  var dirs = [{dr:-1,dc:0},{dr:1,dc:0},{dr:0,dc:-1},{dr:0,dc:1}];
  for (var di = 0; di < dirs.length; di++) {
    var nr = G.miniMapPos.r + dirs[di].dr, nc = G.miniMapPos.c + dirs[di].dc;
    var adjRoom = getRoom(map, nr, nc);
    if (adjRoom) adjRoom.revealed = true;
  }
  
  var html = '';
  html += '<div class="scene-title">' + map.name + '</div>';
  if (msg) html += '<div class="mini-msg">' + msg + '</div>';
  
  // Current room info
  var typeLabel = '';
  var typeHint = '';
  if (room.type === 'boss') { typeLabel = ' 👑'; typeHint = '危险区域'; }
  else if (room.type === 'treasure') { typeLabel = ' 📦'; typeHint = '有宝藏'; }
  else if (room.type === 'enemy') { typeLabel = ' ⚔️'; typeHint = '有敌人出没'; }
  else if (room.type === 'event') { typeLabel = ' 🔍'; typeHint = '可以调查'; }
  else if (room.type === 'water') { typeLabel = ' 💧'; typeHint = '水域，无法通行'; }
  else if (room.type === 'stone') { typeLabel = ' 🪨'; typeHint = '石堆，可以调查'; }
  else if (room.type === 'grass') { typeLabel = ' 🌿'; typeHint = '草地'; }
  else if (room.type === 'start') { typeLabel = ' 🚪'; typeHint = '入口'; }
  html += '<div class="mini-area">';
  html += '<div class="mini-area-name">' + typeLabel + ' ' + room.name + '</div>';
  html += '<div class="mini-area-desc">' + room.desc + (typeHint ? '<br><span style="color:#888;font-size:0.85em">' + typeHint + '</span>' : '') + '</div>';
  html += '</div>';
  
  // Grid mini map
  html += '<div class="mini-map-grid">';
  html += renderGridMap(map, G.miniMapPos.r, G.miniMapPos.c);
  html += '</div>';
  
  // Direction buttons (N/S/E/W) + Room actions
  html += '<div class="mini-controls">';
  
  // Movement buttons - 3x3 grid layout
  html += '<div class="move-grid">';
  var canN = canMove(map, G.miniMapPos.r - 1, G.miniMapPos.c);
  var canS = canMove(map, G.miniMapPos.r + 1, G.miniMapPos.c);
  var canW = canMove(map, G.miniMapPos.r, G.miniMapPos.c - 1);
  var canE = canMove(map, G.miniMapPos.r, G.miniMapPos.c + 1);
  html += '<div></div>';
  html += '<button class="move-btn" onclick="moveGrid(\'-1\',\'0\')" ' + (canN ? '' : 'disabled') + '>⬆️ 北</button>';
  html += '<div></div>';
  html += '<button class="move-btn" onclick="moveGrid(\'0\',\'-1\')" ' + (canW ? '' : 'disabled') + '>⬅️ 西</button>';
  html += '<div class="move-center">●</div>';
  html += '<button class="move-btn" onclick="moveGrid(\'0\',\'1\')" ' + (canE ? '' : 'disabled') + '>➡️ 东</button>';
  html += '<div></div>';
  html += '<button class="move-btn" onclick="moveGrid(\'1\',\'0\')" ' + (canS ? '' : 'disabled') + '>⬇️ 南</button>';
  html += '<div></div>';
  html += '</div>';
  
  // Room-specific actions
  html += '<div class="mini-actions">';
  // Enemies auto-trigger on step — no search button needed
  if (room.type === 'treasure') {
    html += '<button class="btn btn-primary" onclick="miniMapTreasure()">📦 搜索宝藏</button>';
  } else if (room.type === 'boss') {
    html += '<button class="btn btn-danger" onclick="miniMapBoss()">👑 挑战首领</button>';
  } else if (room.type === 'event') {
    html += '<button class="btn" onclick="miniMapEvent()">🔍 调查</button>';
  } else if (room.type === 'stone') {
    html += '<button class="btn" onclick="miniMapStone()">🪨 调查石堆</button>';
  }
  html += '<button class="btn" onclick="leaveMiniMap()">🚪 离开区域</button>';
  html += '</div>';
  
  html += '</div>';
  render(html);
}

function renderGridMap(map, curR, curC) {
  var cols = map.cols;
  var rows = map.rows;
  var cellSize = Math.min(28, Math.floor(260 / Math.max(cols, rows)));
  var gap = 2;
  var totalW = cols * (cellSize + gap);
  var totalH = rows * (cellSize + gap);
  
  var html = '';
  html += '<svg viewBox="0 0 ' + totalW + ' ' + totalH + '" class="mini-svg" style="width:100%;max-height:280px">';
  
  // SVG defs for terrain patterns
  html += '<defs>';
  // Water pattern - wavy blue lines
  html += '<pattern id="pWater" width="8" height="8" patternUnits="userSpaceOnUse">';
  html += '<rect width="8" height="8" fill="#1a3a5c"/>';
  html += '<path d="M0 4 Q2 2 4 4 Q6 6 8 4" fill="none" stroke="#4488aa" stroke-width="0.8" opacity="0.6"/>';
  html += '</pattern>';
  // Grass pattern - small green dots
  html += '<pattern id="pGrass" width="6" height="6" patternUnits="userSpaceOnUse">';
  html += '<rect width="6" height="6" fill="#1a2a1a"/>';
  html += '<circle cx="2" cy="3" r="0.6" fill="#3a6a3a" opacity="0.7"/>';
  html += '<circle cx="5" cy="1" r="0.5" fill="#4a7a4a" opacity="0.5"/>';
  html += '<circle cx="4" cy="5" r="0.4" fill="#3a6a3a" opacity="0.4"/>';
  html += '</pattern>';
  // Stone pattern - speckled grey
  html += '<pattern id="pStone" width="7" height="7" patternUnits="userSpaceOnUse">';
  html += '<rect width="7" height="7" fill="#2a2520"/>';
  html += '<circle cx="2" cy="2" r="1" fill="#4a4035" opacity="0.6"/>';
  html += '<circle cx="5" cy="5" r="0.8" fill="#555045" opacity="0.5"/>';
  html += '<circle cx="6" cy="1" r="0.6" fill="#3a3530" opacity="0.4"/>';
  html += '</pattern>';
  html += '</defs>';
  
  for (var r = 0; r < rows; r++) {
    for (var c = 0; c < cols; c++) {
      var room = map.rooms[r][c];
      var x = c * (cellSize + gap);
      var y = r * (cellSize + gap);
      var isCurrent = (r === curR && c === curC);
      
      if (!room.revealed) {
        // Fog of war
        html += '<rect x="' + x + '" y="' + y + '" width="' + cellSize + '" height="' + cellSize + '" fill="#0a0a0a" stroke="#222" stroke-width="0.5" rx="2" opacity="0.6"/>';
        continue;
      }
      
      // Determine room visuals by terrain type
      var fill = '#222';
      var stroke = '#444';
      var icon = '';
      var iconSize = Math.max(8, cellSize * 0.45);
      var isImpassable = false;
      
      if (room.type === 'start') {
        fill = '#2a3a2a'; stroke = '#6b8'; icon = '🚪';
      } else if (room.type === 'boss') {
        fill = '#3a1a1a'; stroke = '#c44'; icon = '👑';
      } else if (room.type === 'water') {
        fill = 'url(#pWater)'; stroke = '#4488aa'; isImpassable = true;
      } else if (room.type === 'stone') {
        fill = 'url(#pStone)'; stroke = '#6a5a4a'; icon = '🪨';
      } else if (room.type === 'grass') {
        fill = 'url(#pGrass)'; stroke = '#4a7a4a';
      } else if (room.type === 'treasure') {
        // Treasure hidden until close
        fill = '#222'; stroke = '#444';
      } else if (room.type === 'event') {
        fill = '#222'; stroke = '#444';
      } else if (room.type === 'enemy') {
        // Enemies hidden - show as normal path
        fill = '#222'; stroke = '#444';
      } else {
        // Regular path - flat ground
        fill = '#1a1a18'; stroke = '#3a3a35';
      }
      
      if (room.visited && !isImpassable && room.type !== 'grass' && room.type !== 'stone' && room.type !== 'water') {
        // Visited rooms slightly lighter
        fill = '#252520'; stroke = '#4a4a40';
      }
      
      // Draw cell
      var clickAttr = isImpassable ? '' : ' onclick="clickGridCell(' + r + ',' + c + ')"';
      var cursorStyle = isImpassable ? 'cursor:not-allowed' : 'cursor:pointer';
      html += '<rect x="' + x + '" y="' + y + '" width="' + cellSize + '" height="' + cellSize + '" fill="' + fill + '" stroke="' + (isCurrent ? '#d4a017' : stroke) + '" stroke-width="' + (isCurrent ? 2.5 : 1) + '" rx="2" style="' + cursorStyle + '"' + clickAttr + '/>';
      
      // Water wave overlay detail
      if (room.type === 'water') {
        var cx = x + cellSize / 2;
        var cy = y + cellSize / 2;
        html += '<path d="M' + (x+3) + ' ' + (cy-2) + ' Q' + (cx) + ' ' + (cy-5) + ' ' + (x+cellSize-3) + ' ' + (cy-2) + '" fill="none" stroke="#6699bb" stroke-width="0.5" opacity="0.5"/>';
        html += '<path d="M' + (x+4) + ' ' + (cy+3) + ' Q' + (cx) + ' ' + (cy) + ' ' + (x+cellSize-4) + ' ' + (cy+3) + '" fill="none" stroke="#6699bb" stroke-width="0.4" opacity="0.4"/>';
      }
      
      // Grass blade details
      if (room.type === 'grass') {
        var gx = x + 4;
        html += '<line x1="' + (gx) + '" y1="' + (y+cellSize-3) + '" x2="' + (gx-1) + '" y2="' + (y+cellSize-7) + '" stroke="#4a8a4a" stroke-width="0.5" opacity="0.6"/>';
        html += '<line x1="' + (gx+5) + '" y1="' + (y+cellSize-3) + '" x2="' + (gx+6) + '" y2="' + (y+cellSize-8) + '" stroke="#5a9a5a" stroke-width="0.4" opacity="0.5"/>';
        html += '<line x1="' + (gx+10) + '" y1="' + (y+cellSize-3) + '" x2="' + (gx+9) + '" y2="' + (y+cellSize-7) + '" stroke="#4a8a4a" stroke-width="0.5" opacity="0.4"/>';
      }
      
      // Stone detail - small rock shapes
      if (room.type === 'stone') {
        var sx = x + cellSize/2;
        var sy = y + cellSize/2;
        html += '<ellipse cx="' + sx + '" cy="' + (sy+2) + '" rx="4" ry="3" fill="#5a5040" stroke="#6a6050" stroke-width="0.5" opacity="0.7"/>';
        html += '<ellipse cx="' + (sx-4) + '" cy="' + (sy-1) + '" rx="2.5" ry="2" fill="#4a4035" stroke="#5a5045" stroke-width="0.4" opacity="0.6"/>';
      }
      
      // Icon (emoji)
      if (icon) {
        html += '<text x="' + (x + cellSize / 2) + '" y="' + (y + cellSize * 0.65) + '" text-anchor="middle" font-size="' + iconSize + '">' + icon + '</text>';
      }
      
      // Current position marker
      if (isCurrent) {
        html += '<rect x="' + (x - 1) + '" y="' + (y - 1) + '" width="' + (cellSize + 2) + '" height="' + (cellSize + 2) + '" fill="none" stroke="#d4a017" stroke-width="2" rx="3" stroke-dasharray="3,2">';
        html += '<animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>';
        html += '</rect>';
      }
    }
  }
  
  html += '</svg>';
  return html;
}

function clickGridCell(r, c) {
  var map = getMapForLocation();
  var room = getRoom(map, r, c);
  if (!room || !room.revealed) return;
  
  // Can't step on water tiles
  if (room.type === 'water') {
    toast('💧 水域无法通行');
    return;
  }
  
  // Can only move to adjacent cells (N/S/E/W)
  var dr = Math.abs(r - G.miniMapPos.r);
  var dc = Math.abs(c - G.miniMapPos.c);
  if (!((dr === 1 && dc === 0) || (dr === 0 && dc === 1))) {
    toast('🔒 只能移动到相邻格子');
    return;
  }
  
  // Move there
  G.miniMapPos = { r: r, c: c };
  room.visited = true;
  
  // Auto-trigger room events on step
  if (room.type === 'enemy') {
    miniMapBattle();
  } else if (room.type === 'boss') {
    // Boss auto-trigger on step — but check if already defeated
    var bossKey = G.location + '_' + r + '_' + c;
    if (G.bossDefeated[bossKey]) {
      renderMiniMap('首领已被击败，巢穴空空荡荡...');
    } else {
      miniMapBoss();
    }
  } else if (room.type === 'stone') {
    renderMiniMap('🪨 石堆似乎可以调查...');
  } else {
    renderMiniMap('前往 ' + room.name + '...');
  }
}

function moveGrid(dr, dc) {
  var map = getMapForLocation();
  var nr = G.miniMapPos.r + parseInt(dr);
  var nc = G.miniMapPos.c + parseInt(dc);
  var room = getRoom(map, nr, nc);
  if (!room) {
    toast('那个方向没有路');
    return;
  }
  if (room.type === 'water') {
    toast('💧 水域无法通行');
    return;
  }
  G.miniMapPos = { r: nr, c: nc };
  room.visited = true;
  
  // Auto-trigger room events on step
  if (room.type === 'enemy') {
    miniMapBattle();
  } else if (room.type === 'boss') {
    var bossKey2 = G.location + '_' + nr + '_' + nc;
    if (G.bossDefeated[bossKey2]) {
      renderMiniMap('首领已被击败，巢穴空空荡荡...');
    } else {
      miniMapBoss();
    }
  } else if (room.type === 'stone') {
    renderMiniMap('🪨 石堆似乎可以调查...');
  } else {
    renderMiniMap('你向' + (dr === '-1' ? '北' : dr === '1' ? '南' : dc === '-1' ? '西' : '东') + '前进...');
  }
}

function miniMapStone() {
  var roll = Math.random();
  var html = '';
  html += '<div class="scene-title">🪨 石堆调查</div>';
  html += '<div class="event-text">你仔细翻检石堆...</div>';
  
  if (roll < 0.35) {
    // Find gold
    var gold = rand(5, 20 + G.level * 3);
    G.gold += gold;
    html += '<div class="event-result good">💰 你在石头缝中发现了 ' + gold + ' 金币！</div>';
  } else if (roll < 0.55) {
    // Find item
    var items = [
      { name:'磨刀石', type:'accessory', atk:2, desc:'一块可以让武器更锋利的磨刀石' },
      { name:'护身符碎片', type:'accessory', def:2, desc:'刻有微弱符文的护身符碎片' },
      { name:'幸运石', type:'accessory', luk:2, desc:'据说能带来好运的圆润小石头' }
    ];
    var item = items[rand(0, items.length - 1)];
    G.inventory.push(item);
    html += '<div class="event-result good">✨ 你发现了一件物品：<strong>' + item.name + '</strong>' + (item.atk ? ' ⚔️+' + item.atk : '') + (item.def ? ' 🛡️+' + item.def : '') + (item.luk ? ' 🎲+' + item.luk : '') + '</div>';
  } else if (roll < 0.70) {
    // Find key
    G.keys = (G.keys || 0) + 1;
    html += '<div class="event-result good">🔑 你找到了一把宝箱钥匙！</div>';
  } else {
    // Nothing
    html += '<div class="event-result">除了碎石和尘土，什么也没发现。</div>';
  }
  
  // Mark stone as investigated (change to path)
  var map = getMapForLocation();
  var room = map.rooms[G.miniMapPos.r][G.miniMapPos.c];
  if (room.type === 'stone') room.type = 'path'; // Depleted
  
  html += '<button class="btn" onclick="renderMiniMap()">继续探索</button>';
  updateStatus();
  render(html);
}

function miniMapBattle() {
  var loc = LOCATIONS[G.location];
  var enemyIds = loc.enemies || ['goblin'];
  var count = rand(1, 2);
  var enemies = [];
  
  for (var i = 0; i < count; i++) {
    var eid = enemyIds[rand(0, enemyIds.length - 1)];
    var template = ENEMIES[eid];
    if (template) {
      enemies.push(Object.assign({}, template, { curHp: template.hp }));
    }
  }
  
  G.battle = { enemies: enemies, log: [], turn: 0, defending: false, warcry: 0, gamblerUsed: false, dungeon: true };
  G.inBattle = true;
  G.selectedTarget = 0;
  G.attackMode = null;
  renderBattle('遭遇 ' + enemies.length + ' 只敌人！');
}

function miniMapBoss() {
  var bossKey = G.location + '_' + G.miniMapPos.r + '_' + G.miniMapPos.c;
  if (G.bossDefeated[bossKey]) {
    toast('👑 首领已被击败，需要离开区域后重新进入才会刷新');
    return;
  }
  var template = ENEMIES.boss_goblin;
  G.battle = { 
    enemies: [Object.assign({}, template, { curHp: template.hp })], 
    log: [], turn: 0, defending: false, warcry: 0, gamblerUsed: false, dungeon: true, isBoss: true,
    bossKey: bossKey
  };
  G.inBattle = true;
  G.selectedTarget = 0;
  G.attackMode = null;
  
  // Boss pre-battle dialog based on location
  var bossNpcId = null;
  if (G.location === 'lake') bossNpcId = null; // Goblin shaman doesn't talk much
  else if (G.location === 'darkforest' || G.location === 'fortress') bossNpcId = 'darkblade';
  else if (G.location === 'mine') bossNpcId = 'xuanming';
  
  if (bossNpcId && NPC_DIALOGS[bossNpcId]) {
    // Show boss dialog first, then battle
    G._pendingBossBattle = true;
    showDialog(bossNpcId, 0);
    // Override the dialog's "返回" button to start battle instead
    return;
  }
  
  renderBattle('👑 首领战！');
}

function miniMapTreasure() {
  var gold = rand(20, 80);
  G.gold += gold;
  // Mark treasure as collected (change room type)
  var map = getMapForLocation();
  var room = map.rooms[G.miniMapPos.r][G.miniMapPos.c];
  room.type = 'path'; // treasure collected
  // Story trigger: found treasure
  checkStoryTriggers('find_treasure', 'treasure');
  updateStatus();
  toast('💰 发现 ' + gold + ' 金币！');
  renderMiniMap('你在角落里发现了一个钱袋！');
}

function miniMapEvent() {
  // Random event outcomes
  var events = [
    { msg: '你发现了一面古老的石碑，上面刻着模糊的文字...', effect: function() { G.xp += 15; } },
    { msg: '一位旅人向你分享了一些有用的信息。', effect: function() { G.xp += 10; } },
    { msg: '你在地上发现了一些散落的金币。', effect: function() { G.gold += rand(5, 25); } },
    { msg: '一股神秘的力量从地面涌出，你感觉精力恢复了。', effect: function() { G.hp = Math.min(G.maxHp, G.hp + 30); G.mp = Math.min(G.maxMp, G.mp + 20); } },
    { msg: '你发现了一个隐藏的补给箱！', effect: function() { G.gold += rand(10, 30); G.hp = Math.min(G.maxHp, G.hp + 20); } }

  html += '</div>';

  render(html);

function getActionText(mode, target) {
  var texts = {
    'attack': '⚔️ 挥剑斩向 ' + target + '！',
    'defend': '🛡️ 举盾防御，准备反击！',
    'origin': '✨ 发动起源技能！'
  };
  if (texts[mode]) return texts[mode];
  
  // Skill
  var sk = SKILLS.find(function(s) { return s.id === mode; });
  if (sk) {
    return sk.emoji + ' 施展「' + sk.name + '」攻击 ' + target + '！';
  }
  return '发动攻击';
}

function setAttackMode(mode) {
  G.attackMode = mode;
  renderBattle('已选择：' + (mode === 'attack' ? '普通攻击' : mode === 'defend' ? '防御' : mode === 'origin' ? G.origin.skill.name : '技能'));
}

function selectTarget(idx) {
  G.selectedTarget = idx;
  renderBattle('目标：' + (G.battle.enemies[idx] ? G.battle.enemies[idx].name : '?'));
}

function executeAttack() {
  var mode = G.attackMode;
  if (!mode) { toast('请先选择行动方式'); return; }
  
  if (mode === 'attack') {
    playerAttack();
  } else if (mode === 'defend') {
    playerDefend();
  } else if (mode === 'origin') {
    useOriginSkill();
  } else {
    playerSkill(mode);
  }
}

function playerAttack() {
  var b = G.battle;
  var alive = b.enemies.filter(function(e) { return e.curHp > 0; });
  if (alive.length === 0) return;

  var targetIdx = G.selectedTarget;
  if (!b.enemies[targetIdx] || b.enemies[targetIdx].curHp <= 0) {
    for (var i = 0; i < b.enemies.length; i++) {
      if (b.enemies[i].curHp > 0) { targetIdx = i; break; }
    }
  }
  var target = b.enemies[targetIdx];

  var dmg = rand(Math.floor(calcAtk() * 0.8), Math.floor(calcAtk() * 1.2));
  if (b.warcry && b.warcry > 0) dmg = Math.floor(dmg * 1.2);
  
  var isCrit = Math.random() * 100 < calcCrit();
  if (isCrit) dmg = Math.floor(dmg * (1 + calcCritDmg()));
  
  target.curHp -= dmg;
  
  // Visual effect: flash enemy sprite
  var enemyEl = document.getElementById('enemy-sprite-' + targetIdx);
  if (enemyEl) {
    enemyEl.style.transition = 'transform 0.1s, filter 0.1s';
    enemyEl.style.transform = 'translateX(-8px)';
    enemyEl.style.filter = 'brightness(2) saturate(0)';
    setTimeout(function() {
      enemyEl.style.transform = 'translateX(8px)';
      enemyEl.style.filter = 'brightness(1.5) sepia(1) saturate(3)';
    }, 100);
    setTimeout(function() {
      enemyEl.style.transform = 'translateX(0)';
      enemyEl.style.filter = '';
    }, 200);
  }
  
  // Damage number popup
  showDamagePopup('player-dmg', dmg, isCrit);
  
  b.log.push('⚔️ 你的攻击命中 ' + target.name + '，造成 <span class="dmg-crit">' + dmg + '</span>' + (isCrit ? ' <span class="crit-text">会心一击！</span>' : ''));
  
  if (b.warcry && b.warcry > 0) b.warcry--;

  G.attackMode = null;
  setTimeout(function() { enemyTurn(); }, 600);
}

function playerDefend() {
  G.battle.defending = true;
  G.battle.log.push('🛡️ 你举起盾牌，准备迎接冲击');
  G.attackMode = null;
  setTimeout(function() { enemyTurn(); }, 600);
}

function useOriginSkill() {
  var o = G.origin;
  if (!o || !o.skill) return;
  
  if (o.id === 'warrior') {
    G.battle.warcry = 3;
    G.battle.log.push('📢 战吼！你的斗志高涨，攻击力提升20%');
  } else if (o.id === 'gambler') {
    gamblerAttack();
    return;
  } else if (o.id === 'cleric') {
    var healAmt = Math.floor(G.maxHp * 0.1);
    G.hp = Math.min(G.maxHp, G.hp + healAmt);
    G.battle.log.push('✨ 祈祷生效，恢复 ' + healAmt + ' HP');
  } else {
    G.battle.log.push('🔮 ' + o.skill.name + '：' + o.skill.desc);
  }
  
  G.attackMode = null;
  setTimeout(function() { enemyTurn(); }, 600);
}

function playerSkill(sid) {
  var sk = SKILLS.find(function(s) { return s.id === sid; });
  if (!sk) return;
  if (G.mp < sk.cost) { toast('💧 MP不足！'); return; }
  
  G.mp -= sk.cost;
  var b = G.battle;
  var alive = b.enemies.filter(function(e) { return e.curHp > 0; });
  
  if (sk.target === '自身' || sk.type === '治疗') {
    if (sk.healMin) {
      var heal = rand(sk.healMin, sk.healMax);
      G.hp = Math.min(G.maxHp, G.hp + heal);
      b.log.push(sk.name + ' 恢复 ' + heal + ' HP');
    }
  } else if (sk.aoe) {
    var total = 0;
    for (var i = 0; i < alive.length; i++) {
      var d = rand(sk.dmgMin, sk.dmgMax);
      alive[i].curHp -= d;
      total += d;
    }
    b.log.push(sk.name + ' 对所有敌人造成 ' + total + ' 伤害');
  } else if (sk.missiles) {
    var total2 = 0;
    var targetIdx = G.selectedTarget;
    if (!b.enemies[targetIdx] || b.enemies[targetIdx].curHp <= 0) {
      for (var j = 0; j < b.enemies.length; j++) {
        if (b.enemies[j].curHp > 0) { targetIdx = j; break; }
      }
    }
    for (var m = 0; m < sk.missiles; m++) {
      total2 += rand(sk.dmgMin, sk.dmgMax);
    }
    b.enemies[targetIdx].curHp -= total2;
    b.log.push(sk.name + ' 命中目标，造成 ' + total2 + ' 伤害');
  } else {
    var targetIdx2 = G.selectedTarget;
    if (!b.enemies[targetIdx2] || b.enemies[targetIdx2].curHp <= 0) {
      for (var k = 0; k < b.enemies.length; k++) {
        if (b.enemies[k].curHp > 0) { targetIdx2 = k; break; }
      }
    }
    var dmg2 = rand(sk.dmgMin, sk.dmgMax);
    b.enemies[targetIdx2].curHp -= dmg2;
    b.log.push(sk.name + ' 造成 ' + dmg2 + ' 伤害');
  }
  
  G.attackMode = null;
  updateStatus();
  setTimeout(function() { enemyTurn(); }, 600);
}

function gamblerAttack() {
  var b = G.battle;
  var winChance = 0.25 + G.luk * 0.02;
  if (Math.random() < winChance) {
    var targetIdx = G.selectedTarget;
    if (!b.enemies[targetIdx] || b.enemies[targetIdx].curHp <= 0) {
      for (var i = 0; i < b.enemies.length; i++) {
        if (b.enemies[i].curHp > 0) { targetIdx = i; break; }
      }
    }
    var target = b.enemies[targetIdx];
    var dmg = Math.floor(calcAtk() * 2.5);
    target.curHp -= dmg;
    b.log.push('🎲 孤注一掷！命运站在你这边，造成 ' + dmg + ' 伤害！');
  } else {
    var selfDmg = Math.floor(G.hp * 0.3);
    G.hp = Math.max(1, G.hp - selfDmg);
    b.log.push('🎲 孤注一掷失败！运气背弃了你，自伤 ' + selfDmg);
    updateStatus();
  }
  b.gamblerUsed = true;
  G.attackMode = null;
  setTimeout(function() { enemyTurn(); }, 600);
}

function enemyTurn() {
  var b = G.battle;
  var alive = b.enemies.filter(function(e) { return e.curHp > 0; });

  for (var i = 0; i < alive.length; i++) {
    var e = alive[i];
    if (Math.random() * 100 < calcDodge()) {
      b.log.push('💨 你闪避了 ' + e.name + ' 的攻击！');
      // Dodge visual: player status bar flash
      flashPlayerStatus('#22c55e');
      continue;
    }
    var dmg = rand(Math.floor(e.atk * 0.8), Math.floor(e.atk * 1.2));
    if (b.defending) dmg = Math.floor(dmg * 0.5);
    G.hp = Math.max(0, G.hp - dmg);
    b.log.push(e.name + ' 攻击命中，造成 <span class="dmg-player">' + dmg + '</span> 伤害');
    
    // Damage number popup on player
    showDamagePopup('enemy-dmg', dmg, false);
    // Flash player status red
    flashPlayerStatus('#ef4444');
  }

  b.turn++;
  b.defending = false;
  updateStatus();
  renderBattle('敌方回合');
}

// Visual effect helpers
function showDamagePopup(id, amount, isCrit) {
  var popup = document.createElement('div');
  popup.id = id;
  popup.className = 'dmg-popup' + (isCrit ? ' dmg-popup-crit' : '');
  popup.textContent = (isCrit ? '💥' : '') + '-' + amount;
  var gameEl = document.getElementById('game');
  if (gameEl) {
    gameEl.style.position = 'relative';
    popup.style.position = 'absolute';
    popup.style.left = isCrit ? '60%' : '50%';
    popup.style.top = id === 'enemy-dmg' ? '75%' : '25%';
    gameEl.appendChild(popup);
    setTimeout(function() { if (popup.parentNode) popup.parentNode.removeChild(popup); }, 800);
  }
}

function flashPlayerStatus(color) {

    statusEl.style.transition = 'background 0.15s';
    statusEl.style.background = color;
    statusEl.style.borderRadius = '4px';
    setTimeout(function() { statusEl.style.background = ''; }, 300);
  }
}

function tryFlee() {
  var b = G.battle;
  if (b.isBoss) {
    toast('👑 首领战中无法逃跑！');
    return;
  }
  
  // Flee chance based on AGI comparison
  // Average enemy AGI vs player AGI
  var totalEnemyAgi = 0;
  var alive = b.enemies.filter(function(e) { return e.curHp > 0; });
  for (var i = 0; i < alive.length; i++) {
    totalEnemyAgi += (alive[i].agi || 8); // default agi 8 if not set
  }
  var avgEnemyAgi = alive.length > 0 ? totalEnemyAgi / alive.length : 8;
  
  // If player AGI > enemy AGI: almost 100% flee (95%)
  // If player AGI == enemy AGI: ~70% flee
  // If player AGI < enemy AGI: ~30-50% flee
  var agiDiff = G.agi - avgEnemyAgi;
  var fleeChance;
  if (agiDiff > 0) {
    fleeChance = Math.min(98, 70 + agiDiff * 5); // Higher AGI = near guaranteed
  } else {
    fleeChance = Math.max(15, 70 + agiDiff * 5); // Lower AGI = harder
  }
  
  if (Math.random() * 100 < fleeChance) {
    toast('🏃 成功逃脱！(敏捷' + G.agi + ' vs 敌均' + Math.round(avgEnemyAgi) + ')');
    G.inBattle = false;
    G.battle = null;
    G.attackMode = null;
    // Stay on mini-map, don't go to world map
    if (G.miniMapPos && LOCATIONS[G.location] && LOCATIONS[G.location].mapConfig) {
      renderMiniMap('成功逃脱，继续探索...');
    } else {
      sceneWorldMap();
    }
  } else {
    b.log.push('🏃 逃跑失败！你的敏捷不足以甩开敌人');
    G.attackMode = null;
    setTimeout(function() { enemyTurn(); }, 600);
  }
}

// Random equipment drop generator
function generateRandomDrop(isBoss) {
  var slots = ['weapon', 'armor', 'accessory'];
  var slot = slots[rand(0, slots.length - 1)];
  
  var names = {
    weapon: ['短剑', '长剑', '战斧', '法杖', '短弓', '匕首', '阔剑', '长矛'],
    armor: ['皮甲', '锁子甲', '铁甲', '法师长袍', '轻皮甲', '链甲', '板甲'],
    accessory: ['铜戒指', '银项链', '护符', '皮带', '骨戒', '护腕']
  };
  
  // Prefix based on rarity
  var prefixes = {
    common: ['破旧的', '普通的', '磨损的'],
    uncommon: ['精良的', '加固的', '打磨的'],
    rare: ['稀有的', '附魔的', '符文的'],
    epic: ['史诗的', '远古的', '龙纹的']
  };
  
  // Determine rarity
  var rarityRoll = Math.random() * 100;
  var rarity, rarityColor;
  if (isBoss) {
    if (rarityRoll < 30) { rarity = 'epic'; rarityColor = '#a855f7'; }
    else if (rarityRoll < 70) { rarity = 'rare'; rarityColor = '#3b82f6'; }
    else { rarity = 'uncommon'; rarityColor = '#22c55e'; }
  } else {
    if (rarityRoll < 3) { rarity = 'epic'; rarityColor = '#a855f7'; }
    else if (rarityRoll < 15) { rarity = 'rare'; rarityColor = '#3b82f6'; }
    else if (rarityRoll < 50) { rarity = 'uncommon'; rarityColor = '#22c55e'; }
    else { rarity = 'common'; rarityColor = '#9ca3af'; }
  }
  
  var prefix = prefixes[rarity][rand(0, prefixes[rarity].length - 1)];
  var baseName = names[slot][rand(0, names[slot].length - 1)];
  var levelScale = Math.max(1, G.level - rand(0, 2));
  
  var item = {
    name: prefix + baseName,
    type: 'equipment',
    slot: slot,
    level: levelScale,
    rarity: rarity,
    icon: slot === 'weapon' ? '⚔️' : slot === 'armor' ? '🛡️' : '💍'
  };
  
  // Stats based on rarity and level
  var mult = rarity === 'epic' ? 2.0 : rarity === 'rare' ? 1.5 : rarity === 'uncommon' ? 1.2 : 1.0;
  if (slot === 'weapon') {
    item.atk = Math.floor((5 + levelScale * 2) * mult);
  } else if (slot === 'armor') {
    item.def = Math.floor((3 + levelScale * 1.5) * mult);
    item.hp = Math.floor((10 + levelScale * 3) * mult);
  } else {
    item.atk = Math.floor(levelScale * 0.5 * mult);
    item.def = Math.floor(levelScale * 0.3 * mult);
    item.hp = Math.floor(levelScale * 2 * mult);
  }
  
  return item;
}

function endBattle() {
  var b = G.battle;
  G.inBattle = false;

  var totalXp = 0;
  var totalGold = 0;
  var drops = []; // equipment/item drops
  for (var i = 0; i < b.enemies.length; i++) {
    var e = b.enemies[i];
    totalXp += e.xp || 0;
    totalGold += rand(e.goldMin || 0, e.goldMax || 0);
    
    // Equipment drop chance
    var dropRoll = Math.random() * 100;
    var baseDropRate = e.isBoss ? 60 : 15; // Boss 60%, normal 15%
    var lukBonus = G.luk * 1; // +1% per luk point
    var totalDropRate = Math.min(80, baseDropRate + lukBonus);
    
    if (dropRoll < totalDropRate) {
      var item = generateRandomDrop(e.isBoss);
      if (item) drops.push(item);
    }
    
    // Potion drop chance (30%)
    if (Math.random() * 100 < 30) {
      drops.push({ name: '小型生命药水', type: 'potion', heal: 30, icon: '🧪' });
    }
    // Key drop chance (5%, bosses 20%)
    if (Math.random() * 100 < (e.isBoss ? 20 : 5)) {
      G.keys = (G.keys || 0) + 1;
    }
  }

  // Mark boss as defeated
  if (b.isBoss && b.bossKey) {
    G.bossDefeated[b.bossKey] = true;
    checkStoryTriggers('defeat_boss', G.location);
  }

  G.xp += totalXp;
  G.gold += totalGold;
  G.totalBattlesWon++;
  checkStoryTriggers('win_battles', 'battle_won');

  // Add drops to inventory
  for (var d = 0; d < drops.length; d++) {
    if (drops[d].type === 'potion') {
      G.inventory.push(drops[d]);
    } else {
      G.inventory.push(drops[d]);
    }
  }

  // Level up check
  var levelUps = 0;
  while (G.xp >= calcNextXp(G.level)) {
    G.level++;
    G.xp -= calcNextXp(G.level - 1);
    G.attrPts += 3;
    G.skillPts += 1;
    G.maxHp = calcMaxHp();
    G.hp = G.maxHp;
    G.maxMp = calcMaxMp();
    G.mp = G.maxMp;
    levelUps++;
  }

  G.battle = null;
  G.attackMode = null;
  updateStatus();

  // If leveled up, show level-up screen with attr allocation
  if (levelUps > 0) {
    var html = '';
    html += '<div class="scene-title">🎉 升级！</div>';
    html += '<div class="level-up-info">';
    html += '<div class="level-up-level">Lv.' + G.level + '</div>';
    if (levelUps > 1) html += '<div class="level-up-multi">连续升了 ' + levelUps + ' 级！</div>';
    html += '<div class="level-up-rewards">';
    html += '<div>⭐ +' + totalXp + ' 经验值</div>';
    html += '<div>💰 +' + totalGold + ' 金币</div>';
    html += '<div>📝 +3 自由属性点</div>';
    if (drops.length > 0) {
      for (var dd = 0; dd < drops.length; dd++) {
        html += '<div class="drop-item">' + (drops[dd].icon || '⚔️') + ' ' + drops[dd].name + '</div>';
      }
    }
    html += '</div>';
    html += '</div>';
    html += '<button class="btn btn-primary" onclick="goToAttrAlloc()">✨ 分配属性点</button>';
    render(html);
    return;
  }

  var html = '';
  html += '<div class="scene-title">战斗胜利</div>';
  html += '<div class="victory-rewards">';
  html += '<div>⭐ ' + totalXp + ' 经验值</div>';
  html += '<div>💰 ' + totalGold + ' 金币</div>';
  if (drops.length > 0) {
    html += '<div class="drop-list">📦 战利品：</div>';
    for (var dd = 0; dd < drops.length; dd++) {
      var drop = drops[dd];
      var rarity = drop.rarity || 'common';
      html += '<div class="drop-item drop-' + rarity + '">' + (drop.icon || '⚔️') + ' ' + drop.name + '</div>';
    }
  }
  html += '</div>';
  html += '<button class="btn btn-primary" onclick="afterBattleContinue()">继续</button>';
  render(html);
}

function goToAttrAlloc() {
  if (G.attrPts > 0) {
    _playerInfoDraft = null;
    sceneAttrAllocation();

    afterBattleContinue();
  }
}

function afterBattleContinue() {
  var loc = LOCATIONS[G.location];
  if (loc && loc.mapConfig && G.miniMapPos) {
    renderMiniMap('战斗结束，继续探索...');

    sceneWorldMap();

}

  G.level++;
  G.xp -= calcNextXp(G.level - 1);
  G.attrPts += 3;
  G.skillPts += 1;
  G.maxHp = calcMaxHp();
  G.hp = G.maxHp;
  G.maxMp = calcMaxMp();

function sceneDeath() {
  G.totalBattlesLost++;
  var lossGold = Math.floor(G.gold * 0.1);
  var lossXp = Math.floor(G.xp * 0.2);
  G.gold -= lossGold;
  G.xp = Math.max(0, G.xp - lossXp);

  var html = '';

  html += '<div class="death-msg">你被送回最近的城镇...</div>';

  G.location = 'whitecity';
  updateStatus();
  sceneTown();

  if (G.gold < price) { toast('💰 金币不足'); return; }
  
  if (it.type === 'consumable') {
    G.gold -= price;
    if (it.heal) G.hp = Math.min(G.maxHp, G.hp + it.heal);
    if (it.restore) G.mp = Math.min(G.maxMp, G.mp + it.restore);
    updateStatus();
    toast('使用 ' + it.name + ' 成功！');
    sceneShop();
    return;
  }
  
  // Put in inventory instead of auto-equipping
  G.gold -= price;
  G.inventory.push({ id:it.id, name:it.name, type:it.type, atk:it.atk||0, def:it.def||0, hp:it.hp||0, luk:it.luk||0, int:it.int||0, heal:it.heal||0, restore:it.restore||0, price:it.price });

// ═══════════════════════════════════════════════════════════
// MAIN STORY SYSTEM - Guided questline
// ═══════════════════════════════════════════════════════════

function startStory() {
  G.storyProgress = { chapterId: STORY[0].id, completed: {} };
}

function getCurrentChapter() {
  if (!G.storyProgress) return null;
  return STORY.find(function(s) { return s.id === G.storyProgress.chapterId; });
}

function getChapterProgress() {
  var ch = getCurrentChapter();
  if (!ch) return null;
  var total = ch.objectives.length;
  var done = 0;
  for (var i = 0; i < ch.objectives.length; i++) {
    if (G.storyProgress.completed[ch.objectives[i].id]) done++;
  }
  return { total: total, done: done, allDone: done >= total && !ch.next };
}

function advanceStoryObj(objId) {
  if (!G.storyProgress) return;
  var ch = getCurrentChapter();
  if (!ch) return;
  // Check if this obj exists in current chapter
  var found = false;
  for (var i = 0; i < ch.objectives.length; i++) {
    if (ch.objectives[i].id === objId) { found = true; break; }
  }
  if (!found) return;
  if (G.storyProgress.completed[objId]) return; // already done
  G.storyProgress.completed[objId] = true;
  
  // Check if chapter complete
  var prog = getChapterProgress();
  if (prog.done >= prog.total) {
    completeStoryChapter();
  }
}

function completeStoryChapter() {
  var ch = getCurrentChapter();
  if (!ch) return;
  // Give rewards
  if (ch.reward) {
    G.xp += (ch.reward.xp || 0);
    G.gold += (ch.reward.gold || 0);
    while (G.xp >= calcNextXp(G.level)) { doLevelUp(); }
  }
  
  // Show completion
  var html = '';
  html += '<div class="scene-title">📖 章节完成！</div>';
  html += '<div class="chapter-complete">';
  html += '<div class="chapter-title">' + ch.chapter + '：' + ch.title + '</div>';
  html += '<div class="chapter-reward">奖励：' + (ch.reward.xp || 0) + ' XP + ' + (ch.reward.gold || 0) + ' 金币</div>';
  if (ch.next) {
    var next = STORY.find(function(s) { return s.id === ch.next; });
    if (next) {
      html += '<div class="chapter-next">下一章：<strong>' + next.chapter + '：' + next.title + '</strong></div>';
    }
  } else {
    html += '<div class="chapter-next" style="color:#d4a017">🏆 恭喜！你已完成当前主线剧情！</div>';
  }
  html += '</div>';
  
  // Advance to next chapter
  if (ch.next) {
    G.storyProgress.chapterId = ch.next;
    G.storyProgress.completed = {};
    // Show next chapter intro cinematic
    var nextIntro = CHAPTER_INTROS[ch.next];
    if (nextIntro) {
      html = '';
      html += '<div class="scene-title">✨ 新篇章</div>';
      html += '<button class="btn btn-primary" onclick="showChapterIntro(\'' + ch.next + '\')" style="width:100%">查看下一章引言</button>';
      render(html);
      return; // Don't show the default continue button
    }
  }
  
  html += '<button class="btn btn-primary" onclick="showStory()">继续</button>';
  render(html);
}

function showStory() {
  var ch = getCurrentChapter();
  if (!ch) {
    toast('暂无主线任务');
    return;
  }
  var prog = getChapterProgress();
  
  var html = '';
  html += '<div class="scene-title">📖 ' + ch.chapter + '：' + ch.title + '</div>';
  html += '<div class="story-entry">' + ch.entry + '</div>';
  html += '<div class="story-objectives">';
  html += '<div class="story-obj-title">任务目标 (' + prog.done + '/' + prog.total + ')</div>';
  for (var i = 0; i < ch.objectives.length; i++) {
    var obj = ch.objectives[i];
    var done = G.storyProgress.completed[obj.id];
    html += '<div class="story-obj' + (done ? ' obj-done' : '') + '">';
    html += (done ? '✅' : '⬜') + ' ' + obj.desc;
    html += '</div>';
  }
  html += '</div>';
  html += '<button class="btn" onclick="sceneWorldMap()">返回</button>';
  render(html);
}

function checkStoryTriggers(eventType, data) {
  if (!G.storyProgress) return;
  var ch = getCurrentChapter();
  if (!ch) return;
  for (var i = 0; i < ch.objectives.length; i++) {
    var obj = ch.objectives[i];
    if (G.storyProgress.completed[obj.id]) continue;
    
    if (obj.type === eventType) {
      if (obj.type === 'visit_place' && obj.place === data) advanceStoryObj(obj.id);
      if (obj.type === 'visit_location' && obj.location === data) advanceStoryObj(obj.id);
      if (obj.type === 'accept_any_quest') advanceStoryObj(obj.id);
      if (obj.type === 'win_battles' && data === 'battle_won') {
        // Track battle wins for story
        if (!G._storyBattleWins) G._storyBattleWins = 0;
        G._storyBattleWins++;
        if (G._storyBattleWins >= obj.count) advanceStoryObj(obj.id);
      }
      if (obj.type === 'find_treasure' && data === 'treasure') advanceStoryObj(obj.id);
      if (obj.type === 'reach_level' && G.level >= obj.level) advanceStoryObj(obj.id);
      if (obj.type === 'defeat_boss' && data === obj.location) advanceStoryObj(obj.id);
    }
    // Also check reach_level independently
    if (obj.type === 'reach_level' && G.level >= obj.level && !G.storyProgress.completed[obj.id]) {
      advanceStoryObj(obj.id);
    }
  }
}

function acceptQuest(qid) {
  if (G.quests.indexOf(qid) >= 0) { toast('已接取过此任务'); return; }
  G.quests.push(qid);
  // Don't set activeQuest - allow multiple quests
  
  // Story trigger: accepted any quest
  checkStoryTriggers('accept_any_quest', null);
  
  // Special: mine unlock quest
  if (qid === 'mine_unlock') {
    LOCATIONS.mine.unlocked = true;
    toast('✅ 接取「暗影矿洞调查」！已解锁暗影矿洞');
  } else {
    toast('✅ 接取任务成功！（可同时进行多个任务）');
  }
  sceneGuild();
}

function abandonQuest() {
  if (!G.activeQuest) return;
  G.activeQuest = null;
  toast('已放弃当前任务');
  sceneGuild();
}

function checkQuestProgress() {
  if (!G.activeQuest) return;
  var aq = QUESTS.find(function(q) { return q.id === G.activeQuest; });
  if (!aq) return;
  
  // Auto-complete conditions
  if (aq.id === 'forest_clear' && G.forestCleared) {
    completeQuest(aq.id);
  }
}

function completeQuest(qid) {
  var q = QUESTS.find(function(qx) { return qx.id === qid; });
  if (!q) return;
  
  if (q.rewardType === 'xp_gold') {
    G.xp += (q.xp || 0);
    G.gold += (q.gold || 0);
    while (G.xp >= calcNextXp(G.level)) { doLevelUp(); }
  }
  
  G.activeQuest = null;
  updateStatus();
  
  var html = '';
  html += '<div class="scene-title">🎉 任务完成！</div>';
  html += '<div class="victory-rewards">';
  html += '<div>' + q.icon + ' ' + q.name + '</div>';
  html += '<div>奖励：' + q.reward + '</div>';
  html += '</div>';
  html += '<button class="btn btn-primary" onclick="sceneTown()">继续</button>';
  render(html);
}
