<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>龙途传说 V1</title>
<style>

/* ═══════════════════════════════════════════════════════════
   手绘线稿风格 - Hand-drawn sketch style
   ═══════════════════════════════════════════════════════════ */

:root {
  --bg: #0d0d0d;
  --paper: #1a1a1a;
  --card: #222;
  --border: #3a3a3a;
  --text: #d4c8a8;
  --text-dim: #8a8070;
  --accent: #d4a017;
  --accent2: #c84;
  --hp: #c44;
  --mp: #48a;
  --xp: #4a4;
  --danger: #c44;
  --sketch: #a89070;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Georgia', 'Songti SC', 'STSong', serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#status {
  width: 100%;
  max-width: 100%;
  padding: 8px 16px;
  background: var(--card);
  border-bottom: 2px solid var(--border);
  font-size: 13px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  letter-spacing: 1px;
}

#game {
  width: 100%;
  max-width: 100%;
  padding: 16px;
  flex: 1;
}

#toast {
  position: fixed;
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: #000;
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 200;
  pointer-events: none;
}

/* ═══════════════════════════════════════════════════════════
   TYPOGRAPHY - Sketch feel
   ═══════════════════════════════════════════════════════════ */

.scene-title {
  font-size: 22px;
  font-weight: bold;
  color: var(--accent);
  text-align: center;
  margin-bottom: 12px;
  letter-spacing: 2px;
  /* Subtle sketch underline */
  position: relative;
  padding-bottom: 8px;
}
.scene-title::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 20%;
  right: 20%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

.scene-desc {
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
  margin-bottom: 16px;
  font-style: italic;
}

.scene-text {
  line-height: 1.8;
  font-size: 16px;
  margin: 12px 0;
}
.scene-text p { margin-bottom: 8px; }

/* ═══════════════════════════════════════════════════════════
   BUTTONS - Ink brush style
   ═══════════════════════════════════════════════════════════ */

.btn {
  display: block;
  padding: 12px 24px;
  background: var(--card);
  color: var(--text);
  border: 2px solid var(--border);
  border-radius: 6px;
  font-size: 16px;
  font-family: inherit;
  cursor: pointer;
  margin: 4px;
  transition: all 0.2s;
  /* Sketch border effect */
  box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
}
.btn:hover { 
  border-color: var(--accent); 
  color: var(--accent);
  box-shadow: 2px 2px 0 rgba(212,160,23,0.2);
}
.btn:active { transform: translate(1px, 1px); box-shadow: none; }
.btn-primary { 
  border-color: var(--accent); 
  color: var(--accent);
  background: rgba(212,160,23,0.1);
}
.btn-danger {
  border-color: var(--danger);
  color: var(--danger);
  background: rgba(204,68,68,0.1);
}
.btn-attack {
  width: 100%;
  padding: 14px;
  background: rgba(204,68,68,0.15);
  border-color: var(--danger);
  color: var(--danger);
  font-size: 16px;
  font-weight: bold;
  margin-top: 8px;
}
.btn-small {
  padding: 4px 10px;
  font-size: 12px;
  background: var(--card);
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
}
.btn-small:hover { color: var(--accent); border-color: var(--accent); }

.btns { text-align: center; margin: 12px 0; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

/* ═══════════════════════════════════════════════════════════
   ORIGIN CARDS - Parchment cards
   ═══════════════════════════════════════════════════════════ */

.origin-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin: 8px 0;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.origin-card:hover {
  border-color: var(--accent);
  box-shadow: 0 0 12px rgba(212,160,23,0.15);
}
.origin-emoji {
  font-size: 28px;
  text-align: center;
  margin-bottom: 4px;
}
.origin-name {
  font-size: 18px;
  font-weight: bold;
  color: var(--accent);
  text-align: center;
}
.origin-attrs {
  font-size: 12px;
  text-align: center;
  color: var(--text-dim);
  margin: 4px 0;
}
.origin-skill {
  font-size: 12px;
  text-align: center;
  color: var(--sketch);
}
.origin-story {
  line-height: 1.8;
  font-size: 14px;
  font-style: italic;
  color: var(--text);
  margin: 12px 0;
  padding: 12px;
  background: var(--card);
  border-left: 3px solid var(--accent);
  border-radius: 4px;
}

/* ═══════════════════════════════════════════════════════════
   NAME & ATTRIBUTE ALLOCATION
   ═══════════════════════════════════════════════════════════ */

.name-section {
  margin: 12px 0;
  display: flex;
  gap: 8px;
  align-items: center;
}
.name-section input {
  flex: 1;
  padding: 8px 12px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
}
.name-section input:focus { border-color: var(--accent); outline: none; }

.attr-row-v5 {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.attr-info { display: flex; flex-direction: column; }
.attr-name-v5 { font-size: 14px; font-weight: bold; }
.attr-hint-v5 { font-size: 11px; color: var(--text-dim); }
.attr-controls { display: flex; align-items: center; gap: 8px; }
.attr-btn {
  width: 44px; height: 44px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 50%;
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: inherit;
}
.attr-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.attr-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.attr-value { font-size: 16px; min-width: 50px; text-align: center; }
.attr-boosted { color: var(--accent); font-weight: bold; }
.pts-remaining { text-align: center; font-size: 14px; margin: 8px 0; }
.pts-num { color: var(--accent); font-weight: bold; font-size: 18px; }

/* ═══════════════════════════════════════════════════════════
   WORLD MAP
   ═══════════════════════════════════════════════════════════ */

.world-map {
  width: 100%;
  aspect-ratio: 1;
  margin: 12px 0;
  border: 2px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.world-svg {
  width: 100%;
  height: 100%;
}
.map-actions { margin: 12px 0; text-align: center; }
.current-loc {
  font-size: 14px;
  margin-bottom: 8px;
  color: var(--text-dim);
}

/* ═══════════════════════════════════════════════════════════
   MINI-MAP
   ═══════════════════════════════════════════════════════════ */

.mini-area {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  margin: 8px 0;
}
.mini-area-name {
  font-size: 16px;
  font-weight: bold;
  color: var(--accent);
  margin-bottom: 4px;
}
.mini-area-desc {
  font-size: 13px;
  color: var(--text-dim);
  font-style: italic;
  line-height: 1.6;
}
.mini-map-grid {
  margin: 8px 0;
}
.mini-svg {
  width: 100%;
  max-height: 150px;
}
.mini-directions {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin: 8px 0;
}
.dir-btn {
  padding: 10px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
}
.dir-btn:hover:not(.disabled) { border-color: var(--accent); color: var(--accent); }
.dir-btn.disabled { opacity: 0.3; cursor: not-allowed; }
.mini-actions { margin: 8px 0; text-align: center; }
.mini-msg {
  text-align: center;
  color: var(--accent);
  font-style: italic;
  margin-bottom: 8px;
}

/* ═══════════════════════════════════════════════════════════
   BATTLE - 炎龙骑士团2风格战斗界面
   ═══════════════════════════════════════════════════════════ */

.battle-scene {
  width: 100%;
  margin: 0 auto;
  background: #0a0a08;
  border: 2px solid #5a4a3a;
  border-radius: 4px;
  overflow: hidden;
}
.battle-svg {
  width: 100%;
  display: block;
}

/* Dialog box - DOS-style text window */
.battle-dialog {
  background: #0a0a08;
  border: 2px solid #5a4a3a;
  border-top: none;
  padding: 6px 10px;
  font-size: 12px;
  line-height: 1.6;
  color: #c8c0a0;
  min-height: 50px;
  font-family: 'Noto Serif SC', serif;
}
.dialog-border {
  border: 1px solid #3a3228;
  padding: 4px 8px;
  border-radius: 2px;
}

/* Battle menu - DOS-style action buttons */
.battle-menu {
  margin-top: 4px;
}
.menu-row {
  display: flex;
  gap: 4px;
  margin-bottom: 4px;
}
.menu-btn {
  flex: 1;
  background: #1a1810;
  border: 1px solid #5a4a3a;
  color: #c8c0a0;
  padding: 8px 4px;
  font-size: 13px;
  font-family: 'Noto Serif SC', serif;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
  text-align: center;
  position: relative;
}
.menu-btn:hover:not(.disabled) {
  border-color: #d4a017;
  color: #d4a017;
  background: rgba(212,160,23,0.08);
}
.menu-btn.active {
  border-color: #d4a017;
  color: #d4a017;
  background: rgba(212,160,23,0.15);
  box-shadow: inset 0 0 8px rgba(212,160,23,0.1);
}
.menu-btn.disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
.mp-cost {
  font-size: 10px;
  color: #6688cc;
  margin-left: 4px;
}

.hint-text {
  text-align: center;
  color: #888;
  font-size: 12px;
  padding: 6px;
  border: 1px dashed #444;
  border-radius: 2px;
}

/* Keep legacy classes for compatibility */
.battle-header { display: none; }
.enemies-container { display: none; }
.enemy-card { display: none; }
.player-panel { display: none; }
.battle-log { display: none; }
.battle-controls { display: none; }
.attack-modes { display: none; }
.mode-btn { display: none; }
.battle-result { display: none; }
  margin-top: 2px;
}

/* Player panel */
.player-panel {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 6px;
  padding: 10px;
  margin: 8px 0;
}
.player-name {
  font-size: 14px;
  font-weight: bold;
  color: var(--accent);
  margin-bottom: 6px;
}

.player-stat {
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 4px 0;
}
.stat-label {
  font-size: 12px;
  min-width: 40px;
  color: var(--text-dim);
}
.stat-bar {
  flex: 1;
  height: 10px;
  background: #333;
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid #444;
}
.stat-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.3s;
}
.stat-fill.hp { background: linear-gradient(90deg, #c44, #a33); }
.stat-fill.mp { background: linear-gradient(90deg, #48a, #368); }
.stat-fill.xp { background: linear-gradient(90deg, #4a4, #383); }
.stat-value {
  font-size: 11px;
  color: var(--text-dim);
  min-width: 60px;
  text-align: right;
}

/* Battle log */
.battle-log {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px;
  margin: 6px 0;
  font-size: 12px;
  line-height: 1.6;
  max-height: 80px;
  overflow-y: auto;
}

/* Battle controls */
.battle-controls {
  margin: 8px 0;
}
.controls-label {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.attack-modes {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin: 4px 0;
}
.mode-btn {
  padding: 6px 10px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
}
.mode-btn:hover:not(.disabled) { border-color: var(--accent); color: var(--accent); }
.mode-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(212,160,23,0.1); }
.mode-btn.disabled { opacity: 0.3; cursor: not-allowed; }

/* Battle result */
.battle-result {
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  padding: 16px;
  margin: 8px 0;
}
.battle-result.win { color: var(--xp); }
.battle-result.lose { color: var(--danger); }

/* Damage text */
.dmg-crit { color: #e84; font-weight: bold; }
.crit-text { color: #fa0; }

/* ═══════════════════════════════════════════════════════════
   TOWN
   ═══════════════════════════════════════════════════════════ */

/* Town panorama SVG */
.town-panorama {
  margin: 4px 0 8px;
  border: 2px solid #3a3228;
  border-radius: 6px;
  overflow: hidden;
  background: #1a1820;
}
.town-svg {
  width: 100%;
  height: auto;
  display: block;
}
.bld-clickable:hover {
  filter: url(#bldGlow);
  opacity: 0.9;
}
.bld-clickable:active {
  opacity: 0.7;
}

/* Damage popup */
.dmg-popup {
  font-size: 20px;
  font-weight: bold;
  color: #ef4444;
  text-shadow: 0 0 4px #000, 0 0 8px #f00;
  pointer-events: none;
  animation: dmgFloat 0.8s ease-out forwards;
  z-index: 100;
}
.dmg-popup-crit {
  font-size: 26px;
  color: #fbbf24;
  text-shadow: 0 0 6px #000, 0 0 12px #fa0;
}
@keyframes dmgFloat {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-30px); }
}

/* Drop items */
.drop-list {
  color: #d4a017;
  font-weight: bold;
  margin-top: 6px;
}
.drop-item {
  color: #9ca3af;
  padding: 2px 4px;
}
.drop-common { color: #9ca3af; }
.drop-uncommon { color: #22c55e; }
.drop-rare { color: #3b82f6; }
.drop-epic { color: #a855f7; }

.dmg-player { color: #ef4444; font-weight: bold; }

.town-desc {
  text-align: center;
  color: var(--text-dim);
  font-style: italic;
  margin-bottom: 4px;
}
.town-panorama {
  margin: 8px 0;
  border: 2px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  background: #1a1820;
}
.town-svg {
  width: 100%;
  display: block;
}
.bld-clickable:hover {
  filter: url(#bldGlow);
  opacity: 0.9;
}
}
.building:hover { border-color: var(--accent); }
.build-icon { font-size: 28px; margin-bottom: 4px; }
.build-name { font-size: 14px; font-weight: bold; color: var(--text); }
.build-desc { font-size: 11px; color: var(--text-dim); }

/* Damage popup */
.dmg-popup {
  font-size: 20px;
  font-weight: bold;
  color: #ff4444;
  pointer-events: none;
  animation: dmgFloat 0.8s ease-out forwards;
  z-index: 100;
  text-shadow: 0 0 4px #000, 0 0 8px #ff0000;
}
.dmg-popup-crit {
  font-size: 26px;
  color: #ffaa00;
  text-shadow: 0 0 6px #000, 0 0 12px #ffaa00;
}
@keyframes dmgFloat {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-40px); opacity: 0; }
}
.dmg-player { color: #ff6b6b; font-weight: bold; }

/* Drop items */
.drop-list { margin-top: 6px; color: #d4a017; font-weight: bold; }
.drop-item { padding: 2px 0; font-size: 12px; }
.drop-common { color: #9ca3af; }
.drop-uncommon { color: #22c55e; }
.drop-rare { color: #3b82f6; }
.drop-epic { color: #a855f7; }

/* Inn */
.inn-desc { color: var(--text-dim); font-style: italic; margin-bottom: 8px; }
.inn-service { padding: 8px; background: var(--card); border-radius: 4px; margin: 8px 0; }
.inn-service p { margin: 4px 0; }

/* Shop */
.money-display { text-align: center; font-size: 16px; color: var(--accent); margin-bottom: 8px; }
.shop-items { margin: 8px 0; }
.shop-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  margin: 4px 0;
  cursor: pointer;
  transition: all 0.2s;
}
.shop-item:hover { border-color: var(--accent); }
.item-name { font-size: 14px; }
.item-stats { font-size: 12px; color: var(--text-dim); }
.item-price { color: var(--accent); font-size: 14px; }

/* Tavern */
.tavern-desc { color: var(--text-dim); font-style: italic; margin-bottom: 8px; }
.rumor {
  background: var(--card);
  border-left: 3px solid var(--accent);
  padding: 10px;
  margin: 8px 0;
  font-style: italic;
  color: var(--text);
}

/* Smith */
.smith-desc { color: var(--text-dim); font-style: italic; margin-bottom: 8px; }

/* ═══════════════════════════════════════════════════════════
   INVENTORY
   ═══════════════════════════════════════════════════════════ */

.equip-section { margin: 8px 0; }
.equip-title { font-size: 14px; font-weight: bold; color: var(--accent); margin-bottom: 6px; }
.equip-grid { display: grid; gap: 6px; }
.equip-slot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
}
.slot-name { font-size: 13px; color: var(--text-dim); }
.equipped-item { font-size: 14px; color: var(--text); }
.empty-slot { font-size: 13px; color: #555; }
.inv-section { margin: 12px 0; }
.inv-title { font-size: 14px; font-weight: bold; color: var(--accent); margin-bottom: 6px; }
.inv-empty { text-align: center; color: #555; padding: 12px; font-style: italic; }
.keys-display { text-align: center; font-size: 13px; color: var(--text-dim); margin: 8px 0; }

/* ═══════════════════════════════════════════════════════════
   PLAYER INFO
   ═══════════════════════════════════════════════════════════ */

.player-basic {
  text-align: center;
  padding: 12px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 6px;
  margin-bottom: 12px;
}
.basic-name { font-size: 20px; font-weight: bold; color: var(--accent); }
.basic-origin { font-size: 14px; color: var(--text-dim); margin: 4px 0; }
.basic-level { font-size: 13px; color: var(--text-dim); }

.skills-display { margin: 8px 0; }
.skills-title { font-size: 14px; font-weight: bold; color: var(--accent); margin-bottom: 4px; }
.skills-list { display: flex; flex-wrap: wrap; gap: 4px; }
.skill-tag {
  padding: 4px 8px;
  background: rgba(72,136,170,0.15);
  border: 1px solid #48a;
  border-radius: 12px;
  font-size: 12px;
  color: #6ac;
}
.skills-empty { color: #555; font-style: italic; }

.origin-skill-display {
  margin: 8px 0;
  padding: 8px;
  background: var(--card);
  border-left: 3px solid var(--accent2);
  border-radius: 4px;
}
.origin-title { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
.origin-skill { font-size: 14px; font-weight: bold; color: var(--accent2); }
.origin-desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

.attr-allocation { margin: 12px 0; }
.attr-header { margin-bottom: 8px; font-size: 14px; }
.attr-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
  gap: 6px;
}
.attr-block {
  text-align: center;
  padding: 8px 4px;
  background: var(--card);

}
.quest-reward {

}

.active-quest-banner {

/* ═══════════════════════════════════════════════════════════
   INVENTORY ITEMS LIST
   ═══════════════════════════════════════════════════════════ */

.inv-list {

}
.inv-item {

  align-items: center;

}
.inv-item-info {

  flex-direction: column;
}
.inv-item-name {

}

}
/* Grid map styles */

  margin: 8px 0;
}
.move-grid {

  gap: 6px;
  margin: 10px auto;

}
.move-btn {

  background: var(--card);
  border: 2px solid var(--border);

}
.move-btn:hover:not(:disabled) {

}

}

}
/* Level up */
.level-up-info {

}
.level-up-level {

}
.level-up-multi {
  font-size: 16px;

}
.level-up-rewards {
  margin-top: 15px;
  font-size: 15px;
  color: var(--text-dim);
}

  margin: 4px 0;
}
/* Mini map grid bigger */

  max-height: 300px;
}

/* Story system */
.story-entry {

}
.story-objectives {
  margin: 12px 0;
}
.story-obj-title {
  font-weight: bold;

}

}
.chapter-title {

}

}

}

/* Attribute tooltip */
.attr-tooltip {
  background: #2a2a2a;

}

}

}
.attr-tooltip-affects {

  font-size: 0.9em;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}
/* Chapter intro cinematic */
.chapter-intro {
  background: linear-gradient(135deg, #1a1510 0%, #2a2218 50%, #1a1510 100%);

}

}

}
.chapter-intro-sub {

  font-weight: bold;

  margin-bottom: 12px;

}
.chapter-divider {
  color: #5a4a3a;
  font-size: 12px;
  margin: 10px 0;
}
.chapter-quote {
  font-style: italic;
  color: #9a8a6a;
  font-size: 12px;
  line-height: 1.8;
  margin-bottom: 4px;
  font-family: 'Noto Serif SC', serif;
}
.chapter-narration {
  color: #c8c0a0;
  font-size: 13px;
  line-height: 1.9;
  text-align: left;
  font-family: 'Noto Serif SC', serif;
}

/* NPC dialog */
.npc-dialog {
  background: #0e0e0c;
  border: 2px solid #5a4a3a;
  border-radius: 6px;
  padding: 16px;
}
.npc-list {
  margin-bottom: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.npc-list .btn {
  text-align: left;
  font-size: 12px;
  padding: 6px 10px;
}
.npc-portrait {
  font-size: 36px;
  text-align: center;
  margin-bottom: 6px;
}
.npc-name {
  text-align: center;
  font-size: 14px;
  font-weight: bold;

  font-size: 13px;

  border-left: 3px solid #5a4a3a;

/* === TEXT MODE - WORLD MAP === */
.location-list { display:flex; flex-direction:column; gap:8px; margin:10px 0; }
.loc-card { display:flex; align-items:center; gap:12px; padding:12px; background:var(--card); border:2px solid var(--border); border-radius:8px; transition:all 0.2s; }
.loc-card:hover { border-color:var(--accent); background:rgba(212,160,23,0.08); }
.loc-card.loc-current { border-color:var(--accent); background:rgba(212,160,23,0.12); }
.loc-card.loc-locked { opacity:0.5; cursor:not-allowed !important; }
.loc-emoji { font-size:32px; width:48px; text-align:center; }
.loc-info { flex:1; }
.loc-name { font-size:15px; font-weight:bold; color:var(--text); }
.loc-here { font-size:11px; color:var(--accent); margin-left:6px; }
.loc-desc { font-size:12px; color:var(--muted); margin-top:2px; }
.loc-type { font-size:11px; color:var(--muted); margin-top:2px; }

/* === TEXT MODE - TOWN === */
.town-desc { font-size:13px; color:var(--muted); text-align:center; margin-bottom:10px; }
.building-list { display:flex; flex-direction:column; gap:8px; margin:10px 0; }
.bld-card { display:flex; align-items:center; gap:12px; padding:12px; background:var(--card); border:2px solid var(--border); border-radius:8px; transition:all 0.2s; cursor:pointer; }
.bld-card:hover { border-color:var(--accent); background:rgba(212,160,23,0.08); }
.bld-emoji { font-size:28px; width:44px; text-align:center; }
.bld-info { flex:1; }
.bld-name { font-size:14px; font-weight:bold; color:var(--text); }
.bld-desc { font-size:12px; color:var(--muted); margin-top:2px; }
.bld-arrow { font-size:20px; color:var(--muted); }

/* === TEXT MODE - BATTLE === */
.battle-enemies { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:10px 0; }
.enemy-card { display:flex; align-items:center; gap:8px; padding:10px 14px; background:var(--card); border:2px solid #8b0000; border-radius:8px; min-width:140px; transition:all 0.2s; }
.enemy-card.enemy-selected { border-color:var(--accent); box-shadow:0 0 8px rgba(212,160,23,0.5); }
.enemy-card.enemy-dead { opacity:0.4; border-color:#555; filter:grayscale(0.8); }
.enemy-emoji { font-size:28px; }
.enemy-info { flex:1; }
.enemy-name { font-size:13px; font-weight:bold; color:var(--danger); }
.enemy-card.enemy-dead .enemy-name { color:var(--muted); }
.enemy-hp-bar { width:100%; height:6px; background:#333; border-radius:3px; overflow:hidden; margin-top:3px; }
.enemy-hp-fill { height:100%; background:var(--danger); transition:width 0.3s; }
.enemy-hp-text { font-size:10px; color:var(--muted); margin-top:1px; }
.enemy-target-arrow { color:var(--accent); font-size:16px; margin-left:4px; animation:arrowPulse 1s infinite; }
@keyframes arrowPulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

.battle-player { margin:10px 0; padding:10px; background:var(--card); border:2px solid var(--accent); border-radius:8px; }
.player-name { font-size:14px; font-weight:bold; color:var(--accent); margin-bottom:6px; }
.player-bars { display:flex; flex-direction:column; gap:4px; }
.player-bar-row { display:flex; align-items:center; gap:8px; font-size:12px; }
.bar-label { width:20px; text-align:center; }
.player-hp-bar, .player-mp-bar { flex:1; height:10px; background:#333; border-radius:5px; overflow:hidden; }
.player-hp-fill { height:100%; background:var(--danger); transition:width 0.3s; }
.player-mp-fill { height:100%; background:var(--mp); transition:width 0.3s; }
.bar-val { font-size:11px; color:var(--muted); min-width:70px; text-align:right; }
.player-stats-inline { font-size:12px; color:var(--text); margin-top:6px; }

.battle-log { margin:10px 0; padding:8px; background:rgba(0,0,0,0.3); border-radius:6px; max-height:120px; overflow-y:auto; font-size:12px; }
.log-entry { padding:2px 0; border-bottom:1px solid rgba(255,255,255,0.05); }

.battle-result { margin:10px 0; padding:14px; border-radius:8px; text-align:center; }
.battle-result.victory { background:rgba(46,204,113,0.15); border:2px solid var(--xp); }
.battle-result.defeat { background:rgba(231,76,60,0.15); border:2px solid var(--danger); }
.result-title { font-size:20px; font-weight:bold; margin-bottom:8px; }
.result-rewards { font-size:14px; color:var(--gold); margin:6px 0; }
.result-drops { margin:8px 0; font-size:13px; }
.drop-item { display:inline-block; margin:2px 6px 2px 0; padding:2px 8px; background:rgba(255,255,255,0.08); border-radius:4px; }
.result-desc { font-size:13px; color:var(--muted); margin:6px 0; }

.battle-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:10px 0; }
.btn-atk { background:var(--danger); color:#fff; }
.btn-skill { background:var(--mp); color:#fff; }
.btn-flee { background:#555; color:#fff; }
.btn-disabled { opacity:0.4; cursor:not-allowed; }
.skill-cost { font-size:10px; opacity:0.7; margin-left:2px; }

/* === QUEST BANNER === */
.active-quest-banner { margin:10px 0; padding:8px 12px; background:rgba(212,160,23,0.12); border:1px solid var(--accent); border-radius:6px; font-size:12px; color:var(--accent); cursor:pointer; }

/* === LEVEL UP POPUP === */
.level-up { margin:8px 0; padding:8px; background:rgba(46,204,113,0.15); border:1px solid var(--xp); border-radius:6px; text-align:center; font-size:14px; color:var(--xp); font-weight:bold; }

/* === RESPONSIVE === */
@media (max-width: 480px) {
  .enemy-card { min-width:120px; padding:8px 10px; }
  .battle-actions { gap:5px; }
  .loc-card, .bld-card { padding:10px; gap:8px; }
}

// Procedural map generation
var _mapCache = {}; // cache generated maps per location

function generateMap(locId) {
  // Corridor+Room algorithm - irregular, branching maps with elite spawns
  if (_mapCache[locId]) return _mapCache[locId];

  var loc = LOCATIONS[locId];
  var cfg = loc.mapConfig;
  var theme = ROOM_THEMES[locId] || ROOM_THEMES.lake;

  // Use larger grid for irregular maps - most cells start as wall
  var gridW = cfg.cols;
  var gridH = cfg.rows;

  // Seeded RNG for consistency
  var seed = 0;
  for (var si = 0; si < locId.length; si++) seed += locId.charCodeAt(si) * (si + 1);
  var rng = function() { seed = (seed * 16807 + 0) % 2147483647; return (seed - 1) / 2147483646; };

  // Initialize all rooms as walls
  var rooms = [];
  for (var r = 0; r < gridH; r++) {
    rooms[r] = [];
    for (var c = 0; c < gridW; c++) {
      rooms[r][c] = {
        r: r, c: c, id: r + '_' + c,
        name: '', desc: '',
        type: 'wall', // wall = impassable, not carved yet
        visited: false, revealed: false,
        connections: {} // {north:true, south:true, east:true, west:true}
      };
    }
  }

  // ---- Corridor+Room generation ----
  // Start from bottom-left area
  var startR = gridH - 2;
  var startC = 1;
  var bossR = 1;
  var bossC = gridW - 2;

  // Carve rooms first (3-7 rooms of varying size)
  var numRooms = 4 + Math.floor(rng() * 4); // 4-7 rooms
  var carvedRooms = []; // {r, c, w, h} rectangles

  // Force start room
  var startRoomW = 2 + Math.floor(rng() * 2); // 2-3
  var startRoomH = 2 + Math.floor(rng() * 2);
  carvedRooms.push({r: startR - startRoomH + 1, c: startC, w: startRoomW, h: startRoomH});

  // Force boss room
  var bossRoomW = 2 + Math.floor(rng() * 2);
  var bossRoomH = 2 + Math.floor(rng() * 2);
  carvedRooms.push({r: bossR, c: bossC - bossRoomW + 1, w: bossRoomW, h: bossRoomH});

  // Generate additional rooms with random positions
  for (var ri = 2; ri < numRooms; ri++) {
    var rw = 2 + Math.floor(rng() * 3); // 2-4 wide
    var rh = 2 + Math.floor(rng() * 3); // 2-4 tall
    var rr = 1 + Math.floor(rng() * (gridH - rh - 2));
    var rc = 1 + Math.floor(rng() * (gridW - rw - 2));
    // Check overlap (allow 1 cell overlap for connectivity)
    var overlap = false;
    for (var oi = 0; oi < carvedRooms.length; oi++) {
      var o = carvedRooms[oi];
      if (rr < o.r + o.h + 1 && rr + rh + 1 > o.r && rc < o.c + o.w + 1 && rc + rw + 1 > o.c) {
        overlap = true; break;
      }
    }
    if (!overlap) carvedRooms.push({r: rr, c: rc, w: rw, h: rh});
  }

  // Carve rooms into grid
  for (var ci = 0; ci < carvedRooms.length; ci++) {
    var cr = carvedRooms[ci];
    for (var ry = cr.r; ry < cr.r + cr.h && ry < gridH; ry++) {
      for (var cx = cr.c; cx < cr.c + cr.w && cx < gridW; cx++) {
        if (rooms[ry][cx].type === 'wall') {
          rooms[ry][cx].type = 'path';
        }
      }
    }
  }

  // Connect rooms with L-shaped corridors
  for (var ci2 = 0; ci2 < carvedRooms.length - 1; ci2++) {
    var roomA = carvedRooms[ci2];
    var roomB = carvedRooms[ci2 + 1];
    var aCenterR = Math.floor(roomA.r + roomA.h / 2);
    var aCenterC = Math.floor(roomA.c + roomA.w / 2);
    var bCenterR = Math.floor(roomB.r + roomB.h / 2);
    var bCenterC = Math.floor(roomB.c + roomB.w / 2);

    // L-shaped corridor: horizontal first, then vertical (or random order)
    var horizontalFirst = rng() < 0.5;
    if (horizontalFirst) {
      // Horizontal segment
      var hStart = Math.min(aCenterC, bCenterC);
      var hEnd = Math.max(aCenterC, bCenterC);
      for (var hx = hStart; hx <= hEnd; hx++) {
        if (aCenterR >= 0 && aCenterR < gridH && hx >= 0 && hx < gridW && rooms[aCenterR][hx].type === 'wall') {
          rooms[aCenterR][hx].type = 'path';
        }
      }
      // Vertical segment
      var vStart = Math.min(aCenterR, bCenterR);
      var vEnd = Math.max(aCenterR, bCenterR);
      for (var vy = vStart; vy <= vEnd; vy++) {
        if (vy >= 0 && vy < gridH && bCenterC >= 0 && bCenterC < gridW && rooms[vy][bCenterC].type === 'wall') {
          rooms[vy][bCenterC].type = 'path';
        }
      }
    } else {
      // Vertical first, then horizontal
      var vStart2 = Math.min(aCenterR, bCenterR);
      var vEnd2 = Math.max(aCenterR, bCenterR);
      for (var vy2 = vStart2; vy2 <= vEnd2; vy2++) {
        if (vy2 >= 0 && vy2 < gridH && aCenterC >= 0 && aCenterC < gridW && rooms[vy2][aCenterC].type === 'wall') {
          rooms[vy2][aCenterC].type = 'path';
        }
      }
      var hStart2 = Math.min(aCenterC, bCenterC);
      var hEnd2 = Math.max(aCenterC, bCenterC);
      for (var hx2 = hStart2; hx2 <= hEnd2; hx2++) {
        if (bCenterR >= 0 && bCenterR < gridH && hx2 >= 0 && hx2 < gridW && rooms[bCenterR][hx2].type === 'wall') {
          rooms[bCenterR][hx2].type = 'path';
        }
      }
    }
  }

  // Add 1-2 dead-end branches for exploration surprise
  var numBranches = 1 + Math.floor(rng() * 2);
  for (var bi = 0; bi < numBranches; bi++) {
    // Pick a random carved cell and extend a corridor
    var attempts = 0;
    while (attempts < 20) {
      attempts++;
      var br = 1 + Math.floor(rng() * (gridH - 2));
      var bc = 1 + Math.floor(rng() * (gridW - 2));
      if (rooms[br][bc].type !== 'wall') {
        // Found a carved cell, extend in a random direction
        var branchDir = [{dr:-1,dc:0},{dr:1,dc:0},{dr:0,dc:-1},{dr:0,dc:1}][Math.floor(rng() * 4)];
        var len = 2 + Math.floor(rng() * 3); // 2-4 cells long
        for (var bl = 1; bl <= len; bl++) {
          var bnr = br + branchDir.dr * bl;
          var bnc = bc + branchDir.dc * bl;
          if (bnr >= 0 && bnr < gridH && bnc >= 0 && bnc < gridW) {
            rooms[bnr][bnc].type = 'path';
          }
        }
        break;
      }
    }
  }

  // Compute connections between adjacent non-wall cells
  var dirs4 = [{dr:-1,dc:0,key:'north'},{dr:1,dc:0,key:'south'},{dr:0,dc:-1,key:'west'},{dr:0,dc:1,key:'east'}];
  for (var cr2 = 0; cr2 < gridH; cr2++) {
    for (var cc = 0; cc < gridW; cc++) {
      if (rooms[cr2][cc].type === 'wall') continue;
      for (var di = 0; di < dirs4.length; di++) {
        var anr = cr2 + dirs4[di].dr, anc = cc + dirs4[di].dc;
        if (anr >= 0 && anr < gridH && anc >= 0 && anc < gridW && rooms[anr][anc].type !== 'wall') {
          rooms[cr2][cc].connections[dirs4[di].key] = true;
        }
      }
    }
  }

  // Mark start and boss
  rooms[startR][startC].type = 'start';
  rooms[startR][startC].name = '入口';
  rooms[startR][startC].desc = cfg.desc;
  rooms[startR][startC].revealed = true;
  rooms[startR][startC].visited = true;
  rooms[bossR][bossC].type = 'boss';
  rooms[bossR][bossC].name = '首领巢穴';
  rooms[bossR][bossC].desc = '空气中充满危险的气息...';

  // Reveal adjacent to start
  for (var di2 = 0; di2 < dirs4.length; di2++) {
    var nr2 = startR + dirs4[di2].dr, nc2 = startC + dirs4[di2].dc;
    if (nr2 >= 0 && nr2 < gridH && nc2 >= 0 && nc2 < gridW && rooms[nr2][nc2].type !== 'wall') {
      rooms[nr2][nc2].revealed = true;
    }
  }

  // Fill non-wall, non-start, non-boss rooms with content
  var nameIdx = 0;
  var eliteCount = 0;
  var maxElites = 2 + Math.floor(rng() * 2); // 2-3 elites per map

  for (var fr = 0; fr < gridH; fr++) {
    for (var fc = 0; fc < gridW; fc++) {
      var room = rooms[fr][fc];
      if (room.type === 'wall' || room.type === 'start' || room.type === 'boss') continue;

      var roll = rng();
      if (roll < cfg.enemyRate) {
        // Chance to be elite instead of regular enemy
        if (eliteCount < maxElites && rng() < 0.2) {
          room.type = 'elite';
          eliteCount++;
        } else {
          room.type = 'enemy';
        }
      } else if (roll < cfg.enemyRate + cfg.treasureRate) {
        room.type = 'treasure';
      } else if (roll < cfg.enemyRate + cfg.treasureRate + cfg.eventRate) {
        room.type = 'event';
      } else if (roll < cfg.enemyRate + cfg.treasureRate + cfg.eventRate + 0.05) {
        room.type = 'trap'; // new: trap room
      } else {
        room.type = 'path';
      }

      // Assign name and description
      room.name = theme.names[nameIdx % theme.names.length];
      nameIdx++;
      if (room.type === 'elite') {
        room.name = '精锐哨点';
        room.desc = '这里盘踞着比普通怪物更强的敌人...';
      } else {
        room.desc = theme.desc[Math.floor(rng() * theme.desc.length)];
      }
    }
  }

  // Place a treasure at the end of each dead-end branch
  for (var dr = 0; dr < gridH; dr++) {
    for (var dc = 0; dc < gridW; dc++) {
      var drm = rooms[dr][dc];
      if (drm.type === 'wall' || drm.type === 'start' || drm.type === 'boss') continue;
      var connCount = Object.keys(drm.connections).length;
      if (connCount === 1 && drm.type === 'path') {
        // Dead end - place treasure!
        drm.type = 'treasure';
        drm.name = '隐秘宝箱';
        drm.desc = '死胡同的尽头,一个被遗忘的宝箱...';
      }
    }
  }

  var map = { rows: gridH, cols: gridW, rooms: rooms, startR: startR, startC: startC, bossR: bossR, bossC: bossC, name: cfg.name };
  _mapCache[locId] = map;
  return map;
}

function getMapForLocation() {
  return generateMap(G.location);
}

function getRoom(map, r, c) {
  if (r < 0 || r >= map.rows || c < 0 || c >= map.cols) return null;
  return map.rooms[r][c];
}

function canMove(map, r, c) {
  var room = getRoom(map, r, c);
  if (!room) return false;
  if (room.type === 'wall' || room.type === 'water') return false;
  // Check if there's a connection from current position to target
  if (G.miniMapPos) {
    var curRoom = getRoom(map, G.miniMapPos.r, G.miniMapPos.c);
    if (curRoom) {
      var dr = r - G.miniMapPos.r, dc = c - G.miniMapPos.c;
      var dirKey = '';
      if (dr === -1 && dc === 0) dirKey = 'north';
      else if (dr === 1 && dc === 0) dirKey = 'south';
      else if (dr === 0 && dc === -1) dirKey = 'west';
      else if (dr === 0 && dc === 1) dirKey = 'east';
      if (dirKey && !curRoom.connections[dirKey]) return false;
    }
  }
  return true;
}

function getAvailableSideQuests() {
  var available = [];
  for (var i = 0; i < SIDE_QUESTS.length; i++) {
    var sq = SIDE_QUESTS[i];
    // Only show if at the right location, not already started, and location is unlocked
    if (G.location !== sq.location) continue;
    if (G.sideQuestProgress && G.sideQuestProgress[sq.id]) continue;
    if (!LOCATIONS[sq.location] || !LOCATIONS[sq.location].unlocked) continue;
    available.push(sq);
  }
  return available;
}

function acceptSideQuest(sqid) {
  if (!G.sideQuestProgress) G.sideQuestProgress = {};
  G.sideQuestProgress[sqid] = { current: 0, done: false };
  var sq = SIDE_QUESTS.find(function(s) { return s.id === sqid; });
  if (sq) toast('📋 接取支线任务:' + sq.name);
  sceneTown();
}

function advanceSideQuest(sqid) {
  if (!G.sideQuestProgress || !G.sideQuestProgress[sqid]) return;
  var sp = G.sideQuestProgress[sqid];
  if (sp.done) return;
  sp.current = (sp.current || 0) + 1;
  var sq = SIDE_QUESTS.find(function(s) { return s.id === sqid; });
  if (!sq) return;
  if (sp.current >= sq.stages) {
    sp.done = true;
    // Grant reward
    if (sq.uniqueItem) {
      G.inventory.push(sq.uniqueItem);
      toast('🎁 获得专属装备:' + sq.uniqueItem.name);
    }
    if (sq.affectionReward) {
      // Determine NPC id from quest location
      var questNpcId = null;
      var npcDefKeys = Object.keys(NPC_DEFS);
      for (var ni = 0; ni < npcDefKeys.length; ni++) {
        if (NPC_DEFS[npcDefKeys[ni]].loc === sq.location && NPC_DEFS[npcDefKeys[ni]].role !== 'boss') {
          questNpcId = npcDefKeys[ni]; break;
        }
      }
      if (questNpcId) {
        var gained = addNpcAffection(questNpcId, sq.affectionReward);
        toast('❤️ ' + NPC_DEFS[questNpcId].name + ' 好感度+' + gained);
      } else {
        toast('❤️ 好感度 +' + sq.affectionReward);
      }
    }
    toast('🎉 支线任务完成:' + sq.name);
  } else {
    toast('📋 任务进展:' + sq.stageDescs[sp.current - 1] || '继续推进...');
  }
}

function getNpcAffectionTier(npcId) {
  var rel = G.npcRelations[npcId];
  if (!rel) return NPC_AFFECTION_TIERS[0];
  var tier = NPC_AFFECTION_TIERS[0];
  for (var i = 0; i < NPC_AFFECTION_TIERS.length; i++) {
    if (rel.level >= NPC_AFFECTION_TIERS[i].min) tier = NPC_AFFECTION_TIERS[i];
  }
  return tier;
}

function addNpcAffection(npcId, amount) {
  if (!G.npcRelations[npcId]) G.npcRelations[npcId] = { level: 0, gifts: 0 };
  var oldTier = getNpcAffectionTier(npcId);
  // CHA bonus: +5% per point
  var chaBonus = 1 + (G.cha || 0) * 0.05;
  var finalAmount = Math.floor(amount * chaBonus);
  G.npcRelations[npcId].level = Math.min(100, G.npcRelations[npcId].level + finalAmount);
  var newTier = getNpcAffectionTier(npcId);
  if (newTier.title !== oldTier.title) {
    toast(newTier.emoji + ' 与' + (NPC_DEFS[npcId] ? NPC_DEFS[npcId].name : npcId) + '的关系升级为「' + newTier.title + '」!');
    checkNpcUnlocks(npcId, newTier);
  }
  return finalAmount;
}

function checkNpcUnlocks(npcId, tier) {
  var def = NPC_DEFS[npcId];
  if (!def) return;
  var unlock = null;
  if (tier.min >= 100 && def.unlockSoulmate && def.unlockSoulmate.type) unlock = def.unlockSoulmate;
  else if (tier.min >= 70 && def.unlockBestFriend && def.unlockBestFriend.type) unlock = def.unlockBestFriend;
  else if (tier.min >= 40 && def.unlockFriend && def.unlockFriend.type) unlock = def.unlockFriend;
  if (!unlock) return;
  // Apply unlock
  switch (unlock.type) {
    case 'discount':
      toast('🎉 解锁: ' + unlock.target + '折扣 -' + unlock.pct + '%!');
      break;
    case 'buff':
      if (unlock.stat && unlock.val) {
        G[unlock.stat] = (G[unlock.stat] || 0) + unlock.val;
        toast('🎉 解锁: ' + unlock.desc);
      }
      break;
    case 'recipe':
      toast('🎉 解锁: ' + unlock.desc);
      break;
    case 'item':
      toast('🎉 解锁: ' + unlock.desc);
      break;
    case 'skill':
      toast('🎉 解锁: ' + unlock.desc);
      break;
  }
}

function getNpcDiscount(npcId, shopType) {
  // Check all NPCs for discount that applies to this shopType
  var bestDiscount = 0;
  var npcIds = Object.keys(G.npcRelations);
  for (var i = 0; i < npcIds.length; i++) {
    var nid = npcIds[i];
    var rel = G.npcRelations[nid];
    var def = NPC_DEFS[nid];
    if (!def) continue;
    var tier = getNpcAffectionTier(nid);
    var unlock = null;
    if (tier.min >= 70 && def.unlockBestFriend && def.unlockBestFriend.type === 'discount') unlock = def.unlockBestFriend;
    if (tier.min >= 40 && def.unlockFriend && def.unlockFriend.type === 'discount') unlock = def.unlockFriend;
    if (unlock && unlock.target === shopType && unlock.pct > bestDiscount) bestDiscount = unlock.pct;
  }
  return bestDiscount;
}

function giveGiftToNpc(npcId, matId) {
  if (!G.materials[matId] || G.materials[matId] < 1) { toast('没有这个材料'); return; }
  var def = NPC_DEFS[npcId];
  if (!def) { toast('无法送礼'); return; }
  G.materials[matId]--;
  if (G.materials[matId] <= 0) delete G.materials[matId];
  // Calculate affection: base × liked multiplier
  var giftDef = GIFT_ITEMS[matId];
  var base = giftDef ? giftDef.affectionBase : 3;
  var isLiked = def.likes && def.likes.indexOf(matId) >= 0;
  var multiplier = isLiked ? 2 : 1;
  var gained = addNpcAffection(npcId, Math.floor(base * multiplier));
  var likedText = isLiked ? ' (喜爱!×2)' : '';
  toast('🎁 送出' + (giftDef ? giftDef.name : matId) + ', 好感度+' + gained + likedText);
}

function renderNpcAffection(npcId) {
  var rel = G.npcRelations[npcId];
  var def = NPC_DEFS[npcId];
  if (!def) return '';
  var tier = getNpcAffectionTier(npcId);
  var level = rel ? rel.level : 0;
  var nextTier = null;
  for (var i = 0; i < NPC_AFFECTION_TIERS.length; i++) {
    if (level < NPC_AFFECTION_TIERS[i].min) { nextTier = NPC_AFFECTION_TIERS[i]; break; }
  }
  var pct = 100;
  if (nextTier) {
    var prevMin = 0;
    for (var j = NPC_AFFECTION_TIERS.length - 1; j >= 0; j--) {
      if (NPC_AFFECTION_TIERS[j].min < nextTier.min) { prevMin = NPC_AFFECTION_TIERS[j].min; break; }
    }
    pct = Math.floor((level - prevMin) / (nextTier.min - prevMin) * 100);
  }
  var html = '<div style="margin:6px 0;padding:8px;background:rgba(255,255,255,0.05);border-radius:6px">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center">';
  html += '<span style="color:' + tier.color + '">' + tier.emoji + ' ' + def.name + ' — ' + tier.title + '</span>';
  html += '<span style="color:#aaa;font-size:0.85em">' + level + '/100</span>';
  html += '</div>';
  html += '<div style="background:#333;height:4px;border-radius:2px;margin-top:4px">';
  html += '<div style="background:' + tier.color + ';height:100%;width:' + pct + '%;border-radius:2px"></div>';
  html += '</div>';
  // Next tier hint
  if (nextTier) {
    html += '<div style="color:#777;font-size:0.8em;margin-top:2px">下一级: ' + nextTier.title + ' (' + nextTier.min + ')</div>';
  }
  // Gift button
  html += '<div style="margin-top:6px">';
  var matKeys = Object.keys(G.materials);
  var hasGift = false;
  for (var k = 0; k < matKeys.length; k++) {
    if (GIFT_ITEMS[matKeys[k]]) { hasGift = true; break; }
  }
  if (hasGift) {
    html += '<button class="btn" onclick="sceneGiveGift(\'' + npcId + '\')" style="font-size:0.85em;padding:4px 10px">🎁 送礼</button>';
  }
  html += '</div>';
  html += '</div>';
  return html;
}

  // Show NPCs for current location first, then others
  var currentLocNpcs = [];
  var otherNpcs = [];
  var npcIds = Object.keys(NPC_DEFS);
  for (var i = 0; i < npcIds.length; i++) {
    var nid = npcIds[i];
    var def = NPC_DEFS[npcIds[i]];
    var rel = G.npcRelations[nid];
    if (!rel || rel.level === 0) continue; // Only show met NPCs
    if (def.loc === G.location) currentLocNpcs.push(nid);
    else otherNpcs.push(nid);
  }

  if (currentLocNpcs.length > 0) {
    html += '<div class="quest-list-title">当前地点</div>';
    for (var c = 0; c < currentLocNpcs.length; c++) {
      html += renderNpcAffection(currentLocNpcs[c]);

  }
  if (otherNpcs.length > 0) {
    html += '<div class="quest-list-title" style="margin-top:12px">其他地点</div>';
    for (var o = 0; o < otherNpcs.length; o++) {
      html += renderNpcAffection(otherNpcs[o]);

  if (currentLocNpcs.length === 0 && otherNpcs.length === 0) {
    html += '<div style="color:#666;padding:20px;text-align:center">还没有与任何NPC建立关系。完成任务、送礼或与NPC交谈来提升好感度。</div>';
  }

  html += '<div class="btns">';
  html += '<button class="btn" onclick="sceneTown()">↩️ 返回城镇</button>';
  html += '</div>';
  render(html);
}

// Show NPC dialog - interactive conversation
function showDialog(npcId, startLine) {
  // Remember which scene opened this dialog, so we can return there
  if (!G._dialogReturnScene) G._dialogReturnScene = 'sceneTown';
  if (startLine === 0) {
    // Starting a new dialog - capture current scene
    G._dialogReturnScene = G._currentScene || 'sceneTown';
  }

  var npc = NPC_DIALOGS[npcId];
  if (!npc) return;
  var idx = startLine || 0;
  var line = npc.lines[idx];
  if (!line) return;

  var html = '';
  html += '<div class="npc-dialog">';
  html += '<div class="npc-portrait">' + npc.portrait + '</div>';
  html += '<div class="npc-name">' + npc.name + '</div>';
  html += '<div class="npc-text">' + line.text.replace(/\n/g, '<br>') + '</div>';

  if (line.next >= 0) {
    html += '<button class="btn" onclick="showDialog(\'' + npcId + '\',' + line.next + ')">继续</button>';
  } else {
    // End of conversation - return to the scene that opened the dialog
    if (G._pendingBossBattle) {
      G._pendingBossBattle = false;
      html += '<button class="btn btn-danger" onclick="renderBattle(\'👑 首领战!\')">⚔️ 开战!</button>';
    } else {
      var returnFn = G._dialogReturnScene || 'sceneTown';
      G._dialogReturnScene = null; // clear after use
      html += '<button class="btn btn-primary" onclick="' + returnFn + '()">返回</button>';
    }
  }
  html += '</div>';
  render(html);
}

    quests: [], activeQuest: null, questProgress: {}, guildQuests: [], sideQuestProgress: {}, // { questId: { current: N, done: bool } }
    // Main story progress
    storyProgress: null, // { chapterId, completed: { objId: true } }
    // Flags
    forestCleared: false,
    // Boss defeated per location-area
    bossDefeated: {},
    eliteDefeated: {},
    // Game started (can't re-select origin)
    gameStarted: false,
    // Pending level ups
    pendingLevelUps: 0,
    // Trade system
    marketEvent: null,
    _tradeTab: 'buy',
    _tradeVisited: false,
    // NPC affection
    npcRelations: {}  // { npcId: { level: N, gifts: N } }
  };
  // Restore location unlock state based on story progress
  _restoreLocationUnlocks();
}

// Restore which locations are unlocked based on completed chapters
function _restoreLocationUnlocks() {
  // Always reset to initial state first
  var locKeys = Object.keys(LOCATIONS);
  for (var i = 0; i < locKeys.length; i++) {
    LOCATIONS[locKeys[i]].unlocked = (locKeys[i] === 'whitecity');
  }
  // Replay unlocks based on all completed story chapters
  if (!G.storyProgress || !G.storyProgress.chapterId) return;
  var currentIdx = -1;
  for (var j = 0; j < STORY.length; j++) {
    if (STORY[j].id === G.storyProgress.chapterId) { currentIdx = j; break; }
  }
  // Unlock all locations from chapters up to and including current
  for (var k = 0; k <= currentIdx; k++) {
    var unlocks = CHAPTER_UNLOCKS[STORY[k].id] || [];
    for (var m = 0; m < unlocks.length; m++) {
      if (LOCATIONS[unlocks[m]]) LOCATIONS[unlocks[m]].unlocked = true;
    }
  }
}

// ═══════════════════════════════════════════════════════════
// SAVE/LOAD SYSTEM - localStorage persistence
// ═══════════════════════════════════════════════════════════
var SAVE_SLOTS = 3;
var SAVE_KEY_PREFIX = 'dragonpath_save_';

function saveGame(slot) {
  if (!slot) slot = 1;
  var saveData = {
    version: 5,
    timestamp: Date.now(),
    G: JSON.parse(JSON.stringify(G))
  };
  // Remove non-serializable / runtime-only fields
  delete saveData.G.inBattle;
  delete saveData.G.battle;
  delete saveData.G.attackMode;
  try {
    localStorage.setItem(SAVE_KEY_PREFIX + slot, JSON.stringify(saveData));
    toast('💾 存档' + slot + '号位保存成功!');
    return true;
  } catch(e) {
    toast('❌ 存档失败: ' + e.message);
    return false;
  }
}

function loadGame(slot) {
  if (!slot) slot = 1;
  try {
    var raw = localStorage.getItem(SAVE_KEY_PREFIX + slot);
    if (!raw) { toast('📭 存档' + slot + '号位为空'); return false; }
    var saveData = JSON.parse(raw);
    if (!saveData || !saveData.G) { toast('❌ 存档数据损坏'); return false; }
    // Restore game state
    var savedG = saveData.G;
    // Merge with current G to preserve any new fields
    for (var key in savedG) {
      if (savedG.hasOwnProperty(key)) G[key] = savedG[key];
    }
    // Ensure critical fields exist
    if (!G.materials) G.materials = {};
    if (!G.npcRelations) G.npcRelations = {};
    if (!G.bossDefeated) G.bossDefeated = {};
    if (!G.eliteDefeated) G.eliteDefeated = {};
    if (!G.quests) G.quests = [];
    if (!G.guildQuests) G.guildQuests = [];
    if (!G.sideQuestProgress) G.sideQuestProgress = {};
    if (!G.equipment) G.equipment = { weapon:null, helmet:null, armor:null, gloves:null, boots:null, belt:null, accessory:null };
    G.inBattle = false;
    G.battle = null;
    // Restore location unlocks
    _restoreLocationUnlocks();
    toast('📂 存档' + slot + '号位读取成功!');
    return true;
  } catch(e) {
    toast('❌ 读档失败: ' + e.message);
    return false;
  }
}

function getSaveInfo(slot) {
  try {
    var raw = localStorage.getItem(SAVE_KEY_PREFIX + slot);
    if (!raw) return null;
    var saveData = JSON.parse(raw);
    if (!saveData || !saveData.G) return null;
    var d = new Date(saveData.timestamp);
    return {
      name: saveData.G.name || '冒险者',
      level: saveData.G.level || 1,
      origin: saveData.G.origin ? saveData.G.origin.name : '???',
      gold: saveData.G.gold || 0,
      time: (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0')
    };
  } catch(e) { return null; }
}

function deleteSave(slot) {
  try {
    localStorage.removeItem(SAVE_KEY_PREFIX + slot);
    toast('🗑️ 存档' + slot + '号位已删除');
  } catch(e) { toast('❌ 删除失败'); }
}

function sceneSaveLoad() {
  var html = '';
  html += '<div class="scene-title">💾 存档/读档</div>';

  // Auto-save slot (slot 0)
  var autoInfo = getSaveInfo(0);
  html += '<div class="save-slot save-slot-auto">';
  html += '<div class="slot-header">🔄 自动存档</div>';
  if (autoInfo) {
    html += '<div class="slot-info">' + autoInfo.name + ' | Lv.' + autoInfo.level + ' ' + autoInfo.origin + ' | 💰' + autoInfo.gold + '</div>';
    html += '<div class="slot-time">' + autoInfo.time + '</div>';
    html += '<div class="slot-btns">';
    html += '<button class="btn btn-small" onclick="loadGame(0);sceneWorldMap()">📂 读取</button>';
    html += '</div>';
  } else {
    html += '<div class="slot-info" style="opacity:0.4">暂无自动存档</div>';
  }
  html += '</div>';

  // Manual save slots (1-3)
  for (var i = 1; i <= SAVE_SLOTS; i++) {
    var info = getSaveInfo(i);
    html += '<div class="save-slot">';
    html += '<div class="slot-header">📁 手动存档 ' + i + '</div>';
    if (info) {
      html += '<div class="slot-info">' + info.name + ' | Lv.' + info.level + ' ' + info.origin + ' | 💰' + info.gold + '</div>';
      html += '<div class="slot-time">' + info.time + '</div>';
      html += '<div class="slot-btns">';
      html += '<button class="btn btn-small" onclick="loadGame(' + i + ');sceneWorldMap()">📂 读档</button>';
      html += '<button class="btn btn-small" onclick="saveGame(' + i + ');sceneSaveLoad()">💾 覆盖</button>';
      html += '<button class="btn btn-small btn-danger" onclick="if(confirm(\'确定删除存档' + i + '?\')){deleteSave(' + i + ');sceneSaveLoad()}">🗑️</button>';
      html += '</div>';
    } else {
      html += '<div class="slot-info" style="opacity:0.4">空存档位</div>';
      html += '<div class="slot-btns">';
      html += '<button class="btn btn-small" onclick="saveGame(' + i + ');sceneSaveLoad()">💾 保存</button>';
      html += '</div>';
    }
    html += '</div>';
  }

  html += '<div class="slot-note">⚠️ 存档保存在浏览器本地，清除浏览器数据会丢失存档</div>';
  html += '<div class="btns">';
  html += '<button class="btn" onclick="sceneWorldMap()">返回</button>';
  html += '</div>';
  render(html);
}

function autoSave() {
  if (G && G.name && G.gameStarted) {
    saveGame(0); // slot 0 = auto-save
  }
}

// Auto-save every 2 minutes
setInterval(function() { autoSave(); }, 120000);

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function calcMaxHp() {
  var base = 100 + G.str * 5;
  if (G.equipment.armor) base += (G.equipment.armor.hp || 0);
  if (G.equipment.helmet) base += (G.equipment.helmet.hp || 0);
  if (G.equipment.belt) base += (G.equipment.belt.hp || 0);
  // Set bonus: Giant prefix or guardian defMult
  var sb = calcSetBonuses();
  var hpMult = 0;
  // Check all equipped items for giant prefix
  var eqKeys = ['weapon','helmet','armor','gloves','boots','belt','accessory'];
  for (var gi = 0; gi < eqKeys.length; gi++) {
    var eqItem = G.equipment[eqKeys[gi]];
    if (eqItem && eqItem.prefix && eqItem.prefix.stat === 'maxHp') hpMult += eqItem.prefix.mult;
  }
  if (hpMult > 0) base = Math.floor(base * (1 + hpMult));
  return base;
}
function calcMaxMp() { return 50 + G.int * 3; }
function calcAtk() {
  var base = G.str * 2;
  if (G.equipment.weapon) base += (G.equipment.weapon.atk || 0);
  if (G.equipment.gloves) base += (G.equipment.gloves.atk || 0);
  // Affix atk bonuses from all equipment
  var eqKeys = ['weapon','helmet','armor','gloves','boots','belt','accessory'];
  for (var ai = 0; ai < eqKeys.length; ai++) {
    var aItem = G.equipment[eqKeys[ai]];
    if (aItem && aItem.affixes) {
      for (var aj = 0; aj < aItem.affixes.length; aj++) {
        if (aItem.affixes[aj].stat === 'atk') base += aItem.affixes[aj].value;
      }
    }
  }
  // Prefix bonuses
  for (var pi = 0; pi < eqKeys.length; pi++) {
    var pItem = G.equipment[eqKeys[pi]];
    if (pItem && pItem.prefix) {
      if (pItem.prefix.stat === 'atk') base = Math.floor(base * (1 + pItem.prefix.mult));
      if (pItem.prefix.stat === 'atkFlat') base += pItem.prefix.value;
    }
  }
  // Set bonus: shadow_blade firstStrikeMult handled in combat, flame_lord fireDmgMult handled separately
  var sb = calcSetBonuses();
  return base;
}
function calcMagicAtk() {
  var base = Math.floor(G.int * 1.5);
  if (G.equipment.weapon && G.equipment.weapon.matk) base += G.equipment.weapon.matk;
  if (G.equipment.helmet && G.equipment.helmet.matk) base += G.equipment.helmet.matk;
  if (G.equipment.accessory && G.equipment.accessory.matk) base += G.equipment.accessory.matk;
  // Affix matk/int bonuses from all equipment
  var eqKeys = ['weapon','helmet','armor','gloves','boots','belt','accessory'];
  for (var mi = 0; mi < eqKeys.length; mi++) {
    var mItem = G.equipment[eqKeys[mi]];
    if (mItem && mItem.affixes) {
      for (var mj = 0; mj < mItem.affixes.length; mj++) {
        if (mItem.affixes[mj].stat === 'matk') base += mItem.affixes[mj].value;
        if (mItem.affixes[mj].stat === 'int') base += mItem.affixes[mj].value;
      }
    }
    // Prefix
    if (mItem && mItem.prefix) {
      if (mItem.prefix.stat === 'matk') base = Math.floor(base * (1 + mItem.prefix.mult));
    }
  }
  // Set bonus: arcane_sage matkMult
  var sb = calcSetBonuses();
  if (sb.matkMult) base = Math.floor(base * (1 + sb.matkMult));
  return base;
}
function calcSkillDmg(sk) {
  var base = rand(sk.dmgMin, sk.dmgMax);
  if (sk.damageType === 'magic') {
    base += Math.floor(calcMagicAtk() * 0.6);
  } else if (sk.damageType === 'physical') {
    base += Math.floor(calcAtk() * 0.5);
  } else {
    // hybrid or unspecified: average of both
    base += Math.floor((calcAtk() + calcMagicAtk()) * 0.3);
  }
  return base;
}
function calcDef() {
  var base = 0;
  if (G.equipment.armor) base += (G.equipment.armor.def || 0);
  if (G.equipment.helmet) base += (G.equipment.helmet.def || 0);
  // Affix def bonuses from all equipment
  var eqKeys = ['weapon','helmet','armor','gloves','boots','belt','accessory'];
  for (var di = 0; di < eqKeys.length; di++) {
    var dItem = G.equipment[eqKeys[di]];
    if (dItem && dItem.affixes) {
      for (var dj = 0; dj < dItem.affixes.length; dj++) {
        if (dItem.affixes[dj].stat === 'def') base += dItem.affixes[dj].value;
      }
    }
    // Prefix
    if (dItem && dItem.prefix) {
      if (dItem.prefix.stat === 'def') base = Math.floor(base * (1 + dItem.prefix.mult));
    }
  }
  // Set bonus: guardian defMult
  var sb = calcSetBonuses();
  if (sb.defMult) base = Math.floor(base * (1 + sb.defMult));
  return base;
}
function calcCrit() {
  var base = 5 + G.luk * 0.5;
  // Equipment critRate bonuses
  var eqKeys = ['weapon','helmet','armor','gloves','boots','belt','accessory'];
  for (var ci = 0; ci < eqKeys.length; ci++) {
    var cItem = G.equipment[eqKeys[ci]];
    if (cItem) {
      if (cItem.critRate) base += cItem.critRate * 100;
      if (cItem.affixes) {
        for (var cj = 0; cj < cItem.affixes.length; cj++) {
          if (cItem.affixes[cj].stat === 'critRate') base += cItem.affixes[cj].value;
        }
      }
      // Effect prefix: crit
      if (cItem.effects) {
        for (var ck = 0; ck < cItem.effects.length; ck++) {
          if (cItem.effects[ck].type === 'crit') base += cItem.effects[ck].value * 100;
        }
      }
    }
  }
  // Set bonus: shadow_blade critBonus
  var sb = calcSetBonuses();
  if (sb.critBonus) base += sb.critBonus * 100;
  return Math.min(50, base);
}
function calcCritDmg() { return 0.5 + G.luk * 0.02; }
function calcDodge() {
  var base = G.agi * 0.8;
  // Equipment dodge bonuses
  var eqKeys = ['weapon','helmet','armor','gloves','boots','belt','accessory'];
  for (var di = 0; di < eqKeys.length; di++) {
    var dItem = G.equipment[eqKeys[di]];
    if (dItem) {
      if (dItem.dodge) base += dItem.dodge * 100;
      if (dItem.affixes) {
        for (var dj = 0; dj < dItem.affixes.length; dj++) {
          if (dItem.affixes[dj].stat === 'dodge') base += dItem.affixes[dj].value;
        }
      }
      // Prefix: cunning (dodge)
      if (dItem.prefix && dItem.prefix.stat === 'dodge') base += dItem.prefix.mult * 100;
    }
  }
  return Math.min(40, base);
}
function calcNextXp(lvl) { return Math.floor(100 + lvl * lvl * 12 + lvl * 50); }
function updateStatus() {
  var el = document.getElementById('status');
  if (!el) return;
  var ch = getCurrentChapter();
  var prog = ch ? getChapterProgress() : null;
  var chLabel = prog ? ' <span class="status-chapter" onclick="showStory()" style="cursor:pointer;color:#d4a017">📖' + prog.done + '/' + prog.total + '</span>' : '';
  el.innerHTML = 'Lv.' + G.level + ' | ❤️' + G.hp + '/' + G.maxHp + ' | 💧' + G.mp + '/' + G.maxMp + ' | 💰' + G.gold + chLabel;
}
function render(html) { var el = document.getElementById('game'); if (el) el.innerHTML = html; }
function toast(msg) { var el = document.getElementById('toast'); if (el) { el.textContent = msg; el.style.opacity = 1; setTimeout(function() { el.style.opacity = 0; }, 2000); } }

function selectOrigin(idx) {
  G.origin = Object.assign({}, ORIGINS[idx]);
  // Apply base attrs
  G.str = G.origin.attr.str;
  G.agi = G.origin.attr.agi;
  G.int = G.origin.attr.int;
  G.cha = G.origin.attr.cha;
  G.luk = G.origin.attr.luk;
  // Apply start skills
  G.skills = G.origin.startSkills ? G.origin.startSkills.slice() : [];
  // Apply start equipment based on origin (7-slot system)
  if (G.origin.id === 'mage') {
    G.equipment.weapon = { id:'apprentice_staff', name:'学徒法杖', type:'equipment', slot:'weapon', atk:2, matk:14, rarity:'common', rarityColor:'#9ca3af', icon:'⚔️', affixes:[], effects:[] };
    G.equipment.armor = { id:'worn_robe', name:'破旧长袍', type:'equipment', slot:'armor', def:2, hp:10, matk:3, rarity:'common', rarityColor:'#9ca3af', icon:'🛡️', affixes:[], effects:[] };

var _attrDraft = null;

function sceneNameAndAttrs() {
  // Save name before re-render (if input exists)
  var savedName = '';
  var nameEl = document.getElementById('charName');
  if (nameEl && nameEl.value) savedName = nameEl.value;

  if (!_attrDraft) {
    _attrDraft = { str:G.str, agi:G.agi, int:G.int, cha:G.cha, luk:G.luk, pts:5 };
  }

  var html = '';
  html += '<div class="scene-title">创建角色</div>';

  // Name input - restore saved value
  html += '<div class="name-section">';
  html += '<label>你的名字:</label>';
  html += '<input type="text" id="charName" placeholder="输入名字或随机生成" maxlength="12" value="' + savedName + '">';
  html += '<button class="btn-small" onclick="randomName()">🎲 随机</button>';
  html += '</div>';

  html += '<div class="scene-desc">分配 <strong>5点</strong> 自由属性点(点击属性名查看详情)</div>';

  var akeys = ['str','agi','int','cha','luk'];

  for (var i = 0; i < akeys.length; i++) {
    var k = akeys[i];
    var ai = ATTR_INFO[k];
    var cur = _attrDraft[k];
    var baseVal = G[k];
    var delta = cur - baseVal;

    html += '<div class="attr-row-v5" style="border-left:3px solid ' + ai.color + '">';
    html += '<div class="attr-info">';
    html += '<span class="attr-name-v5" onclick="showAttrInfo(\'' + k + '\')" style="cursor:pointer;color:' + ai.color + '">' + ai.icon + ' ' + ai.name + '</span>';
    html += '<span class="attr-hint-v5">' + ai.brief + '</span>';
    html += '</div>';
    html += '<div class="attr-controls">';
    html += '<button class="attr-btn" onclick="adjAttrV5(\'' + k + '\', -1)" ' + (delta <= 0 ? 'disabled' : '') + '>-</button>';
    html += '<span class="attr-value' + (delta > 0 ? ' attr-boosted' : '') + '">' + cur + (delta > 0 ? ' (+' + delta + ')' : '') + '</span>';
    html += '<button class="attr-btn" onclick="adjAttrV5(\'' + k + '\', 1)" ' + (_attrDraft.pts <= 0 ? 'disabled' : '') + '>+</button>';
    html += '</div>';
    html += '</div>';
  }

  // Attr info tooltip container
  html += '<div id="attrTooltip" class="attr-tooltip" style="display:none"></div>';

  html += '<div class="pts-remaining">剩余点数:<span class="pts-num">' + _attrDraft.pts + '</span></div>';

  html += '<div class="btns">';
  html += '<button class="btn btn-primary" onclick="confirmNameAndAttrs()" ' + (_attrDraft.pts > 0 ? 'disabled' : '') + '>✅ 确认</button>';
  html += '<button class="btn" onclick="resetAttrs()">🔄 重置</button>';
  html += '</div>';

  render(html);
}

function randomName() {
  var names = ['亚瑟','艾拉','雷恩','索菲亚','德里克','露娜','卡斯帕','伊芙琳','罗根','米拉'];
  var el = document.getElementById('charName');
  if (el) el.value = names[rand(0, names.length - 1)];
}

function adjAttrV5(key, delta) {
  if (delta > 0 && _attrDraft.pts <= 0) return;
  var newVal = _attrDraft[key] + delta;
  var baseVal = G[key];
  if (delta < 0 && newVal < baseVal) return;
  _attrDraft[key] = newVal;
  _attrDraft.pts -= delta;
  sceneNameAndAttrs();
}

function resetAttrs() {
  _attrDraft = { str:G.str, agi:G.agi, int:G.int, cha:G.cha, luk:G.luk, pts:5 };
  sceneNameAndAttrs();
}

function confirmNameAndAttrs() {
  var nameEl = document.getElementById('charName');
  var name = nameEl && nameEl.value ? nameEl.value.trim() : '';
  if (!name) {
    toast('⚠️ 请为你的角色起个名字!');
    return;
  }
  G.name = name;

  // Apply attrs
  G.str = _attrDraft.str;
  G.agi = _attrDraft.agi;
  G.int = _attrDraft.int;
  G.cha = _attrDraft.cha;
  G.luk = _attrDraft.luk;

  // Calc HP/MP
  G.maxHp = calcMaxHp();
  G.hp = G.maxHp;
  G.maxMp = calcMaxMp();
  G.mp = G.maxMp;

  _attrDraft = null;
  G.gameStarted = true;
  updateStatus();

  // Start the main story!
  startStory();
  showChapterIntro(STORY[0].id);
}
