function sceneWorldMap() {
  updateStatus();
  var html = '';
  html += '<div class="scene-title">🗺️ 世界地图</div>';

  var currentLoc = LOCATIONS[G.location];
  var currentName = currentLoc ? currentLoc.name : G.location;
  html += '<div class="scene-desc">📍 当前位置:' + currentName + '</div>';

  // Show current location info
  html += '<div class="mini-area" style="border:2px solid #d4a017">';
  var locEmoji = currentLoc.type === 'town' ? '🏰' : (currentLoc.type === 'dungeon' ? '⛏️' : '🌲');
  html += '<div class="mini-area-name">' + locEmoji + ' ' + currentName + ' <span style="color:#4a4;font-size:0.85em">📍你在这里</span></div>';
  if (currentLoc.townDesc) html += '<div class="mini-area-desc">' + currentLoc.townDesc + '</div>';
  else if (currentLoc.mapConfig) html += '<div class="mini-area-desc">' + currentLoc.mapConfig.desc + '</div>';
  html += '</div>';

  // Show only adjacent locations
  var connections = LOC_CONNECTIONS[G.location] || [];
  html += '<div class="quest-list-title">可达地点</div>';

  if (connections.length === 0) {
    html += '<div class="inv-empty">无法前往其他地点</div>';
  } else {
    html += '<div class="location-list">';
    for (var i = 0; i < connections.length; i++) {
      var locId = connections[i];
      var locData = LOCATIONS[locId];
      if (!locData) continue;
      var isUnlocked = locData.unlocked;
      var locName = locData.name;
      var le = locData.type === 'town' ? '🏰' : (locData.type === 'dungeon' ? '⛏️' : '🌲');
      var locTypeLabel = locData.type === 'town' ? '城镇' : (locData.type === 'dungeon' ? '迷宫' : '野外');

      if (isUnlocked) {
        html += '<div class="loc-card" onclick="travelTo(\'' + locId + '\')" style="cursor:pointer">';
        html += '<div class="loc-emoji">' + le + '</div>';
        html += '<div class="loc-info">';
        html += '<div class="loc-name">' + locName + '</div>';
        if (locData.townDesc) html += '<div class="loc-desc">' + locData.townDesc.substring(0, 30) + '...</div>';
        else if (locData.mapConfig) html += '<div class="loc-desc">' + locData.mapConfig.desc.substring(0, 30) + '...</div>';
        html += '<div class="loc-type">' + locTypeLabel + '</div>';
        html += '</div>';
        html += '</div>';
      } else {
        // Show locked hint - "未发现"
        html += '<div class="loc-card" style="opacity:0.4;cursor:default">';
        html += '<div class="loc-emoji">🔒</div>';
        html += '<div class="loc-info">';
        html += '<div class="loc-name">未发现的区域</div>';
        html += '<div class="loc-desc">继续冒险可能会发现新地点...</div>';
        html += '</div>';
        html += '</div>';
      }
    }
    html += '</div>';
  }

  // Show distant discovered locations as a list (no direct travel)
  var distantLocs = [];
  var allLocIds = Object.keys(LOCATIONS);
  for (var j = 0; j < allLocIds.length; j++) {
    var lid = allLocIds[j];
    if (lid === G.location) continue;
    if (connections.indexOf(lid) >= 0) continue; // already shown above
    if (LOCATIONS[lid].unlocked) distantLocs.push(lid);
  }
  if (distantLocs.length > 0) {
    html += '<div class="quest-list-title" style="color:#666">已发现(需中转前往)</div>';
    html += '<div style="color:#555;font-size:0.85em;margin-bottom:8px">以下地点无法直达,需要经停其他地点</div>';
    for (var k = 0; k < distantLocs.length; k++) {
      var dl = LOCATIONS[distantLocs[k]];
      var dle = dl.type === 'town' ? '🏰' : (dl.type === 'dungeon' ? '⛏️' : '🌲');
      html += '<div class="loc-card" style="opacity:0.5;cursor:default">';
      html += '<div class="loc-emoji">' + dle + '</div>';
      html += '<div class="loc-info">';
      html += '<div class="loc-name">' + dl.name + '</div>';
      html += '</div>';
      html += '</div>';
    }
  }

  html += '<div class="btns">';
  if (currentLoc.type === 'town') html += '<button class="btn" onclick="sceneTown()">↩️ 返回城镇</button>';
  else html += '<button class="btn" onclick="enterMiniMap()">↩️ 继续探索</button>';
  html += '</div>';

  render(html);
}


function travelTo(locId) {
  if (!LOCATIONS[locId] || !LOCATIONS[locId].unlocked) {
    toast('🔒 尚未解锁');
    return;
  }
  if (G.location === locId) {
    toast('你已经在这里了');
    return;
  }
  G.location = locId;
  updateStatus();
  toast('🚶 前往' + LOCATIONS[locId].name);
  _updateVisitQuestProgress(locId);

  var loc = LOCATIONS[locId];
  if (loc.type === 'town') {
    sceneTown();
  } else if (loc.mapConfig) {
    // enterMiniMap will also fire visit_location trigger
    enterMiniMap();
  } else {
    sceneWorldMap();
  }
}

// ═══════════════════════════════════════════════════════════
// MINI-MAP SYSTEM (per-location exploration)
// ═══════════════════════════════════════════════════════════

function leaveMiniMap() {
  // Reset boss defeated status for this location when leaving
  var loc = LOCATIONS[G.location];
  if (loc) {
    var prefix = G.location + '_';
    for (var key in G.bossDefeated) {
      if (key.indexOf(prefix) === 0) {
        delete G.bossDefeated[key];
      }
    }
  }
  G.miniMapPos = null;
  sceneWorldMap();
}

function enterMiniMap() {
  var loc = LOCATIONS[G.location];
  if (!loc.mapConfig) {
    toast('这里没有可探索的区域');
    return;
  }
  var map = getMapForLocation();
  G.miniMapPos = { r: map.startR, c: map.startC };
  // Mark start as visited
  map.rooms[map.startR][map.startC].visited = true;
  // Story trigger: visited a location
  checkStoryTriggers('visit_location', G.location);
  renderMiniMap();
}

function renderMiniMap(msg) {
  var map = getMapForLocation();
  var room = map.rooms[G.miniMapPos.r][G.miniMapPos.c];

  // Reveal adjacent rooms
  var dirs = [{dr:-1,dc:0},{dr:1,dc:0},{dr:0,dc:-1},{dr:0,dc:1}];
  for (var di = 0; di < dirs.length; di++) {
    var nr = G.miniMapPos.r + dirs[di].dr, nc = G.miniMapPos.c + dirs[di].dc;
    var adjRoom = getRoom(map, nr, nc);
    if (adjRoom) adjRoom.revealed = true;
  }

  var html = '';
  html += '<div class="scene-title">' + map.name + '</div>';
  if (msg) html += '<div class="mini-msg">' + msg + '</div>';

  // Current room info
  var typeLabel = '';
  var typeHint = '';
  if (room.type === 'boss') { typeLabel = ' 👑'; typeHint = '危险区域'; }
  else if (room.type === 'elite') { typeLabel = ' 💀'; typeHint = '精锐敌人盘踞此处'; }
  else if (room.type === 'treasure') { typeLabel = ' 📦'; typeHint = '有宝藏'; }
  else if (room.type === 'enemy') { typeLabel = ' ⚔️'; typeHint = '有敌人出没'; }
  else if (room.type === 'trap') { typeLabel = ' ⚠️'; typeHint = '有陷阱!'; }
  else if (room.type === 'event') { typeLabel = ' 🔍'; typeHint = '可以调查'; }
  else if (room.type === 'water') { typeLabel = ' 💧'; typeHint = '水域,无法通行'; }
  else if (room.type === 'start') { typeLabel = ' 🚪'; typeHint = '入口'; }
  else if (room.type === 'wall') { typeLabel = ''; typeHint = ''; }
  html += '<div class="mini-area">';
  html += '<div class="mini-area-name">' + typeLabel + ' ' + room.name + '</div>';
  html += '<div class="mini-area-desc">' + room.desc + (typeHint ? '<br><span style="color:#888;font-size:0.85em">' + typeHint + '</span>' : '') + '</div>';
  html += '</div>';

  // Grid mini map
  html += '<div class="mini-map-grid">';
  html += renderGridMap(map, G.miniMapPos.r, G.miniMapPos.c);
  html += '</div>';

  // Direction buttons (N/S/E/W) + Room actions
  html += '<div class="mini-controls">';

  // Movement buttons - 3x3 grid layout
  html += '<div class="move-grid">';
  var canN = canMove(map, G.miniMapPos.r - 1, G.miniMapPos.c);
  var canS = canMove(map, G.miniMapPos.r + 1, G.miniMapPos.c);
  var canW = canMove(map, G.miniMapPos.r, G.miniMapPos.c - 1);
  var canE = canMove(map, G.miniMapPos.r, G.miniMapPos.c + 1);
  html += '<div></div>';
  html += '<button class="move-btn" onclick="moveGrid(\'-1\',\'0\')" ' + (canN ? '' : 'disabled') + '>⬆️ 北</button>';
  html += '<div></div>';
  html += '<button class="move-btn" onclick="moveGrid(\'0\',\'-1\')" ' + (canW ? '' : 'disabled') + '>⬅️ 西</button>';
  html += '<div class="move-center">●</div>';
  html += '<button class="move-btn" onclick="moveGrid(\'0\',\'1\')" ' + (canE ? '' : 'disabled') + '>➡️ 东</button>';
  html += '<div></div>';
  html += '<button class="move-btn" onclick="moveGrid(\'1\',\'0\')" ' + (canS ? '' : 'disabled') + '>⬇️ 南</button>';
  html += '<div></div>';
  html += '</div>';

  // Room-specific actions
  html += '<div class="mini-actions">';
  // Enemies auto-trigger on step - no search button needed
  if (room.type === 'treasure') {
    html += '<button class="btn btn-primary" onclick="miniMapTreasure()">📦 搜索宝藏</button>';
  } else if (room.type === 'boss') {
    html += '<button class="btn btn-danger" onclick="miniMapBoss()">👑 挑战首领</button>';
  } else if (room.type === 'elite') {
    html += '<button class="btn btn-danger" onclick="miniMapElite()">💀 挑战精锐</button>';
  } else if (room.type === 'trap') {
    html += '<button class="btn btn-danger" onclick="miniMapTrap()">⚠️ 拆除陷阱</button>';
  } else if (room.type === 'event') {
    html += '<button class="btn" onclick="miniMapEvent()">🔍 调查</button>';
  } else if (room.type === 'stone') {
    html += '<button class="btn" onclick="miniMapStone()">🪨 调查石堆</button>';
  }
  html += '<button class="btn" onclick="leaveMiniMap()">🚪 离开区域</button>';
  html += '<button class="btn" onclick="sceneInventoryFromExplore()">🎒 背包</button>';
  html += '<button class="btn" onclick="_showStatusFromExplore()">👤 状态</button>';
  html += '<button class="btn" onclick="_showQuestsFromExplore()">📜 任务</button>';
  html += '</div>';

  html += '</div>';
  render(html);
}

function renderGridMap(map, curR, curC) {
  var cols = map.cols;
  var rows = map.rows;
  var cellSize = 32;
  var gap = 2;

  // Viewport: only render cells around player (7x7 viewport)
  var viewRadius = 3;
  var minR = Math.max(0, curR - viewRadius);
  var maxR = Math.min(rows - 1, curR + viewRadius);
  var minC = Math.max(0, curC - viewRadius);
  var maxC = Math.min(cols - 1, curC + viewRadius);
  var viewRows = maxR - minR + 1;
  var viewCols = maxC - minC + 1;
  var totalW = viewCols * (cellSize + gap);
  var totalH = viewRows * (cellSize + gap);

  var html = '';
  html += '<svg viewBox="0 0 ' + totalW + ' ' + totalH + '" class="mini-svg" style="width:100%;max-height:320px">';

  // SVG defs
  html += '<defs>';
  html += '<pattern id="pWater" width="8" height="8" patternUnits="userSpaceOnUse">';
  html += '<rect width="8" height="8" fill="#1a3a5c"/>';
  html += '<path d="M0 4 Q2 2 4 4 Q6 6 8 4" fill="none" stroke="#4488aa" stroke-width="0.8" opacity="0.6"/>';
  html += '</pattern>';
  html += '</defs>';

  for (var vr = minR; vr <= maxR; vr++) {
    for (var vc = minC; vc <= maxC; vc++) {
      var room = map.rooms[vr][vc];
      var x = (vc - minC) * (cellSize + gap);
      var y = (vr - minR) * (cellSize + gap);
      var isCurrent = (vr === curR && vc === curC);

      if (!room.revealed) {
        // Fog of war
        html += '<rect x="' + x + '" y="' + y + '" width="' + cellSize + '" height="' + cellSize + '" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="0.5" rx="2" opacity="0.8"/>';
        continue;
      }

      if (room.type === 'wall') {
        // Wall cells - dark, no interaction
        html += '<rect x="' + x + '" y="' + y + '" width="' + cellSize + '" height="' + cellSize + '" fill="#050505" stroke="#111" stroke-width="0.5" rx="1"/>';
        // Subtle wall texture
        html += '<rect x="' + (x+2) + '" y="' + (y+2) + '" width="' + (cellSize-4) + '" height="' + (cellSize-4) + '" fill="#0a0a0a" rx="1"/>';
        continue;
      }

      // Determine visuals by room type
      var fill = '#1a1a18';
      var stroke = '#3a3a35';
      var icon = '';
      var iconSize = Math.max(10, cellSize * 0.45);
      var isImpassable = false;

      if (room.type === 'start') {
        fill = '#2a3a2a'; stroke = '#6b8'; icon = '🚪';
      } else if (room.type === 'boss') {
        fill = '#3a1a1a'; stroke = '#c44'; icon = '👑';
      } else if (room.type === 'elite') {
        fill = '#2a1a2a'; stroke = '#a4a'; icon = '💀';
      } else if (room.type === 'water') {
        fill = 'url(#pWater)'; stroke = '#4488aa'; isImpassable = true;
      } else if (room.type === 'treasure') {
        if (room.visited) { fill = '#1a1a18'; stroke = '#3a3a35'; icon = '📭'; }
        else { fill = '#1a1a10'; stroke = '#444'; }
      } else if (room.type === 'event') {
        fill = '#1a1a18'; stroke = '#444';
      } else if (room.type === 'enemy') {
        fill = '#1a1a18'; stroke = '#444'; // hidden until close
      } else if (room.type === 'trap') {
        fill = '#1a1a18'; stroke = '#444'; // hidden
      } else {
        fill = '#1a1a18'; stroke = '#3a3a35';
      }

      if (room.visited && !isImpassable) {
        fill = '#202018'; stroke = '#4a4a40';
      }

      // Draw connection lines to adjacent non-wall cells
      for (var dir in room.connections) {
        var lx1 = x + cellSize / 2, ly1 = y + cellSize / 2;
        var lx2 = lx1, ly2 = ly1;
        if (dir === 'north') { ly2 = y - gap/2; }
        else if (dir === 'south') { ly2 = y + cellSize + gap/2; }
        else if (dir === 'west') { lx2 = x - gap/2; }
        else if (dir === 'east') { lx2 = x + cellSize + gap/2; }
        html += '<line x1="' + lx1 + '" y1="' + ly1 + '" x2="' + lx2 + '" y2="' + ly2 + '" stroke="#2a2a25" stroke-width="2" opacity="0.5"/>';
      }

      // Draw cell
      var clickAttr = isImpassable ? '' : ' onclick="clickGridCell(' + vr + ',' + vc + ')"';
      var cursorStyle = isImpassable ? 'cursor:not-allowed' : 'cursor:pointer';
      html += '<rect x="' + x + '" y="' + y + '" width="' + cellSize + '" height="' + cellSize + '" fill="' + fill + '" stroke="' + (isCurrent ? '#d4a017' : stroke) + '" stroke-width="' + (isCurrent ? 2.5 : 1) + '" rx="3" style="' + cursorStyle + '"' + clickAttr + '/>';

      // Icons for special rooms (only show if visited or adjacent)
      var showIcon = room.visited || isCurrent;
      // Elite icon always visible when revealed (they're visible threats)
      if (room.type === 'elite' && room.revealed) showIcon = true;
      if (room.type === 'boss' && room.revealed) showIcon = true;
      // Start icon always visible
      if (room.type === 'start') showIcon = true;

      if (icon && showIcon) {
        html += '<text x="' + (x + cellSize / 2) + '" y="' + (y + cellSize * 0.65) + '" text-anchor="middle" font-size="' + iconSize + '">' + icon + '</text>';
      }

      // Current position marker
      if (isCurrent) {
        html += '<rect x="' + (x - 1) + '" y="' + (y - 1) + '" width="' + (cellSize + 2) + '" height="' + (cellSize + 2) + '" fill="none" stroke="#d4a017" stroke-width="2" rx="3" stroke-dasharray="3,2">';
        html += '<animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>';
        html += '</rect>';
        // Player dot
        html += '<circle cx="' + (x + cellSize/2) + '" cy="' + (y + cellSize/2) + '" r="4" fill="#d4a017" opacity="0.8">';
        html += '<animate attributeName="r" values="3;5;3" dur="1.5s" repeatCount="indefinite"/>';
        html += '</circle>';
      }
    }
  }

  html += '</svg>';
  return html;
}

function clickGridCell(r, c) {
  var map = getMapForLocation();
  var room = getRoom(map, r, c);
  if (!room || !room.revealed) return;

  // Can't step on water tiles
  if (room.type === 'water') {
    toast('💧 水域无法通行');
    return;
  }

  // Can only move to adjacent cells (N/S/E/W)
  var dr = Math.abs(r - G.miniMapPos.r);
  var dc = Math.abs(c - G.miniMapPos.c);
  if (!((dr === 1 && dc === 0) || (dr === 0 && dc === 1))) {
    toast('🔒 只能移动到相邻格子');
    return;
  }

  // Move there
  G.miniMapPos = { r: r, c: c };
  room.visited = true;

  // Auto-trigger room events on step
  if (room.type === 'enemy') {
    miniMapBattle();
  } else if (room.type === 'boss') {
    // Boss auto-trigger on step - but check if already defeated
    var bossKey = G.location + '_' + r + '_' + c;
    if (G.bossDefeated[bossKey]) {
      renderMiniMap('首领已被击败,巢穴空空荡荡...');
    } else {
      miniMapBoss();
    }
  } else if (room.type === 'stone') {
    renderMiniMap('🪨 石堆似乎可以调查...');
  } else {
    renderMiniMap('前往 ' + room.name + '...');
  }
}

function moveGrid(dr, dc) {
  var map = getMapForLocation();
  var nr = G.miniMapPos.r + parseInt(dr);
  var nc = G.miniMapPos.c + parseInt(dc);
  var room = getRoom(map, nr, nc);
  if (!room) {
    toast('那个方向没有路');
    return;
  }
  if (room.type === 'water') {
    toast('💧 水域无法通行');
    return;
  }
  G.miniMapPos = { r: nr, c: nc };
  room.visited = true;

  // Auto-trigger room events on step
  if (room.type === 'enemy') {
    miniMapBattle();
  } else if (room.type === 'boss') {
    var bossKey2 = G.location + '_' + nr + '_' + nc;
    if (G.bossDefeated[bossKey2]) {
      renderMiniMap('首领已被击败,巢穴空空荡荡...');
    } else {
      miniMapBoss();
    }
  } else if (room.type === 'stone') {
    renderMiniMap('🪨 石堆似乎可以调查...');
  } else {
    renderMiniMap('你向' + (dr === '-1' ? '北' : dr === '1' ? '南' : dc === '-1' ? '西' : '东') + '前进...');
  }
}

function miniMapStone() {
  var roll = Math.random();
  var html = '';
  html += '<div class="scene-title">🪨 石堆调查</div>';
  html += '<div class="event-text">你仔细翻检石堆...</div>';

  if (roll < 0.35) {
    // Find material instead of gold
    var matKeys = Object.keys(MATERIALS);
    var commonMats = matKeys.filter(function(k) { return MATERIALS[k].rarity === 'common'; });
    var mk = commonMats[rand(0, commonMats.length - 1)];
    var mat = MATERIALS[mk];
    G.inventory.push({ id: mat.id, name: mat.name, type: 'material', icon: mat.icon, category: mat.category, rarity: mat.rarity, sellPrice: mat.sellPrice, craftValue: mat.craftValue });
    html += '<div class="event-result good">' + mat.icon + ' 你在石头缝中发现了 ' + mat.name + '!</div>';
  } else if (roll < 0.55) {
    // Find item
    var items = [
      { name:'磨刀石', type:'accessory', atk:2, desc:'一块可以让武器更锋利的磨刀石' },
      { name:'护身符碎片', type:'accessory', def:2, desc:'刻有微弱符文的护身符碎片' },
      { name:'幸运石', type:'accessory', luk:2, desc:'据说能带来好运的圆润小石头' }
    ];
    var item = items[rand(0, items.length - 1)];
    G.inventory.push(item);
    html += '<div class="event-result good">✨ 你发现了一件物品:<strong>' + item.name + '</strong>' + (item.atk ? ' ⚔️+' + item.atk : '') + (item.def ? ' 🛡️+' + item.def : '') + (item.luk ? ' 🎲+' + item.luk : '') + '</div>';
  } else if (roll < 0.70) {
    // Find key
    G.keys = (G.keys || 0) + 1;
    html += '<div class="event-result good">🔑 你找到了一把宝箱钥匙!</div>';
  } else {
    // Nothing
    html += '<div class="event-result">除了碎石和尘土,什么也没发现。</div>';
  }

  // Mark stone as investigated (change to path)
  var map = getMapForLocation();
  var room = map.rooms[G.miniMapPos.r][G.miniMapPos.c];
  if (room.type === 'stone') room.type = 'path'; // Depleted

  html += '<button class="btn" onclick="renderMiniMap()">继续探索</button>';
  updateStatus();
  render(html);
}

function miniMapBattle() {
  var loc = LOCATIONS[G.location];
  var enemyIds = loc.enemies || ['goblin'];
  var count = rand(1, 2);
  var enemies = [];

  for (var i = 0; i < count; i++) {
    var eid = enemyIds[rand(0, enemyIds.length - 1)];
    var template = ENEMIES[eid];
    if (template) {
      var scaled = Object.assign({}, template);
      // Apply location-specific difficulty scaling
      if (template.scale && template.scale[G.location]) {
        var s = template.scale[G.location];
        scaled.hp = Math.round(scaled.hp * s);
        scaled.atk = Math.round(scaled.atk * s);
        scaled.xp = Math.round(scaled.xp * s);
      }
      scaled.curHp = scaled.hp;
      enemies.push(scaled);
    }
  }

  G.battle = { enemies: enemies, log: [], turn: 0, defending: false, warcry: 0, gamblerUsed: false, dungeon: true };
  G.inBattle = true;
  G.selectedTarget = 0;
  G.attackMode = null;
  renderBattle('遭遇 ' + enemies.length + ' 只敌人!');
}

function miniMapBoss() {
  var bossKey = G.location + '_' + G.miniMapPos.r + '_' + G.miniMapPos.c;
  if (G.bossDefeated[bossKey]) {
    toast('👑 首领已被击败,需要离开区域后重新进入才会刷新');
    return;
  }
  // Show boss info screen first
  _showBossInfo();
}

function miniMapElite() {
  // Elite enemies: stronger than normal but weaker than boss, better drops
  var eliteKey = G.location + '_elite_' + G.miniMapPos.r + '_' + G.miniMapPos.c;
  if (G.eliteDefeated && G.eliteDefeated[eliteKey]) {
    toast('💀 精锐已被击败');
    return;
  }
  if (!G.eliteDefeated) G.eliteDefeated = {};

  // Generate elite stats based on location enemies + buff
  var locEnemies = LOCATIONS[G.location].enemies || ['goblin'];
  var baseEnemy = ENEMIES[locEnemies[Math.floor(Math.random() * locEnemies.length)]];
  if (!baseEnemy) baseEnemy = ENEMIES.goblin;

  // Elite = 1.8x HP, 1.5x ATK, 1.3x AGI of base enemy
  var eliteEnemy = {
    name: '精锐' + baseEnemy.name,
    emoji: '💀',
    hp: Math.floor(baseEnemy.hp * 1.8),
    atk: Math.floor(baseEnemy.atk * 1.5),
    agi: Math.floor((baseEnemy.agi || 5) * 1.3),
    xp: Math.floor(baseEnemy.xp * 2.5),
    desc: '比普通同类更强壮、更凶猛的个体,浑身散发着危险的气息。'
  };

  // Start elite battle
  G.inBattle = true;
  G.battleEnemies = [{
    name: eliteEnemy.name, emoji: eliteEnemy.emoji,
    hp: eliteEnemy.hp, maxHp: eliteEnemy.hp,
    atk: eliteEnemy.atk, agi: eliteEnemy.agi,
    xp: eliteEnemy.xp, desc: eliteEnemy.desc,
    isElite: true, alive: true
  }];
  G.battleLog = ['💀 精锐' + eliteEnemy.name + '发起了攻击!'];
  G.battleTurn = 0;
  renderBattle();
}

function miniMapTrap() {
  // Trap room: AGI check to disarm, take damage if fail
  var agiCheck = G.agi * 3 + Math.floor(Math.random() * 40);
  var trapDmg = 10 + Math.floor(Math.random() * 20);

  if (agiCheck > 60) {
    // Success - disarm and find reward
    toast('✅ 成功拆除陷阱!');
    var goldReward = 15 + Math.floor(Math.random() * 25);
    G.gold += goldReward;
    toast('💰 获得 ' + goldReward + ' 金币');
    var room = getMapForLocation().rooms[G.miniMapPos.r][G.miniMapPos.c];
    room.type = 'path';
    room.name = '拆解的陷阱';
    room.desc = '陷阱已被拆除,地上散落着零件。';
  } else {
    // Fail - take damage
    G.hp = Math.max(1, G.hp - trapDmg);
    toast('💥 陷阱触发!受到 ' + trapDmg + ' 点伤害');
    var room2 = getMapForLocation().rooms[G.miniMapPos.r][G.miniMapPos.c];
    room2.type = 'path';
    room2.name = '触发的陷阱';
    room2.desc = '陷阱已经触发了,但区域现在是安全的。';
    if (G.hp <= 0) {
      G.hp = 1;
      toast('⚠️ 你勉强撑住了...');
    }
  }
  updateStatus();
  renderMiniMap();
}

function _showBossInfo() {
  var template = ENEMIES.boss_goblin;
  // Adjust boss name/stats by location
  var bossName = template.name;
  var bossDesc = template.desc;
  var bossEmoji = template.emoji;
  var bossHp = template.hp;
  var bossAtk = template.atk;
  var bossAgi = template.agi;
  var bossXp = template.xp;

  // Location-specific boss flavor (uses same stats for now, will vary with more bosses)
  if (G.location === 'darkforest') {
    bossName = '暗影猎手';
    bossDesc = '森林深处的顶级掠食者,双眼如炬,行动无声';
    bossEmoji = '🐺';
  } else if (G.location === 'fortress') {
    bossName = '铁拳盗首';
    bossDesc = '堡垒强盗的首领,铁臂如锤,一声怒吼震退群敌';
    bossEmoji = '🗡️';
  } else if (G.location === 'mine') {
    bossName = '深渊守望者';
    bossDesc = '矿洞最深处的古怪存在,无人知晓它的真面目';
    bossEmoji = '👻';
  }

  // Estimate difficulty relative to player
  var diffLabel = '';
  var diffColor = '';
  var playerPower = calcAtk() + calcDef() + G.maxHp / 5;
  var bossPower = bossAtk + bossHp / 4 + bossAgi;
  var ratio = playerPower / bossPower;
  if (ratio >= 1.5) { diffLabel = '轻松'; diffColor = '#1eff00'; }
  else if (ratio >= 1.0) { diffLabel = '有挑战'; diffColor = '#ffff00'; }
  else if (ratio >= 0.7) { diffLabel = '困难'; diffColor = '#ff8c00'; }
  else { diffLabel = '极危险'; diffColor = '#ff3333'; }

  var html = '';
  html += '<div class="scene-title">👑 首领情报</div>';
  html += '<div class="boss-info-panel">';
  html += '<div class="boss-info-emoji" style="font-size:3em;text-align:center;margin:10px 0">' + bossEmoji + '</div>';
  html += '<div class="boss-info-name" style="font-size:1.4em;font-weight:bold;text-align:center;color:#ff8c00">' + bossName + '</div>';
  html += '<div class="boss-info-desc" style="text-align:center;color:#aaa;margin:8px 0;font-style:italic">"' + bossDesc + '"</div>';
  html += '<div class="boss-info-stats" style="margin:12px 0">';
  html += '<div style="margin:4px 0">❤️ 生命值:约 ' + bossHp + '</div>';
  html += '<div style="margin:4px 0">⚔️ 攻击力:约 ' + bossAtk + '</div>';
  html += '<div style="margin:4px 0">🏃 敏捷:约 ' + bossAgi + '</div>';
  html += '<div style="margin:4px 0">⭐ 经验:约 ' + bossXp + '</div>';
  html += '</div>';
  html += '<div class="boss-difficulty" style="text-align:center;padding:8px;border:1px solid ' + diffColor + ';border-radius:6px;color:' + diffColor + '">难度评估:' + diffLabel + '</div>';
  html += '</div>';
  html += '<div class="btns">';
  html += '<button class="btn btn-danger" onclick="startBossFight()">⚔️ 挑战!</button>';
  html += '<button class="btn" onclick="renderMiniMap()">🏃 暂不挑战</button>';
  html += '</div>';
  render(html);
}

function startBossFight() {
  var bossKey = G.location + '_' + G.miniMapPos.r + '_' + G.miniMapPos.c;
  if (G.bossDefeated[bossKey]) {
    toast('👑 首领已被击败');
    renderMiniMap();
    return;
  }
  var template = ENEMIES.boss_goblin;
  G.battle = {
    enemies: [Object.assign({}, template, { curHp: template.hp })],
    log: [], turn: 0, defending: false, warcry: 0, gamblerUsed: false, dungeon: true, isBoss: true,
    bossKey: bossKey
  };
  G.inBattle = true;
  G.selectedTarget = 0;
  G.attackMode = null;

  // Boss pre-battle dialog based on location
  var bossNpcId = null;
  if (G.location === 'lake') bossNpcId = null;
  else if (G.location === 'darkforest' || G.location === 'fortress') bossNpcId = 'darkblade';
  else if (G.location === 'mine') bossNpcId = 'xuanming';

  if (bossNpcId && NPC_DIALOGS[bossNpcId]) {
    G._pendingBossBattle = true;
    showDialog(bossNpcId, 0);
    return;
  }

  renderBattle('👑 首领战!');
}

function miniMapTreasure() {
  // Treasure chests drop materials + rare items, not gold
  var loot = [];

  var matKeys = Object.keys(MATERIALS);
  var uncommonMats = matKeys.filter(function(k) { return MATERIALS[k].rarity === 'uncommon' || MATERIALS[k].rarity === 'common'; });
  for (var i = 0; i < rand(1, 2); i++) {
    var mk = uncommonMats[rand(0, uncommonMats.length - 1)];

    loot.push(m.icon + ' ' + m.name);
  }

    var rareMats = matKeys.filter(function(k) { return MATERIALS[k].rarity === 'rare'; });

    G.inventory.push({ id: rm.id, name: rm.name, type: 'material', icon: rm.icon, category: rm.category, rarity: rm.rarity, sellPrice: rm.sellPrice, craftValue: rm.craftValue });

  _updateTreasureQuestProgress(G.location);

// ═══════════════════════════════════════════════════════════

function renderBattle(msg) {
  if (!G || !G.battle) return;
  var b = G.battle;
  var html = '';

  // Check win/loss
  var alive = b.enemies.filter(function(e) { return e.curHp > 0; });
  var isVictory = alive.length === 0;
  var isDefeat = G.hp <= 0;

  // === ENEMY AREA ===
  html += '<div class="battle-enemies">';
  for (var i = 0; i < b.enemies.length; i++) {
    var e = b.enemies[i];
    var dead = e.curHp <= 0;
    var isSelected = (i === G.selectedTarget && !dead);
    var hpPct = Math.max(0, Math.floor(e.curHp / e.hp * 100));

    html += '<div class="enemy-card' + (dead ? ' enemy-dead' : '') + (isSelected ? ' enemy-selected' : '') + '"';
    if (!dead && !isVictory && !isDefeat) {
      html += ' onclick="selectTarget(' + i + ')" style="cursor:pointer"';
    }
    html += '>';
    html += '<div class="enemy-emoji">' + (e.emoji || (e.isBoss ? '👑' : '👹')) + '</div>';
    html += '<div class="enemy-info">';
    html += '<div class="enemy-name">' + e.name + (e.isBoss ? ' 👑' : '') + '</div>';
    html += '<div class="enemy-hp-bar"><div class="enemy-hp-fill" style="width:' + hpPct + '%"></div></div>';
    html += '<div class="enemy-hp-text">' + e.curHp + '/' + e.hp + '</div>';
    html += '</div>';
    if (isSelected && !dead) html += '<div class="enemy-target-arrow">▼</div>';
    html += '</div>';
  }
  html += '</div>';

  // === PLAYER STATUS ===
  html += '<div class="battle-player">';
  var pHpPct = Math.max(0, Math.floor(G.hp / G.maxHp * 100));
  var pMpPct = Math.max(0, Math.floor(G.mp / G.maxMp * 100));
  html += '<div class="player-name">Lv.' + G.level + ' ' + (G.name || '冒险者') + '</div>';
  html += '<div class="player-bars">';
  html += '<div class="player-bar-row"><span class="bar-label">❤️</span><div class="player-hp-bar"><div class="player-hp-fill" style="width:' + pHpPct + '%"></div></div><span class="bar-val">' + G.hp + '/' + G.maxHp + '</span></div>';
  html += '<div class="player-bar-row"><span class="bar-label">💧</span><div class="player-mp-bar"><div class="player-mp-fill" style="width:' + pMpPct + '%"></div></div><span class="bar-val">' + G.mp + '/' + G.maxMp + '</span></div>';
  html += '</div>';
  html += '<div class="player-stats-inline">⚔️' + calcAtk() + ' 🔮' + calcMagicAtk() + ' 🛡️' + calcDef() + '</div>';
  html += '</div>';

  // === BATTLE LOG ===
  if (b.log && b.log.length > 0) {
    html += '<div class="battle-log">';
    for (var li = 0; li < b.log.length; li++) {
      html += '<div class="log-entry">' + b.log[li] + '</div>';
    }
    html += '</div>';
  }

  // === VICTORY / DEFEAT ===
  if (isVictory) {
    html += '<div class="battle-result victory">';
    html += '<div class="result-title">🏆 胜利!</div>';
    var totalXp = 0;
    for (var vi = 0; vi < b.enemies.length; vi++) {
      totalXp += b.enemies[vi].xp || 0;
      // No gold from combat - must sell items or trade
    }
    html += '<div class="result-rewards">+' + totalXp + ' XP</div>';
    // Drops
    var drops = [];
    for (var di = 0; di < b.enemies.length; di++) {
      var e = b.enemies[di];
      var dropRoll = Math.random() * 100;
      var baseRate = e.isBoss ? 60 : 15;
      var lukBonus = G.luk * 1;
      if (dropRoll < Math.min(80, baseRate + lukBonus)) {
        var item = generateRandomDrop(e.isBoss);
        if (item) drops.push(item);
      }
      if (Math.random() * 100 < 30) drops.push({ name:'小型生命药水', type:'potion', heal:30, icon:'🧪', rarity:'common' });
      // Material drops
      var matDrops = ENEMY_MAT_DROPS[e.id];
      if (matDrops) {
        var mtiers = ['common', 'uncommon', 'rare', 'epic'];
        for (var mti = 0; mti < mtiers.length; mti++) {
          var mtier = mtiers[mti];
          var mtierDrops = matDrops[mtier];
          if (!mtierDrops) continue;
          for (var mmi = 0; mmi < mtierDrops.length; mmi++) {
            if (Math.random() < mtierDrops[mmi].rate) {
              var mmat = MATERIALS[mtierDrops[mmi].mid];
              if (mmat) drops.push({ id:mmat.id, name:mmat.name, type:'material', icon:mmat.icon, category:mmat.category, rarity:mmat.rarity, sellPrice:mmat.sellPrice, craftValue:mmat.craftValue });
            }
          }
        }
      }
    }
    if (drops.length > 0) {
      html += '<div class="result-drops">';
      for (var dk = 0; dk < drops.length; dk++) {
        var dr = drops[dk];
        var rarColor = dr.rarity === 'epic' ? '#a335ee' : dr.rarity === 'rare' ? '#0070dd' : dr.rarity === 'uncommon' ? '#1eff00' : '#9d9d9d';
        html += '<div class="drop-item" style="color:' + rarColor + '">' + (dr.icon || '📦') + ' ' + dr.name + '</div>';
        G.inventory.push(dr);
      }
      html += '</div>';
    }
    G.xp += totalXp;
    G.totalBattlesWon++;
    // Boss flag
    for (var bi = 0; bi < b.enemies.length; bi++) {
      if (b.enemies[bi].isBoss) G.bossDefeated[G.location] = true;
    }
    // Level up check
    while (G.xp >= G.nextXp) {
      G.xp -= G.nextXp;
      G.level++;
      G.attrPts += 3;
      G.nextXp = calcNextXp(G.level);
      G.maxHp = calcMaxHp();
      G.maxMp = calcMaxMp();
      G.hp = G.maxHp;
      G.mp = G.maxMp;
      html += '<div class="level-up">🎉 升级!Lv.' + G.level + ' | +3属性点</div>';
    }
    G.inBattle = false;
    G.battle = null;
    html += '<div class="btns">';
    html += '<button class="btn btn-primary" onclick="renderMiniMap()">继续探索</button>';
    html += '</div>';
    html += '</div>';
    updateStatus();
    render(html);
    return;
  }

  if (isDefeat) {
    html += '<div class="battle-result defeat">';
    html += '<div class="result-title">💀 战败...</div>';
    var lostGold = Math.floor(G.gold * 0.1);
    G.gold -= lostGold;
    G.hp = Math.floor(G.maxHp * 0.3);
    G.mp = Math.floor(G.maxMp * 0.3);
    G.totalBattlesLost++;
    G.inBattle = false;
    G.battle = null;
    html += '<div class="result-desc">你在旅店醒来,失去了 ' + lostGold + ' 金币</div>';
    html += '<div class="btns">';
    html += '<button class="btn btn-primary" onclick="sceneInn()">🔄 重新开始</button>';
    html += '</div>';
    html += '</div>';
    updateStatus();
    render(html);
    return;
  }

  // === BATTLE EFFECT LAYER ===
  html += '<div id="battleEffect" class="battle-effect-layer" style="display:none"></div>';

  // === ACTION BUTTONS ===
  html += '<div class="battle-actions">';
  html += '<button class="btn btn-atk" onclick="playerAttack()">⚔️ 攻击</button>';

  if (G.origin && G.origin.skill && G.origin.skill.type !== '被动') {
    html += '<button class="btn btn-skill" onclick="useOriginSkill()">' + G.origin.skill.emoji + ' ' + G.origin.skill.name + '</button>';
  }

  if (G.skills && G.skills.length > 0) {
    // Separate spells and combat skills
    var spells = [];
    var combatSkills = [];
    for (var si = 0; si < G.skills.length; si++) {
      var sk = SKILLS.find(function(s) { return s.id === G.skills[si]; });
      if (sk) {
        if (sk.category === 'spell') spells.push(sk);
        else combatSkills.push(sk);
      }
    }
    if (spells.length > 0) {
      html += '<div class="skill-group-label">🔮 法术</div>';
      for (var sp = 0; sp < spells.length; sp++) {
        var ssk = spells[sp];
        var canUse = G.mp >= ssk.cost;
        var targetIcon = ssk.target === '群攻' ? '🎯A' : ssk.target === '自身' ? '🛡️' : '🎯1';
        html += '<button class="btn btn-skill' + (!canUse ? ' btn-disabled' : '') + '" onclick="playerSkill(\'' + ssk.id + '\')">' + ssk.emoji + ' ' + ssk.name + ' <span class="skill-meta-inline">' + targetIcon + '</span><span class="skill-cost">' + ssk.cost + '💧</span></button>';
      }
    }
    if (combatSkills.length > 0) {
      html += '<div class="skill-group-label">⚔️ 技能</div>';
      for (var cs = 0; cs < combatSkills.length; cs++) {
        var csk = combatSkills[cs];
        var canUse2 = G.mp >= csk.cost;
        var targetIcon2 = csk.target === '群攻' ? '🎯A' : csk.target === '自身' ? '🛡️' : '🎯1';
        html += '<button class="btn btn-skill' + (!canUse2 ? ' btn-disabled' : '') + '" onclick="playerSkill(\'' + csk.id + '\')">' + csk.emoji + ' ' + csk.name + ' <span class="skill-meta-inline">' + targetIcon2 + '</span><span class="skill-cost">' + csk.cost + '💧</span></button>';
      }
    }
  }

  html += '<button class="btn btn-flee" onclick="fleeBattle()">🏃 逃跑</button>';
  html += '<button class="btn" onclick="sceneInventoryFromBattle()">🎒 背包</button>';
  html += '</div>';

  render(html);
  updateStatus();
}

function selectTarget(idx) {
  G.selectedTarget = idx;
  renderBattle('目标:' + (G.battle.enemies[idx] ? G.battle.enemies[idx].name : '?'));
}

// ═══════════════════════════════════════════════════════════
// BATTLE EFFECT SYSTEM - Visual effects for combat
// ═══════════════════════════════════════════════════════════
var BATTLE_EFFECTS = {
  fire:      { emoji:'🔥', anim:'burn', color:'#ff4444', particles:['🔥','💥','⚡'] },
  ice:       { emoji:'❄️', anim:'freeze', color:'#44ccff', particles:['❄️','✨','💎'] },
  lightning: { emoji:'⚡', anim:'zap', color:'#ffee44', particles:['⚡','✨','💥'] },
  explosion: { emoji:'💥', anim:'boom', color:'#ff8800', particles:['💥','🔥','☄️'] },
  missile:   { emoji:'✨', anim:'fly', color:'#cc44ff', particles:['✨','💫','⭐'] },
  blizzard:  { emoji:'🌨️', anim:'storm', color:'#aaddff', particles:['🌨️','❄️','💨'] },
  meteor:    { emoji:'☄️', anim:'crash', color:'#ff4400', particles:['☄️','💥','🔥','💀'] },
  heal:      { emoji:'💚', anim:'glow', color:'#44ff44', particles:['💚','✨','💖'] },
  shield:    { emoji:'🛡️', anim:'shield', color:'#4488ff', particles:['🛡️','✨','💎'] },
  slash:     { emoji:'⚔️', anim:'cut', color:'#ffcc44', particles:['⚔️','💥','🗡️'] },
  whirlwind: { emoji:'🌪️', anim:'spin', color:'#88ccff', particles:['🌪️','💨','⚔️'] },
  backstab:  { emoji:'🗡️', anim:'stab', color:'#aa44ff', particles:['🗡️','💥','🩸'] },
  shieldBash:{ emoji:'🛡️', anim:'bash', color:'#aaaaff', particles:['🛡️','💥','💫'] },
  rapid:     { emoji:'👊', anim:'multi', color:'#ffaa44', particles:['👊','💥','⚡'] },
  warcry:    { emoji:'📢', anim:'roar', color:'#ff8844', particles:['📢','⚡','🔥'] },

};

function showBattleEffect(effectId) {
  var fx = BATTLE_EFFECTS[effectId];
  if (!fx) return;
  var el = document.getElementById('battleEffect');
  if (!el) return;
  // Build particle burst
  var html = '<div class="battle-fx battle-fx-' + fx.anim + '">';
  for (var i = 0; i < fx.particles.length; i++) {
    html += '<span class="fx-particle" style="animation-delay:' + (i * 0.08) + 's;color:' + fx.color + '">' + fx.particles[i] + '</span>';
  }
  html += '</div>';
  el.innerHTML = html;
  el.style.display = 'block';
  // Auto-hide after animation
  setTimeout(function() { el.style.display = 'none'; el.innerHTML = ''; }, 600);
}

function playerAttack() {
  var b = G.battle;
  var alive = b.enemies.filter(function(e) { return e.curHp > 0; });
  if (alive.length === 0) return;

  var targetIdx = G.selectedTarget;
  if (!b.enemies[targetIdx] || b.enemies[targetIdx].curHp <= 0) {
    for (var i = 0; i < b.enemies.length; i++) {
      if (b.enemies[i].curHp > 0) { targetIdx = i; break; }
    }
  }
  var target = b.enemies[targetIdx];

  var dmg = rand(Math.floor(calcAtk() * 0.8), Math.floor(calcAtk() * 1.2));
  if (b.warcry && b.warcry > 0) dmg = Math.floor(dmg * 1.2);

  // Crit check
  var isCrit = G._nextCrit || (Math.random() * 100 < calcCrit());
  G._nextCrit = false;
  if (isCrit) dmg = Math.floor(dmg * (1 + calcCritDmg()));

  // Deadly strike check (装备deadlyRate)
  var totalDeadly = 0;
  var eqKeys = ['weapon','helmet','armor','gloves','boots','belt','accessory'];
  for (var di = 0; di < eqKeys.length; di++) {
    var dItem = G.equipment[eqKeys[di]];
    if (dItem && dItem.deadlyRate) totalDeadly += dItem.deadlyRate;
  }
  var isDeadly = Math.random() < totalDeadly;
  if (isDeadly) dmg = Math.floor(dmg * 2.5);

  target.curHp = Math.max(0, target.curHp - dmg);
  var hitMsg = '⚔️ 攻击 ' + target.name + ',造成 ' + dmg + ' 伤害';
  if (isDeadly) { hitMsg += ' ⚡致命!'; showBattleEffect('deadly'); }
  else if (isCrit) { hitMsg += ' 💥会心!'; showBattleEffect('crit'); }
  else { showBattleEffect('attack'); }
  b.log.push(hitMsg);

  // Fire damage from equipment
  var totalFireDmg = 0;
  for (var fi = 0; fi < eqKeys.length; fi++) {
    var fItem = G.equipment[eqKeys[fi]];
    if (fItem && fItem.fireDmg) totalFireDmg += fItem.fireDmg;
  }
  // Set bonus fireDmgMult
  var sb = calcSetBonuses();
  if (sb.fireDmgMult) totalFireDmg = Math.floor(totalFireDmg * (1 + sb.fireDmgMult));
  if (totalFireDmg > 0 && target.curHp > 0) {
    target.curHp = Math.max(0, target.curHp - totalFireDmg);
    b.log.push('🔥 火焰灼烧 ' + target.name + ',造成 ' + totalFireDmg + ' 伤害');
  }

  // Lifesteal
  var totalLifesteal = 0;
  for (var li = 0; li < eqKeys.length; li++) {
    var lItem = G.equipment[eqKeys[li]];
    if (lItem && lItem.lifesteal) totalLifesteal += lItem.lifesteal;
  }
  if (totalLifesteal > 0 && dmg > 0) {
    var heal = Math.floor(dmg * totalLifesteal);
    if (heal > 0) {
      G.hp = Math.min(G.maxHp, G.hp + heal);
      b.log.push('🩸 吸血恢复 ' + heal + ' HP');
    }
  }

  // Double attack
  var totalDoubleAtk = 0;
  for (var dai = 0; dai < eqKeys.length; dai++) {
    var daItem = G.equipment[eqKeys[dai]];
    if (daItem && daItem.doubleAtkRate) totalDoubleAtk += daItem.doubleAtkRate;
  }
  // Shadow blade set: crit double
  if (sb.critDouble && isCrit) totalDoubleAtk += sb.critDouble;
  if (Math.random() < totalDoubleAtk && target.curHp > 0) {
    var dmg2 = rand(Math.floor(calcAtk() * 0.6), Math.floor(calcAtk() * 0.9));
    target.curHp = Math.max(0, target.curHp - dmg2);
    b.log.push('⚔️⚔️ 连击!对 ' + target.name + ' 造成 ' + dmg2 + ' 伤害');
  }

  // Set bonus: shadow_blade firstStrikeMult (first attack in battle)
  if (sb.firstStrikeMult && !b._firstStrikeUsed) {
    b._firstStrikeUsed = true;
    var fsDmg = Math.floor(dmg * sb.firstStrikeMult);
    target.curHp = Math.max(0, target.curHp - fsDmg);
    b.log.push('🗡️ 背刺!额外 ' + fsDmg + ' 伤害');
  }

  if (b.warcry && b.warcry > 0) b.warcry--;
  G.attackMode = null;

  // Check if all enemies dead
  var allDead = b.enemies.filter(function(e) { return e.curHp > 0; }).length === 0;
  if (allDead) {
    setTimeout(function() { endBattle(); }, 400);
  } else {
    setTimeout(function() { enemyTurn(); }, 400);
  }
}

function useOriginSkill() {
  var o = G.origin;
  if (!o || !o.skill) return;

  if (o.id === 'warrior') {
    G.battle.warcry = 3;
    G.battle.log.push('📢 战吼!攻击力+20%持续3回合');
  } else if (o.id === 'gambler') {
    gamblerAttack();
    return;
  } else if (o.id === 'cleric') {
    var healAmt = Math.floor(G.maxHp * 0.1);
    G.hp = Math.min(G.maxHp, G.hp + healAmt);
    G.battle.log.push('✨ 祈祷,恢复 ' + healAmt + ' HP');
  } else if (o.id === 'mage') {
    var mAtk = calcMagicAtk();
    G.battle.log.push('👁️ 奥术感知激活,魔攻 ' + mAtk);
  } else if (o.id === 'hunter') {
    G.battle.log.push('🎯 鹰眼锁定,下次攻击必暴击');
    G._nextCrit = true;
  } else {
    G.battle.log.push('🔮 ' + o.skill.name + ':' + o.skill.desc);
  }

  G.attackMode = null;
  setTimeout(function() { enemyTurn(); }, 400);
}

function playerSkill(sid) {
  var sk = SKILLS.find(function(s) { return s.id === sid; });
  if (!sk) return;
  if (G.mp < sk.cost) { toast('💧 MP不足!'); return; }

  G.mp -= sk.cost;
  var b = G.battle;
  var alive = b.enemies.filter(function(e) { return e.curHp > 0; });
  var effectMsg = sk.effectDesc || '';

  if (sk.target === '自身' || sk.type === '治疗' || sk.type === '增益') {
    if (sk.healMin) {
      var heal = rand(sk.healMin, sk.healMax);
      G.hp = Math.min(G.maxHp, G.hp + heal);
      b.log.push((effectMsg ? effectMsg + ' ' : '') + sk.name + ' 恢复 ' + heal + ' HP');
      showBattleEffect(sk.effect || 'heal');
    }
    if (sk.shield) {
      G.battle.shield = (G.battle.shield || 0) + sk.shield;
      b.log.push((effectMsg ? effectMsg + ' ' : '') + sk.name + ' 获得 ' + sk.shield + ' 护盾');
      showBattleEffect(sk.effect || 'shield');
    }
    if (sk.atkBuff) {
      G.battle.atkBuff = (G.battle.atkBuff || 0) + sk.atkBuff;
      G.battle.atkBuffTurns = (G.battle.atkBuffTurns || 0) + (sk.buffTurns || 2);
      b.log.push((effectMsg ? effectMsg + ' ' : '') + sk.name + ' 攻击力+' + Math.floor(sk.atkBuff*100) + '% ' + (sk.buffTurns||2) + '回合');
      showBattleEffect(sk.effect || 'warcry');
    }
  } else if (sk.aoe) {
    var total = 0;
    var baseDmg = calcSkillDmg(sk);
    for (var i = 0; i < alive.length; i++) {
      alive[i].curHp = Math.max(0, alive[i].curHp - baseDmg);
      total += baseDmg;
    }
    b.log.push((effectMsg ? effectMsg + ' ' : '') + sk.name + ' 群攻! ' + baseDmg + '×' + alive.length + '=' + total + ' 伤害');
    showBattleEffect(sk.effect || 'explosion');
  } else if (sk.missiles) {
    var total2 = 0;
    var targetIdx = G.selectedTarget;
    if (!b.enemies[targetIdx] || b.enemies[targetIdx].curHp <= 0) {
      for (var j = 0; j < b.enemies.length; j++) {
        if (b.enemies[j].curHp > 0) { targetIdx = j; break; }
      }
    }
    for (var m = 0; m < sk.missiles; m++) {
      total2 += calcSkillDmg(sk);
    }
    b.enemies[targetIdx].curHp = Math.max(0, b.enemies[targetIdx].curHp - total2);
    b.log.push((effectMsg ? effectMsg + ' ' : '') + sk.name + ' ' + sk.missiles + '枚命中 ' + b.enemies[targetIdx].name + ',造成 ' + total2 + ' 伤害');
    showBattleEffect(sk.effect || 'missile');
  } else if (sk.hits) {
    var total3 = 0;
    var targetIdx3 = G.selectedTarget;
    if (!b.enemies[targetIdx3] || b.enemies[targetIdx3].curHp <= 0) {
      for (var h = 0; h < b.enemies.length; h++) {
        if (b.enemies[h].curHp > 0) { targetIdx3 = h; break; }
      }
    }
    var hitDetails = [];
    for (var hi = 0; hi < sk.hits; hi++) {
      var hitDmg = calcSkillDmg(sk);
      var hitCrit = Math.random() * 100 < (calcCrit() + (sk.critBonus || 0));
      if (hitCrit) hitDmg = Math.floor(hitDmg * (1 + calcCritDmg()));
      total3 += hitDmg;
      hitDetails.push(hitDmg + (hitCrit ? '💥' : ''));
    }
    b.enemies[targetIdx3].curHp = Math.max(0, b.enemies[targetIdx3].curHp - total3);
    b.log.push((effectMsg ? effectMsg + ' ' : '') + sk.name + ' ' + sk.hits + '连击! ' + hitDetails.join('+') + '=' + total3);
    showBattleEffect(sk.effect || 'rapid');
  } else if (sk.stunChance) {
    var targetIdx4 = G.selectedTarget;
    if (!b.enemies[targetIdx4] || b.enemies[targetIdx4].curHp <= 0) {
      for (var s = 0; s < b.enemies.length; s++) {
        if (b.enemies[s].curHp > 0) { targetIdx4 = s; break; }
      }
    }
    var dmg4 = calcSkillDmg(sk);
    b.enemies[targetIdx4].curHp = Math.max(0, b.enemies[targetIdx4].curHp - dmg4);
    var stunned = Math.random() < sk.stunChance;
    if (stunned) b.enemies[targetIdx4].stunned = true;
    b.log.push((effectMsg ? effectMsg + ' ' : '') + sk.name + ' 对 ' + b.enemies[targetIdx4].name + ' 造成 ' + dmg4 + ' 伤害' + (stunned ? ' ☑️眩晕!' : ''));
    showBattleEffect(sk.effect || 'shieldBash');
  } else if (sk.agiCheck && sk.stealRate) {
    var targetIdx5 = G.selectedTarget;
    if (!b.enemies[targetIdx5] || b.enemies[targetIdx5].curHp <= 0) {
      for (var st = 0; st < b.enemies.length; st++) {
        if (b.enemies[st].curHp > 0) { targetIdx5 = st; break; }
      }
    }
    var agiBonus = (G.agi - 10) * 0.03;
    var stealChance = Math.min(0.85, sk.stealRate + agiBonus);
    if (Math.random() < stealChance) {
      var stolenGold = rand(5, 15 + G.level * 2);
      G.gold += stolenGold;
      var matStolen = null;
      if (Math.random() < 0.3) {
        var eMatDrops = ENEMY_MAT_DROPS[b.enemies[targetIdx5].id];
        if (eMatDrops && eMatDrops.common && eMatDrops.common.length > 0) {
          var pick = eMatDrops.common[Math.floor(Math.random() * eMatDrops.common.length)];
          var mat = MATERIALS[pick.mid];
          if (mat) {
            G.materials[pick.mid] = (G.materials[pick.mid] || 0) + 1;
            matStolen = mat.name;
          }
        }
      }
      b.log.push((effectMsg ? effectMsg + ' ' : '') + '偷窃成功!获得 ' + stolenGold + ' 金币' + (matStolen ? ' + ' + matStolen : ''));
    } else {
      b.log.push('🤚 偷窃失败!对方警觉了');
    }
    showBattleEffect('steal');
  } else {
    var targetIdx6 = G.selectedTarget;
    if (!b.enemies[targetIdx6] || b.enemies[targetIdx6].curHp <= 0) {
      for (var k = 0; k < b.enemies.length; k++) {
        if (b.enemies[k].curHp > 0) { targetIdx6 = k; break; }
      }
    }
    var dmg6 = calcSkillDmg(sk);
    var isCrit6 = G._nextCrit || Math.random() * 100 < (calcCrit() + (sk.critBonus || 0));
    if (isCrit6) dmg6 = Math.floor(dmg6 * (1 + calcCritDmg()));
    G._nextCrit = false;
    b.enemies[targetIdx6].curHp = Math.max(0, b.enemies[targetIdx6].curHp - dmg6);
    b.log.push((effectMsg ? effectMsg + ' ' : '') + sk.name + ' 对 ' + b.enemies[targetIdx6].name + ' 造成 ' + dmg6 + (isCrit6 ? ' 💥暴击!' : '') + ' 伤害');
    showBattleEffect(sk.effect || 'slash');
  }

  G.attackMode = null;
  updateStatus();

  var allDead = b.enemies.filter(function(e) { return e.curHp > 0; }).length === 0;
  if (allDead) {
    setTimeout(function() { endBattle(); }, 400);
  } else {
    setTimeout(function() { enemyTurn(); }, 400);
  }
}


function gamblerAttack() {
  var b = G.battle;
  var winChance = 0.25 + G.luk * 0.02;
  if (Math.random() < winChance) {
    var targetIdx = G.selectedTarget;
    if (!b.enemies[targetIdx] || b.enemies[targetIdx].curHp <= 0) {
      for (var i = 0; i < b.enemies.length; i++) {
        if (b.enemies[i].curHp > 0) { targetIdx = i; break; }
      }
    }
    var dmg = Math.floor(calcAtk() * 2.5);
    b.enemies[targetIdx].curHp = Math.max(0, b.enemies[targetIdx].curHp - dmg);
    b.log.push('🎲 孤注一掷!大成功!造成 ' + dmg + ' 伤害!');
  } else {
    var selfDmg = Math.floor(G.hp * 0.3);
    G.hp = Math.max(1, G.hp - selfDmg);
    b.log.push('🎲 孤注一掷失败!自伤 ' + selfDmg);
    updateStatus();
  }
  b.gamblerUsed = true;
  G.attackMode = null;

  // Check if all enemies dead after gambler attack
  var allDead = b.enemies.filter(function(e) { return e.curHp > 0; }).length === 0;
  if (allDead) {
    setTimeout(function() { endBattle(); }, 400);
  } else {
    setTimeout(function() { enemyTurn(); }, 400);
  }
}

function fleeBattle() {
  tryFlee();
}

function enemyTurn() {
  var b = G.battle;
  var alive = b.enemies.filter(function(e) { return e.curHp > 0; });
  var eqKeys = ['weapon','helmet','armor','gloves','boots','belt','accessory'];

  for (var i = 0; i < alive.length; i++) {
    var e = alive[i];
    // Check stun
    if (e.stunned) {
      e.stunned = false;
      b.log.push('☑️ ' + e.name + ' 处于眩晕状态,无法行动!');
      continue;
    }
    if (Math.random() * 100 < calcDodge()) {
      b.log.push('💨 你闪避了 ' + e.name + ' 的攻击!');
      flashPlayerStatus('#22c55e');
      continue;
    }
    var dmg = rand(Math.floor(e.atk * 0.8), Math.floor(e.atk * 1.2));
    if (b.defending) dmg = Math.floor(dmg * 0.5);

    // Set bonus: guardian deathSave
    var sb = calcSetBonuses();
    if (G.hp - dmg <= 0 && sb.deathSave && Math.random() < sb.deathSave) {
      G.hp = 1;
      b.log.push('🛡️ 守护者之力!致命伤害被抵挡,保留1点生命!');
      flashPlayerStatus('#a855f7');
      continue;
    }

    G.hp = Math.max(0, G.hp - dmg);
    b.log.push(e.name + ' 攻击命中,造成 <span class="dmg-player">' + dmg + '</span> 伤害');
    showDamagePopup('enemy-dmg', dmg, false);
    flashPlayerStatus('#ef4444');

    // Counter attack from equipment
    var totalCounter = 0;
    for (var ci = 0; ci < eqKeys.length; ci++) {
      var cItem = G.equipment[eqKeys[ci]];
      if (cItem && cItem.counterRate) totalCounter += cItem.counterRate;
    }
    if (Math.random() < totalCounter && e.curHp > 0) {
      var counterDmg = Math.floor(calcAtk() * 0.5);
      e.curHp = Math.max(0, e.curHp - counterDmg);
      b.log.push('↩️ 反击!对 ' + e.name + ' 造成 ' + counterDmg + ' 伤害');
    }
  }

  b.turn++;
  b.defending = false;
  updateStatus();
  renderBattle('敌方回合');
}

// Visual effect helpers
function showDamagePopup(id, amount, isCrit) {
  var popup = document.createElement('div');
  popup.id = id;
  popup.className = 'dmg-popup' + (isCrit ? ' dmg-popup-crit' : '');
  popup.textContent = (isCrit ? '💥' : '') + '-' + amount;
  var gameEl = document.getElementById('game');
  if (gameEl) {
    gameEl.style.position = 'relative';
    popup.style.position = 'absolute';
    popup.style.left = isCrit ? '60%' : '50%';
    popup.style.top = id === 'enemy-dmg' ? '75%' : '25%';
    gameEl.appendChild(popup);
    setTimeout(function() { if (popup.parentNode) popup.parentNode.removeChild(popup); }, 800);
  }
}

function flashPlayerStatus(color) {
  var statusEl = document.getElementById('status');
  if (statusEl) {
    statusEl.style.transition = 'background 0.15s';
    statusEl.style.background = color;
    statusEl.style.borderRadius = '4px';
    setTimeout(function() { statusEl.style.background = ''; }, 300);
  }
}

function tryFlee() {
  var b = G.battle;
  if (b.isBoss) {
    toast('👑 首领战中无法逃跑!');
    return;
  }

  // Flee chance based on AGI comparison
  // Average enemy AGI vs player AGI
  var totalEnemyAgi = 0;
  var alive = b.enemies.filter(function(e) { return e.curHp > 0; });
  for (var i = 0; i < alive.length; i++) {
    totalEnemyAgi += (alive[i].agi || 8); // default agi 8 if not set
  }
  var avgEnemyAgi = alive.length > 0 ? totalEnemyAgi / alive.length : 8;

  // If player AGI > enemy AGI: almost 100% flee (95%)
  // If player AGI == enemy AGI: ~70% flee
  // If player AGI < enemy AGI: ~30-50% flee
  var agiDiff = G.agi - avgEnemyAgi;
  var fleeChance;
  if (agiDiff > 0) {
    fleeChance = Math.min(98, 70 + agiDiff * 5); // Higher AGI = near guaranteed
  } else {
    fleeChance = Math.max(15, 70 + agiDiff * 5); // Lower AGI = harder
  }

  if (Math.random() * 100 < fleeChance) {
    toast('🏃 成功逃脱!(敏捷' + G.agi + ' vs 敌均' + Math.round(avgEnemyAgi) + ')');
    G.inBattle = false;
    G.battle = null;
    G.attackMode = null;
    // Stay on mini-map, don't go to world map
    if (G.miniMapPos && LOCATIONS[G.location] && LOCATIONS[G.location].mapConfig) {
      renderMiniMap('成功逃脱,继续探索...');
    } else {
      sceneWorldMap();
    }
  } else {
    b.log.push('🏃 逃跑失败!你的敏捷不足以甩开敌人');
    G.attackMode = null;
    setTimeout(function() { enemyTurn(); }, 600);
  }
}

function calcSetBonuses() {
  var result = {};
  var counts = {};
  var eqKeys = ['weapon','helmet','armor','gloves','boots','belt','accessory'];
  for (var i = 0; i < eqKeys.length; i++) {
    var item = G.equipment[eqKeys[i]];
    if (item && item.setId) {
      if (!counts[item.setId]) counts[item.setId] = 0;
      counts[item.setId]++;
    }
  }
  for (var sid in counts) {
    var set = EQUIP_SETS[sid];
    if (!set) continue;
    var n = counts[sid];
    if (n >= 2 && set.bonus2) {
      for (var k in set.bonus2) {
        if (k !== 'desc') result[k] = (result[k] || 0) + set.bonus2[k];
      }
    }
    if (n >= 4 && set.bonus4) {
      for (var k2 in set.bonus4) {
        if (k2 !== 'desc') result[k2] = (result[k2] || 0) + set.bonus4[k2];
        if (k2 === 'deathSave' || k2 === 'fireImmune') result[k2] = true;
      }
    }
    if (n >= 6 && set.bonus6) {
      for (var k3 in set.bonus6) {
        if (k3 !== 'desc') result[k3] = (result[k3] || 0) + set.bonus6[k3];
        if (k3 === 'fireImmune') result[k3] = true;
      }
    }
  }
  return result;
}

function getSetInfo() {
  var counts = {};
  var items = {};
  var eqKeys = ['weapon','helmet','armor','gloves','boots','belt','accessory'];
  for (var i = 0; i < eqKeys.length; i++) {
    var item = G.equipment[eqKeys[i]];
    if (item && item.setId) {
      if (!counts[item.setId]) { counts[item.setId] = 0; items[item.setId] = []; }
      counts[item.setId]++;
      items[item.setId].push(item.name);
    }
  }
  var result = [];
  for (var sid in counts) {
    var set = EQUIP_SETS[sid];
    if (!set) continue;
    var n = counts[sid];
    result.push({ id:sid, name:set.name, count:n, max:6,
      b2:set.bonus2, b4:set.bonus4, b6:set.bonus6,
      active2:n>=2, active4:n>=4, active6:n>=6 });
  }
  return result;
}

function getTradePrice(goodId, townId, isBuy) {
  var base = null;
  // Find base price from any town's tradeGoods
  var locs = Object.keys(LOCATIONS);
  for (var i = 0; i < locs.length; i++) {
    var tg = LOCATIONS[locs[i]].tradeGoods;
    if (tg) {
      for (var j = 0; j < tg.length; j++) {
        if (tg[j].id === goodId) { base = tg[j].price; break; }
      }
    }
    if (base) break;
  }
  if (!base) return 0;

  // Get town multiplier
  var tp = TRADE_PRICES[goodId];
  var mult = (tp && tp[townId]) ? tp[townId] : 1.0;

  // Apply market event modifier
  if (G.marketEvent && G.marketEvent.mods && G.marketEvent.mods[goodId]) {
    mult *= G.marketEvent.mods[goodId];
  }

  // CHA discount/markup: +5% sell per CHA above 10
  var chaBonus = 1.0;
  if (!isBuy && G.cha > 10) {
    chaBonus += (G.cha - 10) * 0.03;
  }
  // Lucky merchant set bonus: shopMarkup
  if (!isBuy) {
    var setBonuses = calcSetBonuses();
    if (setBonuses.shopMarkup) chaBonus += setBonuses.shopMarkup;
  }

  // Buy price has small markup, sell has small discount
  var price = Math.round(base * mult * (isBuy ? 1.0 : 0.7) * (isBuy ? 1.0 : chaBonus));
  return Math.max(1, price);
}

function getTradeGoodsForTown(townId) {
  var loc = LOCATIONS[townId];
  if (!loc || !loc.tradeGoods) return [];
  return loc.tradeGoods;
}

function getAllTradeableGoods() {
  // Returns all goods the player can sell (from inventory)
  var goods = [];
  if (!G.inventory) return goods;
  for (var i = 0; i < G.inventory.length; i++) {
    var item = G.inventory[i];
    if (item.type === 'trade_good') {
      goods.push({ idx: i, item: item });
    }
  }
  return goods;
}

function rollMarketEvent() {
  // 30% chance of market event each time player enters trade scene
  if (Math.random() < 0.3) {
    var idx = rand(0, MARKET_EVENTS.length - 1);
    var evt = MARKET_EVENTS[idx];
    G.marketEvent = { id: evt.id, name: evt.name, desc: evt.desc, mods: evt.mods, turnsLeft: evt.duration };
    return evt;
  }
  G.marketEvent = null;
  return null;
}

function tickMarketEvent() {
  if (!G.marketEvent) return;
  G.marketEvent.turnsLeft--;
  if (G.marketEvent.turnsLeft <= 0) {
    G.marketEvent = null;
  }
}

function sceneTrade() {
  G._currentScene = 'sceneTrade';

  // Roll market event on first visit
  if (!G._tradeVisited) {
    G._tradeVisited = true;
    var evt = rollMarketEvent();
    if (evt) {
      toast('📢 市场消息:' + evt.name + ' - ' + evt.desc);
    }
  }

  var loc = LOCATIONS[G.location];
  var townGoods = getTradeGoodsForTown(G.location);
  var myGoods = getAllTradeableGoods();
  var tab = G._tradeTab || 'buy';

  var html = '';
  html += '<div class="scene-title">🏪 商贸站</div>';
  html += '<div class="trade-desc">' + (loc.name || '本城') + '的商贸站,各地货物在此集散。</div>';

  // Market event banner
  if (G.marketEvent) {
    html += '<div class="market-event" style="margin:8px 0;padding:8px 12px;background:#2a1a0a;border:1px solid #d4a017;border-radius:6px;font-size:0.85em">';
    html += '<div style="color:#d4a017;font-weight:bold">📢 ' + G.marketEvent.name + '</div>';
    html += '<div style="color:#c0c0c0">' + G.marketEvent.desc + '</div>';
    html += '<div style="color:#888;font-size:0.8em">剩余 ' + G.marketEvent.turnsLeft + ' 次交易</div>';
    html += '</div>';
  }

  // Tab buttons
  html += '<div class="trade-tabs" style="display:flex;gap:8px;margin:8px 0">';
  html += '<button class="btn ' + (tab === 'buy' ? 'btn-primary' : '') + '" onclick="G._tradeTab=\'buy\';sceneTrade()" style="flex:1">📋 进货</button>';
  html += '<button class="btn ' + (tab === 'sell' ? 'btn-primary' : '') + '" onclick="G._tradeTab=\'sell\';sceneTrade()" style="flex:1">💰 出货</button>';
  html += '<button class="btn ' + (tab === 'caravan' ? 'btn-primary' : '') + '" onclick="G._tradeTab=\'caravan\';sceneTrade()" style="flex:1">🐪 商队</button>';
  html += '</div>';

  if (tab === 'buy') {
    html += renderTradeBuy(townGoods);
  } else if (tab === 'sell') {
    html += renderTradeSell(myGoods);
  } else if (tab === 'caravan') {
    html += renderTradeCaravan();
  }

  html += '<div class="btns">';
  html += '<button class="btn" onclick="sceneTown()">↩️ 返回城镇</button>';
  html += '</div>';
  render(html);
}

function buyTradeGood(goodId, price) {
  if (G.gold < price) { toast('💰 金币不足'); return; }

  // Find good data
  var goodData = null;
  var locs = Object.keys(LOCATIONS);
  for (var i = 0; i < locs.length; i++) {
    var tg = LOCATIONS[locs[i]].tradeGoods;
    if (tg) {
      for (var j = 0; j < tg.length; j++) {
        if (tg[j].id === goodId) { goodData = tg[j]; break; }
      }
    }
    if (goodData) break;
  }
  if (!goodData) { toast('货物不存在'); return; }

  G.gold -= price;
  if (!G.inventory) G.inventory = [];
  G.inventory.push({
    id: goodData.id,
    tradeId: goodData.id,
    name: goodData.name,
    type: 'trade_good',
    category: goodData.category,
    buyPrice: price,
    price: price  // for sellItem compatibility
  });
  updateStatus();
  tickMarketEvent();
  toast('✅ 购入 ' + goodData.name + ' (-' + price + '💰)');
  sceneTrade();
}

function sellTradeGood(invIdx) {
  if (!G.inventory || !G.inventory[invIdx]) { toast('物品不存在'); return; }
  var item = G.inventory[invIdx];
  if (item.type !== 'trade_good') { toast('不是商贸货物'); return; }

  var sellPrice = getTradePrice(item.tradeId, G.location, false);
  var profit = sellPrice - (item.buyPrice || 0);

  G.gold += sellPrice;
  G.inventory.splice(invIdx, 1);
  updateStatus();
  tickMarketEvent();

  var profitText = profit > 0 ? '📈 盈利 +' + profit : '📉 亏损 ' + profit;
  toast('💰 出售 ' + item.name + ' +' + sellPrice + '💰 ' + profitText);
  sceneTrade();
}

function sendCaravan(destId) {
  var myGoods = getAllTradeableGoods();
  if (myGoods.length === 0) { toast('没有货物可运输'); return; }

  // Calculate total sell value at destination
  var totalValue = 0;
  for (var i = 0; i < myGoods.length; i++) {
    totalValue += getTradePrice(myGoods[i].item.tradeId, destId, false);
  }

  // Roll caravan risk
  var riskRoll = Math.random();
  var cumulative = 0;
  var riskResult = CARAVAN_RISKS[CARAVAN_RISKS.length - 1]; // default: nothing
  for (var r = 0; r < CARAVAN_RISKS.length; r++) {
    cumulative += CARAVAN_RISKS[r].chance;
    if (riskRoll < cumulative) { riskResult = CARAVAN_RISKS[r]; break; }
  }

  // 行商起源: reduce risk
  var lossRate = 0;
  if (riskResult.id !== 'nothing') {
    lossRate = riskResult.minLoss + Math.random() * (riskResult.maxLoss - riskResult.minLoss);
    if (G.origin === 'merchant') lossRate *= 0.8; // 行商减少20%损失
  }

  var finalGold = Math.round(totalValue * (1 - lossRate));
  var lostGold = totalValue - finalGold;

  // Remove all trade goods from inventory (sold in reverse order to preserve indices)
  var soldNames = [];
  for (var s = myGoods.length - 1; s >= 0; s--) {
    soldNames.push(myGoods[s].item.name);
    G.inventory.splice(myGoods[s].idx, 1);
  }

  G.gold += finalGold;
  updateStatus();
  tickMarketEvent();

  // Show result
  var html = '';
  html += '<div class="scene-title">🐪 商队报告</div>';
  html += '<div style="text-align:center;margin:16px 0">';
  html += '<div style="font-size:1.2em;color:#e0e0e0">目的地:' + LOCATIONS[destId].name + '</div>';
  html += '<div style="font-size:1.1em;margin:8px 0">' + (riskResult.id === 'nothing' ? '✅' : '⚠️') + ' ' + riskResult.name + '</div>';
  html += '<div style="color:#888;font-size:0.9em">' + riskResult.desc + '</div>';
  html += '</div>';

  html += '<div style="margin:12px 0;padding:10px;background:#1a1a2e;border-radius:6px">';
  html += '<div style="color:#d4a017">货物:' + soldNames.reverse().join('、') + '</div>';
  html += '<div>预期收益:<span style="color:#888">' + totalValue + ' 💰</span></div>';
  if (lostGold > 0) {
    html += '<div style="color:#ef4444">损失:-' + lostGold + ' 💰 (' + Math.round(lossRate * 100) + '%)</div>';
  }
  html += '<div style="color:#22c55e;font-size:1.2em;font-weight:bold">实收:' + finalGold + ' 💰</div>';
  html += '</div>';

  html += '<div class="btns">';
  html += '<button class="btn btn-primary" onclick="sceneTrade()">↩️ 继续商贸</button>';
  html += '<button class="btn" onclick="sceneTown()">🏙️ 返回城镇</button>';
  html += '</div>';
  render(html);
}

// Random equipment drop generator
function generateRandomDrop(isBoss) {
  var allSlots = ['weapon','helmet','armor','gloves','boots','belt','accessory'];
  var slot = allSlots[rand(0, allSlots.length - 1)];
  var sd = SLOT_DEFS[slot];

  // Determine rarity with LUCK tier bonus
  // Luck tiers: 0-9 = 普通, 10-19 = 吉运, 20-29 = 天选, 30+ = 神眷
  // Each tier shifts rarity probabilities upward
  var luckTier = G.luk < 10 ? 0 : (G.luk < 20 ? 1 : (G.luk < 30 ? 2 : 3));
  // dropTierBonus from set bonuses (幸运商人6件)
  var setBonus = 0;
  var setBonuses = calcSetBonuses();
  if (setBonuses.dropTierBonus) setBonus = setBonuses.dropTierBonus;
  luckTier += setBonus;

  // Base thresholds: [mythic, legendary, epic, rare, uncommon]
  // Normal:  [0.1, 1, 5, 15, 40]
  // Each luck tier shifts: +0.5% mythic, +2% legendary, +5% epic, +8% rare, +10% uncommon
  var tierShift = luckTier;
  var rarityRoll = Math.random() * 100;
  var rarity;
  if (isBoss) {
    // Boss: better base + luck shift
    var mythicCh = 2 + tierShift * 1;
    var legendCh = mythicCh + 18 + tierShift * 3;
    var epicCh = legendCh + 40 + tierShift * 5;
    var rareCh = epicCh + 30 + tierShift * 4;
    if (rarityRoll < mythicCh) rarity = 'mythic';
    else if (rarityRoll < legendCh) rarity = 'legendary';
    else if (rarityRoll < epicCh) rarity = 'epic';
    else if (rarityRoll < rareCh) rarity = 'rare';
    else rarity = 'uncommon';
  } else {
    // Normal mob
    var mythicCh = 0.1 + tierShift * 0.5;
    var legendCh = mythicCh + 0.9 + tierShift * 2;
    var epicCh = legendCh + 4 + tierShift * 5;
    var rareCh = epicCh + 10 + tierShift * 8;
    var uncomCh = rareCh + 25 + tierShift * 10;
    if (rarityRoll < mythicCh) rarity = 'mythic';
    else if (rarityRoll < legendCh) rarity = 'legendary';
    else if (rarityRoll < epicCh) rarity = 'epic';
    else if (rarityRoll < rareCh) rarity = 'rare';
    else if (rarityRoll < uncomCh) rarity = 'uncommon';
    else rarity = 'common';
  }
  var rt = RARITY_TABLE[rarity];
  var levelScale = Math.max(1, G.level - rand(0, 2));

  // Stat prefix (1)
  var statPfx = STAT_PREFIXES[rand(0, STAT_PREFIXES.length - 1)];
  var pfxObj = { name: statPfx.name, stat: statPfx.stat };
  if (statPfx.mult) pfxObj.mult = statPfx.mult;
  if (statPfx.flatMin) pfxObj.value = rand(statPfx.flatMin, statPfx.flatMax);

  // Effect prefixes (0 to max)
  var numEffectPfx = rand(rt.prefixMin - 1, rt.prefixMax - 1); // -1 because 1 stat prefix already used
  numEffectPfx = Math.max(0, numEffectPfx);
  var effects = [];
  var usedEffTypes = {};
  for (var ei = 0; ei < numEffectPfx; ei++) {
    var eff = EFFECT_PREFIXES[rand(0, EFFECT_PREFIXES.length - 1)];
    if (usedEffTypes[eff.type]) continue;
    usedEffTypes[eff.type] = true;
    var effObj = { name: eff.name, type: eff.type };
    if (eff.dmgMin !== undefined) effObj.dmg = rand(eff.dmgMin, eff.dmgMax);
    if (eff.slowPct !== undefined) effObj.slowPct = eff.slowPct;
    if (eff.valMin !== undefined) effObj.value = rand(eff.valMin, eff.valMax);
    effects.push(effObj);
  }

  // Random affixes
  var numAffixes = rand(rt.affixMin, rt.affixMax);
  var affixes = [];
  var usedAffixStats = {};
  for (var ai = 0; ai < numAffixes; ai++) {
    var af = AFFIX_POOL[rand(0, AFFIX_POOL.length - 1)];
    if (usedAffixStats[af.stat]) continue;
    usedAffixStats[af.stat] = true;
    var val = rand(af.min, af.max);
    var pctScale = 0.6 + Math.random() * 0.7; // 60%~130%
    val = Math.floor(val * rt.mult * pctScale);
    val = Math.max(1, val);
    affixes.push({ stat: af.stat, value: val, label: af.label, isPct: !!af.isPct });
  }

  // Set assignment (rare+ only, 30% chance)
  var setId = null;
  if (rarity !== 'common' && rarity !== 'uncommon' && Math.random() < 0.3) {
    var setKeys = Object.keys(EQUIP_SETS);
    setId = setKeys[rand(0, setKeys.length - 1)];
  }

  // Build item name
  var baseName = sd.names[rand(0, sd.names.length - 1)];
  var fullName = pfxObj.name;
  for (var eni = 0; eni < effects.length; eni++) fullName += effects[eni].name;
  fullName += baseName;
  if (setId) fullName = '【' + EQUIP_SETS[setId].name + '】' + fullName;

  // Build item object
  var item = {
    name: fullName,
    type: 'equipment',
    slot: slot,
    level: levelScale,
    rarity: rarity,
    rarityColor: rt.color,
    icon: sd.icon,
    setId: setId,
    prefix: pfxObj,
    effects: effects,
    affixes: affixes,
    // Base stats (multiplier applied)
    atk: 0, def: 0, hp: 0, mp: 0, matk: 0,
    critRate: 0, dodge: 0, lifesteal: 0,
    fireDmg: 0, counterRate: 0, doubleAtkRate: 0, deadlyRate: 0
  };

  // Slot-specific base stats
  item.atk = Math.floor((sd.baseAtk + (sd.baseAtkPerLv || 0) * levelScale) * rt.mult);
  item.def = Math.floor((sd.baseDef + (sd.baseDefPerLv || 0) * levelScale) * rt.mult);
  item.hp  = Math.floor((sd.baseHp + (sd.baseHpPerLv || 0) * levelScale) * rt.mult);
  if (sd.baseMatk) item.matk = Math.floor(sd.baseMatk * levelScale * rt.mult);
  if (sd.baseDodge) item.dodge = sd.baseDodge * rt.mult;
  if (sd.baseLuk) item.luk = Math.floor(sd.baseLuk * rt.mult);

  // Apply stat prefix to base
  if (pfxObj.stat === 'atk' && pfxObj.mult) item.atk = Math.floor(item.atk * (1 + pfxObj.mult));
  if (pfxObj.stat === 'def' && pfxObj.mult) item.def = Math.floor(item.def * (1 + pfxObj.mult));
  if (pfxObj.stat === 'matk' && pfxObj.mult) item.matk = Math.floor(item.matk * (1 + pfxObj.mult));
  if (pfxObj.stat === 'maxHp' && pfxObj.mult) item.hp = Math.floor(item.hp * (1 + pfxObj.mult));
  if (pfxObj.stat === 'luk' && pfxObj.value) item.luk = (item.luk || 0) + pfxObj.value;

  // Apply effect prefixes
  for (var efi = 0; efi < effects.length; efi++) {
    var ef = effects[efi];
    if (ef.type === 'fire') item.fireDmg = ef.dmg;
    if (ef.type === 'lifesteal') item.lifesteal = ef.value / 100;
    if (ef.type === 'crit') item.critRate = ef.value / 100;
    if (ef.type === 'deadly') item.deadlyRate = ef.value / 100;
    if (ef.type === 'counter') item.counterRate = ef.value / 100;
    if (ef.type === 'doubleAtk') item.doubleAtkRate = ef.value / 100;
    if (ef.type === 'frost') item.frostSlow = ef.slowPct;
  }

  // Apply affix bonuses to item
  for (var afi = 0; afi < affixes.length; afi++) {
    var a = affixes[afi];
    if (a.stat === 'atk') item.atk += a.value;
    if (a.stat === 'def') item.def += a.value;
    if (a.stat === 'hp') item.hp += a.value;
    if (a.stat === 'mp') item.mp += a.value;
    if (a.stat === 'matk') item.matk += a.value;
    if (a.stat === 'str') item.str = (item.str || 0) + a.value;
    if (a.stat === 'agi') item.agi = (item.agi || 0) + a.value;
    if (a.stat === 'int') item.int = (item.int || 0) + a.value;
    if (a.stat === 'cha') item.cha = (item.cha || 0) + a.value;
    if (a.stat === 'luk') item.luk = (item.luk || 0) + a.value;
    if (a.stat === 'critRate') item.critRate += a.value / 100;
    if (a.stat === 'dodge') item.dodge += a.value / 100;
  }

  return item;
}

function endBattle() {
  var b = G.battle;
  G.inBattle = false;

  var totalXp = 0;
  var drops = []; // equipment/item/material drops
  for (var i = 0; i < b.enemies.length; i++) {
    var e = b.enemies[i];
    totalXp += e.xp || 0;
    // ❌ No more gold drops from combat! Must sell items or trade.

    // Equipment drop chance
    var dropRoll = Math.random() * 100;
    var baseDropRate = e.isBoss ? 60 : (e.isElite ? 40 : 15);
    var lukBonus = G.luk * 1;
    var totalDropRate = Math.min(85, baseDropRate + lukBonus);

    if (dropRoll < totalDropRate) {
      var item = generateRandomDrop(e.isBoss);
      if (item) drops.push(item);
    }

    // Material drops (new!)
    var matDrops = ENEMY_MAT_DROPS[e.id];
    if (matDrops) {
      var tiers = ['common', 'uncommon', 'rare', 'epic'];
      for (var ti = 0; ti < tiers.length; ti++) {
        var tier = tiers[ti];
        var tierDrops = matDrops[tier];
        if (!tierDrops) continue;
        for (var mi = 0; mi < tierDrops.length; mi++) {
          if (Math.random() < tierDrops[mi].rate) {
            var mat = MATERIALS[tierDrops[mi].mid];
            if (mat) {
              drops.push({ id: mat.id, name: mat.name, type: 'material', icon: mat.icon,
                category: mat.category, rarity: mat.rarity, sellPrice: mat.sellPrice, craftValue: mat.craftValue });
            }
          }
        }
      }
    }

    // Potion drop chance (20%, reduced from 30%)
    if (Math.random() * 100 < 20) {
      drops.push({ name: '小型生命药水', type: 'potion', heal: 30, icon: '🧪' });
    }
    // Key drop chance (5%, bosses 20%)
    if (Math.random() * 100 < (e.isBoss ? 20 : 5)) {
      G.keys = (G.keys || 0) + 1;
    }
  }

  // Mark boss as defeated
  if (b.isBoss && b.bossKey) {
    G.bossDefeated[b.bossKey] = true;
    checkStoryTriggers('defeat_boss', G.location);
  }
  // Mark elite as defeated
  if (b.isElite) {
    var ek = G.location + '_elite_' + G.miniMapPos.r + '_' + G.miniMapPos.c;
    if (!G.eliteDefeated) G.eliteDefeated = {};
    G.eliteDefeated[ek] = true;
  }

  G.xp += totalXp;
  G.totalBattlesWon++;
  checkStoryTriggers('win_battles', 'battle_won');

  // Track quest progress for battle-related quests
  _updateBattleQuestProgress();

  // Add drops to inventory
  for (var d = 0; d < drops.length; d++) {
    if (drops[d].type === 'potion') {
      G.inventory.push(drops[d]);
    } else {
      G.inventory.push(drops[d]);
    }
  }

  // Level up check
  var levelUps = 0;
  while (G.xp >= calcNextXp(G.level)) {
    G.level++;
    G.xp -= calcNextXp(G.level - 1);
    G.attrPts += 3;
    G.skillPts += 1;
    G.maxHp = calcMaxHp();
    G.hp = G.maxHp;
    G.maxMp = calcMaxMp();
    G.mp = G.maxMp;
    levelUps++;
    // Auto-learn skills that become available at this level
    for (var _si = 0; _si < SKILLS.length; _si++) {
      var _sk = SKILLS[_si];
      if (_sk.reqLevel === G.level && !G.skills.includes(_sk.id)) {
        G.skills.push(_sk.id);
      }
    }
  }

  G.battle = null;
  G.attackMode = null;
  updateStatus();

  // If leveled up, show level-up screen with attr allocation
  if (levelUps > 0) {
    var html = '';
    html += '<div class="scene-title">🎉 升级!</div>';
    html += '<div class="level-up-info">';
    html += '<div class="level-up-level">Lv.' + G.level + '</div>';
    if (levelUps > 1) html += '<div class="level-up-multi">连续升了 ' + levelUps + ' 级!</div>';
    html += '<div class="level-up-rewards">';
    html += '<div>⭐ +' + totalXp + ' 经验值</div>';
    html += '<div>📝 +3 自由属性点</div>';
    // Show newly learned skills
    var newSkills = [];
    for (var nsi = 0; nsi < SKILLS.length; nsi++) {
      var nsk = SKILLS[nsi];
      var oldLevel = G.level - levelUps;
      if (nsk.reqLevel > oldLevel && nsk.reqLevel <= G.level && G.skills.includes(nsk.id)) {
        newSkills.push(nsk);
      }
    }
    if (newSkills.length > 0) {
      html += '<div class="new-skills-title">📖 新技能!</div>';
      for (var nsk2 = 0; nsk2 < newSkills.length; nsk2++) {
        html += '<div class="drop-item" style="color:#d4a017">' + newSkills[nsk2].emoji + ' ' + newSkills[nsk2].name + ' - ' + newSkills[nsk2].desc + '</div>';
      }
    }
    if (drops.length > 0) {
      for (var dd = 0; dd < drops.length; dd++) {
        html += '<div class="drop-item">' + (drops[dd].icon || '⚔️') + ' ' + drops[dd].name + '</div>';
      }
    }
    html += '</div>';
    html += '</div>';
    html += '<button class="btn btn-primary" onclick="goToAttrAlloc()">✨ 分配属性点</button>';
    render(html);
    return;
  }

  var html = '';
  html += '<div class="scene-title">战斗胜利</div>';
  html += '<div class="victory-rewards">';
  html += '<div>⭐ ' + totalXp + ' 经验值</div>';
  if (drops.length > 0) {
    html += '<div class="drop-list">📦 战利品:</div>';
    for (var dd = 0; dd < drops.length; dd++) {
      var drop = drops[dd];
      var rarity = drop.rarity || 'common';
      html += '<div class="drop-item drop-' + rarity + '">' + (drop.icon || '⚔️') + ' ' + drop.name + '</div>';
    }
  }
  html += '</div>';
  // Show quest progress update if applicable
  var questUpdates = [];
  if (G.quests && G.quests.length > 0) {
    for (var qi = 0; qi < G.quests.length; qi++) {
      var qid = G.quests[qi];
      var q = QUESTS.find(function(qx) { return qx.id === qid; });
      var qp = G.questProgress[qid];
      if (q && qp && (q.progressType === 'win_battles_at' || q.progressType === 'defeat_boss_at')) {
        if (q.progressCount) {
          questUpdates.push('📜 ' + q.name + ':' + Math.min(qp.current || 0, q.progressCount) + '/' + q.progressCount + (qp.done ? ' ✅' : ''));
        } else if (qp.done) {
          questUpdates.push('📜 ' + q.name + ':✅ 可交付');
        }
      }
    }
  }
  if (questUpdates.length > 0) {
    html += '<div style="margin-top:8px;padding:8px;background:#16213e;border-radius:6px;border:1px solid #334">';
    for (var qu = 0; qu < questUpdates.length; qu++) {
      html += '<div style="font-size:0.9em">' + questUpdates[qu] + '</div>';
    }
    html += '</div>';
  }
  html += '<button class="btn btn-primary" onclick="afterBattleContinue()">继续</button>';
  render(html);
}

function goToAttrAlloc() {
  if (G.attrPts > 0) {
    _playerInfoDraft = null;
    sceneAttrAllocation();
  } else {
    afterBattleContinue();
  }
}

function afterBattleContinue() {
  var loc = LOCATIONS[G.location];
  if (loc && loc.mapConfig && G.miniMapPos) {
    renderMiniMap('战斗结束,继续探索...');
  } else {
    sceneWorldMap();
  }
}

function doLevelUp() {
  G.level++;
  G.xp -= calcNextXp(G.level - 1);
  G.attrPts += 3;
  G.skillPts += 1;
  G.maxHp = calcMaxHp();
  G.hp = G.maxHp;
  G.maxMp = calcMaxMp();
  G.mp = G.maxMp;
  // Story trigger: check level objectives
  checkStoryTriggers('reach_level', G.level);
}

function sceneDeath() {
  G.totalBattlesLost++;
  var lossGold = Math.floor(G.gold * 0.1);
  var lossXp = Math.floor(G.xp * 0.2);
  G.gold -= lossGold;
  G.xp = Math.max(0, G.xp - lossXp);

  var html = '';
  html += '<div class="scene-title">战斗失败</div>';
  html += '<div class="death-msg">你被送回最近的城镇...</div>';
  html += '<div class="loss-info">损失:💰' + lossGold + ' | ⭐' + lossXp + ' EXP</div>';
  html += '<button class="btn btn-primary" onclick="sceneRespawn()">继续</button>';
  render(html);
}

function sceneRespawn() {
  G.hp = Math.floor(G.maxHp * 0.5);
  G.mp = Math.floor(G.maxMp * 0.5);
  G.location = 'whitecity';
  updateStatus();
  sceneTown();
}

function collectChapterReward() {
  var pending = G.pendingChapterRewards || [];
  if (pending.length === 0) { toast('没有待领取的奖赏'); return; }

  var totalXp = 0, totalGold = 0;
  for (var i = 0; i < pending.length; i++) {
    totalXp += pending[i].xp;
    totalGold += pending[i].gold;
  }

  G.xp += totalXp;
  G.gold += totalGold;

  // Level up check
  var levelUps = 0;
  while (G.xp >= calcNextXp(G.level)) {
    G.level++;
    G.xp -= calcNextXp(G.level - 1);
    G.attrPts += 3;
    G.skillPts += 1;
    G.maxHp = calcMaxHp();
    G.hp = G.maxHp;
    G.maxMp = calcMaxMp();
    G.mp = G.maxMp;
    levelUps++;
    // Auto-learn skills that become available at this level
    for (var _si = 0; _si < SKILLS.length; _si++) {
      var _sk = SKILLS[_si];
      if (_sk.reqLevel === G.level && !G.skills.includes(_sk.id)) {
        G.skills.push(_sk.id);
      }
    }
  }

  G.pendingChapterRewards = [];
  updateStatus();

  var html = '';
  html += '<div class="scene-title">🎁 奖赏已领取</div>';
  html += '<div class="victory-rewards">';
  html += '<div>⭐ +' + totalXp + ' 经验值</div>';
  html += '<div>💰 +' + totalGold + ' 金币</div>';
  if (levelUps > 0) {
    html += '<div style="color:#d4a017;font-weight:bold">🎉 升至 Lv.' + G.level + '!</div>';
  }
  html += '</div>';

  if (levelUps > 0 && G.attrPts > 0) {
    html += '<button class="btn btn-primary" onclick="goToAttrAlloc()">✨ 分配属性点</button>';
  } else {
    html += '<button class="btn btn-primary" onclick="sceneLordHall()">🏛️ 继续</button>';
  }
  render(html);
}

function buyItem(idx) {
  var it = _shopItems[idx];
  var discount = (G.origin && G.origin.id === 'trader') ? 0.85 : 1;
  var npcDiscount = getNpcDiscount(null, 'shop') / 100;
  discount = discount * (1 - npcDiscount);
  var price = Math.floor(it.price * discount);

  if (G.gold < price) { toast('💰 金币不足'); return; }

  if (it.type === 'consumable') {
    G.gold -= price;
    if (it.heal) G.hp = Math.min(G.maxHp, G.hp + it.heal);
    if (it.restore) G.mp = Math.min(G.maxMp, G.mp + it.restore);
    updateStatus();
    toast('使用 ' + it.name + ' 成功!');
    sceneShop();
    return;
  }

  // Put in inventory instead of auto-equipping
  G.gold -= price;
  G.inventory.push({ id:it.id, name:it.name, type:it.type, atk:it.atk||0, def:it.def||0, hp:it.hp||0, luk:it.luk||0, int:it.int||0, heal:it.heal||0, restore:it.restore||0, price:it.price });
  toast('购买 ' + it.name + ',已放入背包');
  sceneShop();
}
