<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>龙途传说 v5</title>
<style>
/* ═══════════════════════════════════════════════════════════
   手绘线稿风格 - Hand-drawn sketch style
   ═══════════════════════════════════════════════════════════ */

:root {
  --bg: #0d0d0d;
  --paper: #1a1a1a;
  --card: #222;
  --border: #3a3a3a;
  --text: #d4c8a8;
  --text-dim: #8a8070;
  --accent: #d4a017;
  --accent2: #c84;
  --hp: #c44;
  --mp: #48a;
  --xp: #4a4;
  --danger: #c44;
  --sketch: #a89070;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Georgia', 'Songti SC', 'STSong', serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#status {
  width: 100%;
  max-width: 480px;
  padding: 8px 16px;
  background: var(--card);
  border-bottom: 2px solid var(--border);
  font-size: 13px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  letter-spacing: 1px;
}

#game {
  width: 100%;
  max-width: 480px;
  padding: 16px;
  flex: 1;
}

#toast {
  position: fixed;
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: #000;
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 200;
  pointer-events: none;
}

/* ═══════════════════════════════════════════════════════════
   TYPOGRAPHY - Sketch feel
   ═══════════════════════════════════════════════════════════ */

.scene-title {
  font-size: 22px;
  font-weight: bold;
  color: var(--accent);
  text-align: center;
  margin-bottom: 12px;
  letter-spacing: 2px;
  /* Subtle sketch underline */
  position: relative;
  padding-bottom: 8px;
}
.scene-title::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 20%;
  right: 20%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

.scene-desc {
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
  margin-bottom: 16px;
  font-style: italic;
}

.scene-text {
  line-height: 1.8;
  font-size: 15px;
  margin: 12px 0;
}
.scene-text p { margin-bottom: 8px; }

/* ═══════════════════════════════════════════════════════════
   BUTTONS - Ink brush style
   ═══════════════════════════════════════════════════════════ */

.btn {
  display: inline-block;
  padding: 10px 20px;
  background: var(--card);
  color: var(--text);
  border: 2px solid var(--border);
  border-radius: 4px;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  margin: 4px;
  transition: all 0.2s;
  /* Sketch border effect */
  box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
}
.btn:hover { 
  border-color: var(--accent); 
  color: var(--accent);
  box-shadow: 2px 2px 0 rgba(212,160,23,0.2);
}
.btn:active { transform: translate(1px, 1px); box-shadow: none; }
.btn-primary { 
  border-color: var(--accent); 
  color: var(--accent);
  background: rgba(212,160,23,0.1);
}
.btn-danger {
  border-color: var(--danger);
  color: var(--danger);
  background: rgba(204,68,68,0.1);
}
.btn-attack {
  width: 100%;
  padding: 14px;
  background: rgba(204,68,68,0.15);
  border-color: var(--danger);
  color: var(--danger);
  font-size: 16px;
  font-weight: bold;
  margin-top: 8px;
}
.btn-small {
  padding: 4px 10px;
  font-size: 12px;
  background: var(--card);
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
}
.btn-small:hover { color: var(--accent); border-color: var(--accent); }

.btns { text-align: center; margin: 12px 0; }

/* ═══════════════════════════════════════════════════════════
   ORIGIN CARDS - Parchment cards
   ═══════════════════════════════════════════════════════════ */

.origin-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  margin: 8px 0;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.origin-card:hover {
  border-color: var(--accent);
  box-shadow: 0 0 12px rgba(212,160,23,0.15);
}
.origin-emoji {
  font-size: 28px;
  text-align: center;
  margin-bottom: 4px;
}
.origin-name {
  font-size: 18px;
  font-weight: bold;
  color: var(--accent);
  text-align: center;
}
.origin-attrs {
  font-size: 12px;
  text-align: center;
  color: var(--text-dim);
  margin: 4px 0;
}
.origin-skill {
  font-size: 12px;
  text-align: center;
  color: var(--sketch);
}
.origin-story {
  line-height: 1.8;
  font-size: 14px;
  font-style: italic;
  color: var(--text);
  margin: 12px 0;
  padding: 12px;
  background: var(--card);
  border-left: 3px solid var(--accent);
  border-radius: 4px;
}

/* ═══════════════════════════════════════════════════════════
   NAME & ATTRIBUTE ALLOCATION
   ═══════════════════════════════════════════════════════════ */

.name-section {
  margin: 12px 0;
  display: flex;
  gap: 8px;
  align-items: center;
}
.name-section input {
  flex: 1;
  padding: 8px 12px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
}
.name-section input:focus { border-color: var(--accent); outline: none; }

.attr-row-v5 {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.attr-info { display: flex; flex-direction: column; }
.attr-name-v5 { font-size: 14px; font-weight: bold; }
.attr-hint-v5 { font-size: 11px; color: var(--text-dim); }
.attr-controls { display: flex; align-items: center; gap: 8px; }
.attr-btn {
  width: 30px; height: 30px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 50%;
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: inherit;
}
.attr-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.attr-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.attr-value { font-size: 16px; min-width: 50px; text-align: center; }
.attr-boosted { color: var(--accent); font-weight: bold; }
.pts-remaining { text-align: center; font-size: 14px; margin: 8px 0; }
.pts-num { color: var(--accent); font-weight: bold; font-size: 18px; }

/* ═══════════════════════════════════════════════════════════
   WORLD MAP
   ═══════════════════════════════════════════════════════════ */

.world-map {
  width: 100%;
  aspect-ratio: 1;
  margin: 12px 0;
  border: 2px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.world-svg {
  width: 100%;
  height: 100%;
}
.map-actions { margin: 12px 0; text-align: center; }
.current-loc {
  font-size: 14px;
  margin-bottom: 8px;
  color: var(--text-dim);
}

/* ═══════════════════════════════════════════════════════════
   MINI-MAP
   ═══════════════════════════════════════════════════════════ */

.mini-area {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  margin: 8px 0;
}
.mini-area-name {
  font-size: 16px;
  font-weight: bold;
  color: var(--accent);
  margin-bottom: 4px;
}
.mini-area-desc {
  font-size: 13px;
  color: var(--text-dim);
  font-style: italic;
  line-height: 1.6;
}
.mini-map-grid {
  margin: 8px 0;
}
.mini-svg {
  width: 100%;
  max-height: 150px;
}
.mini-directions {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin: 8px 0;
}
.dir-btn {
  padding: 10px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
}
.dir-btn:hover:not(.disabled) { border-color: var(--accent); color: var(--accent); }
.dir-btn.disabled { opacity: 0.3; cursor: not-allowed; }
.mini-actions { margin: 8px 0; text-align: center; }
.mini-msg {
  text-align: center;
  color: var(--accent);
  font-style: italic;
  margin-bottom: 8px;
}

/* ═══════════════════════════════════════════════════════════
   BATTLE - 炎龙骑士团2风格战斗界面
   ═══════════════════════════════════════════════════════════ */

.battle-scene {
  width: 100%;
  margin: 0 auto;
  background: #0a0a08;
  border: 2px solid #5a4a3a;
  border-radius: 4px;
  overflow: hidden;
}
.battle-svg {
  width: 100%;
  display: block;
}

/* Dialog box - DOS-style text window */
.battle-dialog {
  background: #0a0a08;
  border: 2px solid #5a4a3a;
  border-top: none;
  padding: 6px 10px;
  font-size: 12px;
  line-height: 1.6;
  color: #c8c0a0;
  min-height: 50px;
  font-family: 'Noto Serif SC', serif;
}
.dialog-border {
  border: 1px solid #3a3228;
  padding: 4px 8px;
  border-radius: 2px;
}

/* Battle menu - DOS-style action buttons */
.battle-menu {
  margin-top: 4px;
}
.menu-row {
  display: flex;
  gap: 4px;
  margin-bottom: 4px;
}
.menu-btn {
  flex: 1;
  background: #1a1810;
  border: 1px solid #5a4a3a;
  color: #c8c0a0;
  padding: 8px 4px;
  font-size: 13px;
  font-family: 'Noto Serif SC', serif;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
  text-align: center;
  position: relative;
}
.menu-btn:hover:not(.disabled) {
  border-color: #d4a017;
  color: #d4a017;
  background: rgba(212,160,23,0.08);
}
.menu-btn.active {
  border-color: #d4a017;
  color: #d4a017;
  background: rgba(212,160,23,0.15);
  box-shadow: inset 0 0 8px rgba(212,160,23,0.1);
}
.menu-btn.disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
.mp-cost {
  font-size: 10px;
  color: #6688cc;
  margin-left: 4px;
}

.hint-text {
  text-align: center;
  color: #888;
  font-size: 12px;
  padding: 6px;
  border: 1px dashed #444;
  border-radius: 2px;
}

/* Keep legacy classes for compatibility */
.battle-header { display: none; }
.enemies-container { display: none; }
.enemy-card { display: none; }
.player-panel { display: none; }
.battle-log { display: none; }
.battle-controls { display: none; }
.attack-modes { display: none; }
.mode-btn { display: none; }
.battle-result { display: none; }
  margin-top: 2px;
}

/* Player panel */
.player-panel {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 6px;
  padding: 10px;
  margin: 8px 0;
}
.player-name {
  font-size: 14px;
  font-weight: bold;
  color: var(--accent);
  margin-bottom: 6px;
}

.player-stat {
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 4px 0;
}
.stat-label {
  font-size: 12px;
  min-width: 40px;
  color: var(--text-dim);
}
.stat-bar {
  flex: 1;
  height: 10px;
  background: #333;
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid #444;
}
.stat-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.3s;
}
.stat-fill.hp { background: linear-gradient(90deg, #c44, #a33); }
.stat-fill.mp { background: linear-gradient(90deg, #48a, #368); }
.stat-fill.xp { background: linear-gradient(90deg, #4a4, #383); }
.stat-value {
  font-size: 11px;
  color: var(--text-dim);
  min-width: 60px;
  text-align: right;
}

/* Battle log */
.battle-log {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px;
  margin: 6px 0;
  font-size: 12px;
  line-height: 1.6;
  max-height: 80px;
  overflow-y: auto;
}

/* Battle controls */
.battle-controls {
  margin: 8px 0;
}
.controls-label {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.attack-modes {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin: 4px 0;
}
.mode-btn {
  padding: 6px 10px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
}
.mode-btn:hover:not(.disabled) { border-color: var(--accent); color: var(--accent); }
.mode-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(212,160,23,0.1); }
.mode-btn.disabled { opacity: 0.3; cursor: not-allowed; }

/* Battle result */
.battle-result {
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  padding: 16px;
  margin: 8px 0;
}
.battle-result.win { color: var(--xp); }
.battle-result.lose { color: var(--danger); }

/* Damage text */
.dmg-crit { color: #e84; font-weight: bold; }
.crit-text { color: #fa0; }

/* ═══════════════════════════════════════════════════════════
   TOWN
   ═══════════════════════════════════════════════════════════ */

/* Town panorama SVG */
.town-panorama {
  margin: 4px 0 8px;
  border: 2px solid #3a3228;
  border-radius: 6px;
  overflow: hidden;
  background: #1a1820;
}
.town-svg {
  width: 100%;
  height: auto;
  display: block;
}
.bld-clickable:hover {
  filter: url(#bldGlow);
  opacity: 0.9;
}
.bld-clickable:active {
  opacity: 0.7;
}

/* Damage popup */
.dmg-popup {
  font-size: 20px;
  font-weight: bold;
  color: #ef4444;
  text-shadow: 0 0 4px #000, 0 0 8px #f00;
  pointer-events: none;
  animation: dmgFloat 0.8s ease-out forwards;
  z-index: 100;
}
.dmg-popup-crit {
  font-size: 26px;
  color: #fbbf24;
  text-shadow: 0 0 6px #000, 0 0 12px #fa0;
}
@keyframes dmgFloat {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-30px); }
}

/* Drop items */
.drop-list {
  color: #d4a017;
  font-weight: bold;
  margin-top: 6px;
}
.drop-item {
  color: #9ca3af;
  padding: 2px 4px;
}
.drop-common { color: #9ca3af; }
.drop-uncommon { color: #22c55e; }
.drop-rare { color: #3b82f6; }
.drop-epic { color: #a855f7; }

.dmg-player { color: #ef4444; font-weight: bold; }

.town-desc {
  text-align: center;
  color: var(--text-dim);
  font-style: italic;
  margin-bottom: 4px;
}
.town-panorama {
  margin: 8px 0;
  border: 2px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  background: #1a1820;
}
.town-svg {
  width: 100%;
  display: block;
}
.bld-clickable:hover {
  filter: url(#bldGlow);
  opacity: 0.9;
}
}
.building:hover { border-color: var(--accent); }
.build-icon { font-size: 28px; margin-bottom: 4px; }
.build-name { font-size: 14px; font-weight: bold; color: var(--text); }
.build-desc { font-size: 11px; color: var(--text-dim); }

/* Damage popup */
.dmg-popup {
  font-size: 20px;
  font-weight: bold;
  color: #ff4444;
  pointer-events: none;
  animation: dmgFloat 0.8s ease-out forwards;
  z-index: 100;
  text-shadow: 0 0 4px #000, 0 0 8px #ff0000;
}
.dmg-popup-crit {
  font-size: 26px;
  color: #ffaa00;
  text-shadow: 0 0 6px #000, 0 0 12px #ffaa00;
}
@keyframes dmgFloat {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-40px); opacity: 0; }
}
.dmg-player { color: #ff6b6b; font-weight: bold; }

/* Drop items */
.drop-list { margin-top: 6px; color: #d4a017; font-weight: bold; }
.drop-item { padding: 2px 0; font-size: 12px; }
.drop-common { color: #9ca3af; }
.drop-uncommon { color: #22c55e; }
.drop-rare { color: #3b82f6; }
.drop-epic { color: #a855f7; }

/* Inn */
.inn-desc { color: var(--text-dim); font-style: italic; margin-bottom: 8px; }
.inn-service { padding: 8px; background: var(--card); border-radius: 4px; margin: 8px 0; }
.inn-service p { margin: 4px 0; }

/* Shop */
.money-display { text-align: center; font-size: 16px; color: var(--accent); margin-bottom: 8px; }
.shop-items { margin: 8px 0; }
.shop-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  margin: 4px 0;
  cursor: pointer;
  transition: all 0.2s;
}
.shop-item:hover { border-color: var(--accent); }
.item-name { font-size: 14px; }
.item-stats { font-size: 12px; color: var(--text-dim); }
.item-price { color: var(--accent); font-size: 14px; }

/* Tavern */
.tavern-desc { color: var(--text-dim); font-style: italic; margin-bottom: 8px; }
.rumor {
  background: var(--card);
  border-left: 3px solid var(--accent);
  padding: 10px;
  margin: 8px 0;
  font-style: italic;
  color: var(--text);
}

/* Smith */
.smith-desc { color: var(--text-dim); font-style: italic; margin-bottom: 8px; }

/* ═══════════════════════════════════════════════════════════
   INVENTORY
   ═══════════════════════════════════════════════════════════ */

.equip-section { margin: 8px 0; }
.equip-title { font-size: 14px; font-weight: bold; color: var(--accent); margin-bottom: 6px; }
.equip-grid { display: grid; gap: 6px; }
.equip-slot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
}
.slot-name { font-size: 13px; color: var(--text-dim); }
.equipped-item { font-size: 14px; color: var(--text); }
.empty-slot { font-size: 13px; color: #555; }
.inv-section { margin: 12px 0; }
.inv-title { font-size: 14px; font-weight: bold; color: var(--accent); margin-bottom: 6px; }
.inv-empty { text-align: center; color: #555; padding: 12px; font-style: italic; }
.keys-display { text-align: center; font-size: 13px; color: var(--text-dim); margin: 8px 0; }

/* ═══════════════════════════════════════════════════════════
   PLAYER INFO
   ═══════════════════════════════════════════════════════════ */

.player-basic {
  text-align: center;
  padding: 12px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 6px;
  margin-bottom: 12px;
}
.basic-name { font-size: 20px; font-weight: bold; color: var(--accent); }
.basic-origin { font-size: 14px; color: var(--text-dim); margin: 4px 0; }
.basic-level { font-size: 13px; color: var(--text-dim); }

.skills-display { margin: 8px 0; }
.skills-title { font-size: 14px; font-weight: bold; color: var(--accent); margin-bottom: 4px; }
.skills-list { display: flex; flex-wrap: wrap; gap: 4px; }
.skill-tag {
  padding: 4px 8px;
  background: rgba(72,136,170,0.15);
  border: 1px solid #48a;
  border-radius: 12px;
  font-size: 12px;
  color: #6ac;
}
.skills-empty { color: #555; font-style: italic; }

.origin-skill-display {
  margin: 8px 0;
  padding: 8px;
  background: var(--card);
  border-left: 3px solid var(--accent2);
  border-radius: 4px;
}
.origin-title { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
.origin-skill { font-size: 14px; font-weight: bold; color: var(--accent2); }
.origin-desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

.attr-allocation { margin: 12px 0; }
.attr-header { margin-bottom: 8px; font-size: 14px; }
.attr-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
  gap: 6px;
}
.attr-block {
  text-align: center;
  padding: 8px 4px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
}
